const { useState, useEffect, useCallback } = React;

// ==================== STORAGE HELPERS ====================
const STORAGE_KEY  = "cardboard_factory_v1";
const SB_CFG_KEY   = "cardboard_sb_cfg";   // إعدادات Supabase (localStorage)
const SB_TOKEN_KEY = "cardboard_sb_token"; // JWT token بعد تسجيل الدخول

// ── إعدادات Supabase — localStorage حقيقي ──
function getSbCfg()    { try { return JSON.parse(localStorage.getItem(SB_CFG_KEY)  || "{}"); } catch { return {}; } }
function setSbCfg(cfg) { try { localStorage.setItem(SB_CFG_KEY, JSON.stringify(cfg)); } catch {} }
function getSbToken()  { try { return localStorage.getItem(SB_TOKEN_KEY) || ""; }        catch { return ""; } }
function setSbToken(t) { try { if (t) localStorage.setItem(SB_TOKEN_KEY, t); else localStorage.removeItem(SB_TOKEN_KEY); } catch {} }
function getSbRefreshToken()  { try { return localStorage.getItem(SB_TOKEN_KEY + "_refresh") || ""; } catch { return ""; } }
function setSbRefreshToken(t) { try { if (t) localStorage.setItem(SB_TOKEN_KEY + "_refresh", t); else localStorage.removeItem(SB_TOKEN_KEY + "_refresh"); } catch {} }

// ── IndexedDB حقيقي — سعة مئات الميجابايت ──
const IDB_NAME    = "FactoryDB";
const IDB_STORE   = "kv";
const IDB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE, { keyPath: "key" });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror   = (e) => reject(e.target.error);
  });
}

const window_storage = {
  get: async (key) => {
    try {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx  = db.transaction(IDB_STORE, "readonly");
        const req = tx.objectStore(IDB_STORE).get(key);
        req.onsuccess = () => resolve(req.result ? { value: req.result.value } : null);
        req.onerror   = () => reject(req.error);
      });
    } catch { return null; }
  },
  set: async (key, val) => {
    try {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx  = db.transaction(IDB_STORE, "readwrite");
        const req = tx.objectStore(IDB_STORE).put({ key, value: val });
        req.onsuccess = () => resolve({ value: val });
        req.onerror   = () => reject(req.error);
      });
    } catch { return null; }
  },
};

// ══════════════════════════════════════════════════════
// Supabase REST Client — بدون npm، يعمل بـ fetch مباشرة
// يستخدم Auth الحقيقي (email/password ← JWT ← RLS)
// ══════════════════════════════════════════════════════
const sbAPI = {
  // ── تسجيل الدخول: يُرجع access_token أو null ──
  signIn: async (url, anonKey, email, password) => {
    try {
      const res = await fetch(`${url}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: { apikey: anonKey, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      if (!res.ok) return null;
      const data = await res.json();
      // حفظ refresh_token أيضاً
      if (data.refresh_token) setSbRefreshToken(data.refresh_token);
      return data.access_token || null;
    } catch { return null; }
  },

  // ── تجديد التوكن تلقائياً قبل انتهاء الساعة ──
  refreshToken: async (url, anonKey) => {
    try {
      const refreshToken = getSbRefreshToken();
      if (!refreshToken) return null;
      const res = await fetch(`${url}/auth/v1/token?grant_type=refresh_token`, {
        method: "POST",
        headers: { apikey: anonKey, "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_token: refreshToken }),
      });
      if (!res.ok) return null;
      const data = await res.json();
      if (data.refresh_token) setSbRefreshToken(data.refresh_token);
      if (data.access_token) setSbToken(data.access_token);
      return data.access_token || null;
    } catch { return null; }
  },

  // ── تسجيل الخروج ──
  signOut: async (url, anonKey, token) => {
    try {
      await fetch(`${url}/auth/v1/logout`, {
        method: "POST",
        headers: { apikey: anonKey, Authorization: `Bearer ${token}` },
      });
    } catch {}
  },

  // ── قراءة البيانات (anon = قراءة فقط، JWT = قراءة+كتابة) ──
  pull: async (url, anonKey, token) => {
    try {
      // anon يقرأ بدون JWT (RLS تسمح بـ SELECT لـ anon)
      const bearer = token || anonKey;
      const res = await fetch(
        `${url}/rest/v1/factory_data?key=eq.main&select=value,updated_at`,
        { headers: { apikey: anonKey, Authorization: `Bearer ${bearer}` } }
      );
      if (!res.ok) return null;
      const rows = await res.json();
      return rows && rows[0] ? rows[0] : null;
    } catch { return null; }
  },

  // ── كتابة البيانات (يحتاج JWT — authenticated فقط بحسب RLS) ──
  push: async (url, anonKey, token, payload) => {
    try {
      const res = await fetch(`${url}/rest/v1/factory_data`, {
        method: "POST",
        headers: {
          apikey: anonKey,
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
          Prefer: "resolution=merge-duplicates,return=minimal",
        },
        body: JSON.stringify({ key: "main", value: payload, updated_at: new Date().toISOString() }),
      });
      return res.ok;
    } catch { return false; }
  },
};

const defaultData = {
  purchases: [],
  sales: [],
  machinery: [],
  workers: [],
  debts: [],
  expenses: [],
  pendingWeighs: [], // طابور الميزان — الشاحنات المحمّلة بانتظار الوزن الفارغ
  pendingSales: [],  // طابور المبيعات — شحنات خارجة بانتظار تأكيد الوزن من العميل
  partners: [
    { id: 1, name: "أحمد", share: 33.33 },
    { id: 2, name: "محمد", share: 33.33 },
    { id: 3, name: "علي", share: 33.34 },
  ],
  settings: { factoryName: "معمل كبس الكارتون", currency: "د.ع" },
};

function useStorage() {
  const [data, setData]             = useState(defaultData);
  const [loaded, setLoaded]         = useState(false);
  const [token, setToken]           = useState(() => getSbToken());   // JWT للكتابة
  const [syncStatus, setSyncStatus] = useState("idle");
  const [lastSync, setLastSync]     = useState(null);
  const [showLogin, setShowLogin]   = useState(false);

  const cfg      = getSbCfg();
  const hasSb    = !!(cfg.url && cfg.key);
  // isReadOnly: مفعّل عندما يكون mode=read (الموبايل) وبدون JWT
  const isReadOnly = cfg.mode === "read" && !token;

  // ── تحميل المحلي + مزامنة تنازلية أولية ──
  useEffect(() => {
    const load = async () => {
      let localData = null;
      try {
        const r = await window_storage.get(STORAGE_KEY);
        if (r?.value) localData = { ...defaultData, ...JSON.parse(r.value) };
      } catch {}

      if (hasSb) {
        setSyncStatus("syncing");
        try {
          const remote = await sbAPI.pull(cfg.url, cfg.key, token || null);
          if (remote?.value) {
            const remoteData = { ...defaultData, ...JSON.parse(remote.value) };
            const remoteTs   = remoteData?._ts || 0;
            const localTs    = localData?._ts || 0;
            // الموبايل يأخذ دائماً من السحابة
            if (isReadOnly || remoteTs > localTs) {
              localData = remoteData;
              try { await window_storage.set(STORAGE_KEY, JSON.stringify(localData)); } catch {}
              setLastSync(new Date());
              setSyncStatus("ok");
            } else if (!isReadOnly && localTs > remoteTs && token) {
              // اللابتوب أحدث: ارفع البيانات العالقة فوراً عند فتح البرنامج
              const ok = await sbAPI.push(cfg.url, cfg.key, token, JSON.stringify(localData));
              setLastSync(new Date());
              setSyncStatus(ok ? "ok" : "offline");
            } else {
              // متطابقان
              setLastSync(new Date());
              setSyncStatus("ok");
            }
          } else {
            // السحابة فارغة — ارفع البيانات المحلية إن وجدت
            if (!isReadOnly && localData && token) {
              const ok = await sbAPI.push(cfg.url, cfg.key, token, JSON.stringify(localData));
              setLastSync(new Date());
              setSyncStatus(ok ? "ok" : "offline");
            } else {
              setSyncStatus(localData ? "offline" : "idle");
            }
          }
        } catch { setSyncStatus("offline"); }
      }

      setData(localData || defaultData);
      setLoaded(true);
    };
    load();
  }, []); // eslint-disable-line

  // ── تجديد التوكن تلقائياً كل 45 دقيقة ──
  useEffect(() => {
    if (!token || !hasSb) return;
    const iv = setInterval(async () => {
      const c2 = getSbCfg();
      if (!c2.url || !c2.key) return;
      const newToken = await sbAPI.refreshToken(c2.url, c2.key);
      if (newToken) setToken(newToken);
    }, 45 * 60 * 1000); // كل 45 دقيقة
    return () => clearInterval(iv);
  }, [token, hasSb]);

  // ── Auto-refresh للموبايل كل 30 ثانية ──
  useEffect(() => {
    if (!isReadOnly || !hasSb) return;
    const iv = setInterval(async () => {
      setSyncStatus("syncing");
      try {
        const remote = await sbAPI.pull(cfg.url, cfg.key, null);
        if (remote?.value) {
          const nd = { ...defaultData, ...JSON.parse(remote.value) };
          setData(nd);
          await window_storage.set(STORAGE_KEY, JSON.stringify(nd)).catch(() => {});
          setLastSync(new Date());
          setSyncStatus("ok");
        }
      } catch { setSyncStatus("offline"); }
    }, 30000);
    return () => clearInterval(iv);
  }, [isReadOnly, hasSb, cfg.url, cfg.key]);

  // ── حفظ: محلي فوراً + Supabase خلفياً (فقط مع JWT) ──
  const save = useCallback(async (newData) => {
    if (isReadOnly) return;
    const stamped = { ...newData, _ts: Date.now() };
    setData(stamped);
    try { await window_storage.set(STORAGE_KEY, JSON.stringify(stamped)); } catch {}
    const c2 = getSbCfg();
    if (c2.url && c2.key && token) {
      setSyncStatus("syncing");
      const ok = await sbAPI.push(c2.url, c2.key, token, JSON.stringify(stamped));
      if (ok) { setLastSync(new Date()); setSyncStatus("ok"); }
      else setSyncStatus("offline");
    }
  }, [isReadOnly, token]);

  // ── تسجيل الدخول (اللابتوب) ──
  const signIn = useCallback(async (email, password) => {
    const c2 = getSbCfg();
    if (!c2.url || !c2.key) return "أدخل رابط Supabase ومفتاح anon في الإعدادات أولاً";
    setSyncStatus("syncing");
    const jwt = await sbAPI.signIn(c2.url, c2.key, email, password);
    if (!jwt) { setSyncStatus("error"); return "الإيميل أو كلمة المرور غير صحيحة"; }
    setSbToken(jwt);
    setToken(jwt);
    // تحديث mode إلى write بعد الدخول
    setSbCfg({ ...c2, mode: "write" });
    setSyncStatus("ok");
    setShowLogin(false);
    // مزامنة فورية
    const remote = await sbAPI.pull(c2.url, c2.key, jwt);
    if (remote?.value) {
      const nd = { ...defaultData, ...JSON.parse(remote.value) };
      setData(nd);
      await window_storage.set(STORAGE_KEY, JSON.stringify(nd)).catch(() => {});
      setLastSync(new Date());
    }
    return null; // null = نجاح
  }, []);

  // ── تسجيل الخروج ──
  const signOut = useCallback(async () => {
    const c2 = getSbCfg();
    if (token && c2.url && c2.key) await sbAPI.signOut(c2.url, c2.key, token);
    setSbToken("");
    setToken("");
    setSyncStatus("idle");
  }, [token]);

  // ── مزامنة يدوية ──
  // ── مزامنة يدوية ذكية (مع فحص من الأحدث) ──
  const forceSync = useCallback(async () => {
    const c2 = getSbCfg();
    if (!c2.url || !c2.key) return;
    setSyncStatus("syncing");
    try {
      // 1. جلب البيانات المحلية لمعرفة وقت التحديث
      const localStr = await window_storage.get(STORAGE_KEY);
      const localObj = localStr?.value ? JSON.parse(localStr.value) : null;
      const localTs = localObj?._ts || 0;

      // 2. جلب البيانات من السحابة
      const remote = await sbAPI.pull(c2.url, c2.key, token || null);

      if (remote?.value) {
        const remoteObj = JSON.parse(remote.value);
        const remoteTs = remoteObj?._ts || 0;

        // 3. إذا كان اللابتوب أحدث → ارفع للسحابة
        if (!isReadOnly && localTs > remoteTs && token) {
          const ok = await sbAPI.push(c2.url, c2.key, token, JSON.stringify(localObj));
          if (ok) { setLastSync(new Date()); setSyncStatus("ok"); }
          else { setSyncStatus("offline"); }
        }
        // 4. إذا كانت السحابة أحدث أو موبايل → اسحب
        else if (isReadOnly || remoteTs > localTs) {
          const nd = { ...defaultData, ...remoteObj };
          setData(nd);
          await window_storage.set(STORAGE_KEY, JSON.stringify(nd)).catch(() => {});
          setLastSync(new Date());
          setSyncStatus("ok");
        } else {
          // متطابقان
          setLastSync(new Date());
          setSyncStatus("ok");
        }
      } else {
        // السحابة فارغة → ارفع بيانات اللابتوب فوراً
        if (!isReadOnly && localObj && token) {
          const ok = await sbAPI.push(c2.url, c2.key, token, JSON.stringify(localObj));
          if (ok) { setLastSync(new Date()); setSyncStatus("ok"); }
          else setSyncStatus("offline");
        } else {
          setSyncStatus("offline");
        }
      }
    } catch { setSyncStatus("error"); }
  }, [token, isReadOnly]);

  // ── تحديث إعدادات Supabase من الإعدادات ──
  const updateSbCfg = useCallback((newCfg) => {
    setSbCfg(newCfg);
    if (!newCfg.url || !newCfg.key) { setToken(""); setSbToken(""); }
  }, []);

  return {
    data, save, loaded,
    token, hasSb, isReadOnly,
    syncStatus, lastSync,
    signIn, signOut, forceSync, updateSbCfg,
    showLogin, setShowLogin,
  };
}

};

// ==================== DASHBOARD ====================
function Dashboard({ data, unlocked }) {
  const todayStr = today();
  const queueCount = (data.pendingWeighs || []).length;
  const salesQueueCount = (data.pendingSales || []).length;

  // Only operational data - no money amounts shown to accountant
  const todaySalesCount = data.sales.filter(s => s.date === todayStr).length;
  const todayPurchasesCount = data.purchases.filter(p => p.date === todayStr).length;
  const todayMachineryCount = data.machinery.filter(m => m.date === todayStr).length;
  const totalDebtsOpen = data.debts.filter(d => d.status !== "paid").length;

  // Only calculate financial data when unlocked
  const totalPurchases = unlocked ? data.purchases.reduce((s, p) => s + (p.total || 0), 0) : 0;
  const totalSales = unlocked ? data.sales.reduce((s, p) => s + (p.total || 0), 0) : 0;
  const totalWorkers = unlocked ? data.workers.reduce((s, w) => {
    return s + (w.wage||0) + (w.extraPay||0) - (w.advance||0);
  }, 0) : 0;
  const totalMachinery = unlocked ? data.machinery.reduce((s, m) => s + (m.amount || 0), 0) : 0;
  const totalExpensesGen = unlocked ? (data.expenses || []).reduce((s, e) => s + (e.amount || 0), 0) : 0;
  const netProfit = totalSales - (totalPurchases + totalWorkers + totalMachinery + totalExpensesGen);
  const isProfit = netProfit >= 0;

  const pendingDebtsIn = unlocked ? data.debts
    .filter(d => d.type === "customer" && d.status !== "paid")
    .reduce((s, d) => s + ((d.amount || 0) - (d.payments || []).reduce((a, p) => a + p.amount, 0)), 0) : 0;
  const pendingDebtsOut = unlocked ? data.debts
    .filter(d => d.type === "supplier" && d.status !== "paid")
    .reduce((s, d) => s + ((d.amount || 0) - (d.payments || []).reduce((a, p) => a + p.amount, 0)), 0) : 0;

  const todaySalesTotal = unlocked ? data.sales.filter(s => s.date === todayStr).reduce((s, p) => s + p.total, 0) : 0;
  const todayPurchasesTotal = unlocked ? data.purchases.filter(p => p.date === todayStr).reduce((s, p) => s + p.total, 0) : 0;
  const todayMachineryTotal = unlocked ? data.machinery.filter(m => m.date === todayStr).reduce((s, m) => s + m.amount, 0) : 0;
  const todayExpensesTotal = unlocked ? (data.expenses || []).filter(e => e.date === todayStr).reduce((s, e) => s + e.amount, 0) : 0;
  const todayNet = todaySalesTotal - (todayPurchasesTotal + todayMachineryTotal + todayExpensesTotal);

  return (
    <>
      {/* Header status */}
      <div style={{ textAlign: "center", padding: "8px 0 16px" }}>
        <div style={{ fontSize: 11, color: "#7a8a9a" }}>
          {new Date().toLocaleDateString("ar-IQ", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}
        </div>
      </div>

      {/* Queue alert - always visible */}
      {queueCount > 0 && (
        <div style={{ background: "#1a1200", border: "1px solid #e67e2266", borderRadius: 10, padding: "12px 14px", marginBottom: 12, display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 22 }}>⏳</span>
          <div>
            <div style={{ fontSize: 13, color: "#e67e22", fontWeight: 700 }}>{queueCount} شاحنة في الطابور — تنتظر وزن العودة</div>
            <div style={{ fontSize: 11, color: "#7a8a9a" }}>انتقل لصفحة المشتريات لإتمام العملية</div>
          </div>
        </div>
      )}

      {/* Sales queue alert */}
      {salesQueueCount > 0 && (
        <div style={{ background: "#0a150a", border: "1px solid #27ae6066", borderRadius: 10, padding: "12px 14px", marginBottom: 12, display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 22 }}>📦</span>
          <div>
            <div style={{ fontSize: 13, color: "#27ae60", fontWeight: 700 }}>{salesQueueCount} شحنة مبيعات معلقة — بانتظار تأكيد الوزن</div>
            <div style={{ fontSize: 11, color: "#7a8a9a" }}>انتقل لصفحة المبيعات لإدخال الوزن الفعلي من العميل</div>
          </div>
        </div>
      )}

      {/* Operational counters - safe for accountant */}
      {!unlocked && (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10, marginBottom: 12 }}>
            {[
              { l: "مبيعات اليوم", v: `${todaySalesCount} عملية`, c: "#4caf50", icon: "📦" },
              { l: "مشتريات اليوم", v: `${todayPurchasesCount} عملية`, c: "#e67e22", icon: "🚚" },
              { l: "مصاريف آليات اليوم", v: `${todayMachineryCount} سجل`, c: "#9b59b6", icon: "⚙️" },
              { l: "ديون معلقة", v: `${totalDebtsOpen} دين`, c: "#f0b429", icon: "📋" },
            ].map((k, i) => (
              <div key={i} style={{ background: "#0d1117", border: `1px solid ${k.c}22`, borderRadius: 10, padding: "14px 12px", textAlign: "center" }}>
                <div style={{ fontSize: 22, marginBottom: 4 }}>{k.icon}</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: k.c }}>{k.v}</div>
                <div style={{ fontSize: 11, color: "#7a8a9a", marginTop: 3 }}>{k.l}</div>
              </div>
            ))}
          </div>

          <div style={{ ...({ background: "#0d1117", borderRadius: 12, padding: 16, border: "1px solid #1e2530", marginBottom: 12 }), textAlign: "center" }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🔒</div>
            <div style={{ fontSize: 14, color: "#7a8a9a" }}>بيانات الأرباح والمبالغ محمية</div>
            <div style={{ fontSize: 12, color: "#4a5a6a", marginTop: 4 }}>للوصول انتقل إلى التقارير وأدخل كلمة المرور</div>
          </div>

          {/* Recent operations - names only, no amounts */}
          <div style={{ background: "#0d1117", borderRadius: 12, padding: 14, border: "1px solid #1e2530" }}>
            <div style={{ fontSize: 13, color: "#f0b429", fontWeight: 700, marginBottom: 10 }}>🕐 آخر العمليات</div>
            {[
              ...data.purchases.slice(-3).map(p => ({ text: `شراء من ${p.supplier}`, date: p.date, icon: "🚚" })),
              ...data.sales.slice(-3).map(s => ({ text: `بيع لـ ${s.customer}`, date: s.date, icon: "📦" })),
            ].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5).map((item, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: "1px solid #1e2530", fontSize: 13 }}>
                <span>{item.icon}</span>
                <span style={{ color: "#c8d0da", flex: 1 }}>{item.text}</span>
                <span style={{ color: "#4a5a6a", fontSize: 11 }}>{item.date}</span>
              </div>
            ))}
            {data.purchases.length === 0 && data.sales.length === 0 && (
              <div style={{ textAlign: "center", color: "#4a5a6a", fontSize: 12 }}>لا توجد عمليات بعد</div>
            )}
          </div>
        </>
      )}

      {/* UNLOCKED: show everything */}
      {unlocked && (
        <>
          {/* Today */}
          <div style={{ background: "#0a1020", border: "1px solid #4a90e244", borderRadius: 12, padding: 14, marginBottom: 12 }}>
            <div style={{ fontSize: 13, color: "#4a90e2", fontWeight: 700, marginBottom: 10 }}>📅 تقرير اليوم — تلقائي</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8 }}>
              {[
                { l: "مبيعات", v: fmt(todaySalesTotal), c: "#4caf50" },
                { l: "مشتريات", v: fmt(todayPurchasesTotal), c: "#e67e22" },
                { l: "مصاريف", v: fmt(todayMachineryTotal + todayExpensesTotal), c: "#e55444" },
                { l: todayNet >= 0 ? "ربح اليوم" : "خسارة اليوم", v: fmt(Math.abs(todayNet)), c: todayNet >= 0 ? "#4caf50" : "#e55444" },
              ].map((k, i) => (
                <div key={i} style={{ background: "#0d1117", borderRadius: 8, padding: "10px 6px", textAlign: "center" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: k.c }}>{k.v}</div>
                  <div style={{ fontSize: 10, color: "#7a8a9a", marginTop: 3 }}>{k.l}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10, marginBottom: 12 }}>
            {[
              { l: "إجمالي المبيعات", v: fmt(totalSales), c: "#f0b429" },
              { l: "إجمالي المشتريات", v: fmt(totalPurchases), c: "#4a90e2" },
              { l: "ديون الزبائن", v: fmt(pendingDebtsIn), c: "#27ae60" },
              { l: "ديون المجهزين", v: fmt(pendingDebtsOut), c: "#e74c3c" },
            ].map((k, i) => (
              <div key={i} style={{ background: "#0d1117", border: `1px solid ${k.c}33`, borderRadius: 10, padding: "14px 10px", textAlign: "center" }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: k.c }}>{k.v}</div>
                <div style={{ fontSize: 11, color: "#7a8a9a", marginTop: 4 }}>{k.l}</div>
              </div>
            ))}
          </div>

          {/* Profit */}
          <div style={{ background: isProfit ? "#0a140a" : "#140a0a", border: `2px solid ${isProfit ? "#4caf5066" : "#e5544466"}`, borderRadius: 12, padding: 16, marginBottom: 12, textAlign: "center" }}>
            <div style={{ fontSize: 13, color: "#7a8a9a", marginBottom: 6 }}>الربح الصافي الإجمالي</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: isProfit ? "#4caf50" : "#e55444" }}>
              {isProfit ? "▲" : "▼"} {fmt(Math.abs(netProfit))}
            </div>
          </div>

          {/* Partners */}
          <div style={{ background: "#0d1117", borderRadius: 12, padding: 14, border: "1px solid #2a3545", marginBottom: 12 }}>
            <div style={{ fontSize: 13, color: "#f0b429", fontWeight: 700, marginBottom: 10 }}>🤝 توزيع الأرباح</div>
            {isProfit ? (
              <div style={{ display: "grid", gridTemplateColumns: `repeat(${data.partners.length},1fr)`, gap: 8 }}>
                {data.partners.map(p => (
                  <div key={p.id} style={{ background: "#0a0e15", borderRadius: 8, padding: "10px 8px", textAlign: "center" }}>
                    <div style={{ fontWeight: 700, color: "#e8e0d5", fontSize: 13 }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: "#7a8a9a" }}>{p.share}%</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: "#4caf50", marginTop: 6 }}>{fmt((netProfit * p.share) / 100)}</div>
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ textAlign: "center", color: "#e55444", fontSize: 13 }}>⚠️ لا يوجد ربح للتوزيع</div>
            )}
          </div>

          {/* Recent ops with amounts */}
          <div style={{ background: "#0d1117", borderRadius: 12, padding: 14, border: "1px solid #1e2530" }}>
            <div style={{ fontSize: 13, color: "#f0b429", fontWeight: 700, marginBottom: 10 }}>🕐 آخر العمليات</div>
            {[
              ...data.purchases.slice(-3).map(p => ({ text: `شراء ${fmtNum(p.weight)} كغم من ${p.supplier}`, amount: -p.total, date: p.date })),
              ...data.sales.slice(-3).map(s => ({ text: `بيع ${fmtNum(s.weight)} طن لـ ${s.customer}`, amount: s.total, date: s.date })),
            ].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5).map((item, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid #1e2530", fontSize: 13 }}>
                <span style={{ color: "#c8d0da" }}>{item.text}</span>
                <span style={{ color: item.amount > 0 ? "#4caf50" : "#e55444" }}>{item.amount > 0 ? "+" : ""}{fmt(item.amount)}</span>
              </div>
            ))}
            {data.purchases.length === 0 && data.sales.length === 0 && (
              <div style={{ textAlign: "center", color: "#4a5a6a", fontSize: 12 }}>لا توجد عمليات بعد</div>
            )}
          </div>
        </>
      )}
    </>
  );
}


// ==================== AUTOCOMPLETE INPUT ====================
function AutocompleteInput({ value, onChange, suggestions, placeholder, style }) {
  const [show, setShow] = useState(false);
  const filtered = value.length >= 1
    ? [...new Set(suggestions.filter(s => s && s.includes(value) && s !== value))].slice(0, 6)
    : [];

  return (
    <div style={{ position: "relative" }}>
      <input
        style={style}
        value={value}
        placeholder={placeholder}
        onChange={e => { onChange(e.target.value); setShow(true); }}
        onFocus={() => setShow(true)}
        onBlur={() => setTimeout(() => setShow(false), 150)}
        autoComplete="off"
      />
      {show && filtered.length > 0 && (
        <div style={{
          position: "absolute", top: "100%", right: 0, left: 0, zIndex: 999,
          background: "#1a2535", border: "1px solid #2a3545", borderRadius: 8,
          overflow: "hidden", boxShadow: "0 4px 20px rgba(0,0,0,0.5)",
        }}>
          {filtered.map((s, i) => (
            <div
              key={i}
              style={{
                padding: "9px 12px", cursor: "pointer", fontSize: 13,
                color: "#e8e0d5", borderBottom: i < filtered.length - 1 ? "1px solid #2a3545" : "none",
                display: "flex", alignItems: "center", gap: 8,
              }}
              onMouseDown={() => { onChange(s); setShow(false); }}
            >
              <span style={{ color: "#f0b429", fontSize: 11 }}>🔍</span>
              {s}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// SYNC BAR — شريط المزامنة والمصادقة في الهيدر
// ══════════════════════════════════════════════════════
function SyncBar({ hasSb, isReadOnly, token, syncStatus, lastSync, forceSync, onLoginClick, onSignOut }) {
  const ST = {
    idle:    { color: "#4a5a6a", dot: "○" },
    syncing: { color: "#f0b429", dot: "↻" },
    ok:      { color: "#27ae60", dot: "✓" },
    error:   { color: "#e55444", dot: "✕" },
    offline: { color: "#e67e22", dot: "⚡" },
  }[syncStatus] || { color: "#4a5a6a", dot: "○" };

  if (!hasSb) {
    return (
      <span style={{ fontSize: 10, color: "#4a5a6a", cursor: "pointer" }} title="Supabase غير مُعدّ">
        ☁ بدون مزامنة
      </span>
    );
  }

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
      {/* حالة المزامنة */}
      <button onClick={forceSync} title="مزامنة الآن" style={{
        background: "none", border: `1px solid ${ST.color}66`, borderRadius: 8,
        padding: "3px 8px", cursor: "pointer", fontSize: 10, color: ST.color,
        fontFamily: "inherit", display: "flex", alignItems: "center", gap: 3,
      }}>
        <span style={{ fontSize: 12 }}>{ST.dot}</span>
        <span>
          {syncStatus === "syncing" ? "مزامنة..." :
           syncStatus === "ok"      ? (lastSync ? new Date(lastSync.getTime() + (3 * 60 * 60000) - (lastSync.getTimezoneOffset() * 60000)).toISOString().slice(11,16).replace(":", ":") + " ✓" : "متزامن") :
           syncStatus === "offline" ? "Offline" :
           syncStatus === "error"   ? "خطأ" : "☁"}
        </span>
      </button>

      {/* وضع القراءة أو زر الدخول */}
      {isReadOnly ? (
        <span style={{
          background: "#1a0a25", border: "1px solid #9b59b688",
          borderRadius: 8, padding: "3px 8px", fontSize: 10, color: "#9b59b6", fontWeight: 700,
        }}>
          👁 مشاهدة
        </span>
      ) : token ? (
        <button onClick={onSignOut} title="تسجيل الخروج" style={{
          background: "none", border: "1px solid #27ae6066", borderRadius: 8,
          padding: "3px 8px", cursor: "pointer", fontSize: 10, color: "#27ae60", fontFamily: "inherit",
        }}>
          ✅ مدخل
        </button>
      ) : (
        <button onClick={onLoginClick} style={{
          background: "linear-gradient(135deg, #4a90e2, #2980b9)",
          border: "none", borderRadius: 8, padding: "3px 10px",
          cursor: "pointer", fontSize: 10, color: "#fff", fontFamily: "inherit", fontWeight: 700,
        }}>
          🔑 دخول
        </button>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// LOGIN MODAL — نافذة تسجيل الدخول
// ══════════════════════════════════════════════════════
function LoginModal({ onSignIn, onClose, onReadOnly }) {
  const [email, setEmail]   = useState("");
  const [pass, setPass]     = useState("");
  const [err, setErr]       = useState("");
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    if (!email || !pass) { setErr("أدخل الإيميل وكلمة المرور"); return; }
    setLoading(true); setErr("");
    const error = await onSignIn(email, pass);
    setLoading(false);
    if (error) setErr(error);
  };

  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)",
      display: "flex", alignItems: "center", justifyContent: "center",
      zIndex: 9999, padding: 16,
    }}>
      <div style={{
        background: "#161d2b", borderRadius: 16, padding: 28,
        width: "100%", maxWidth: 380, border: "1px solid #2a3545",
        boxShadow: "0 20px 60px rgba(0,0,0,0.7)",
      }}>
        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>🔐</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#e8e0d5" }}>دخول المحاسب</div>
          <div style={{ fontSize: 12, color: "#7a8a9a", marginTop: 4 }}>
            للإدخال والتعديل — اللابتوب فقط
          </div>
        </div>

        {/* الحقول */}
        <div style={{ marginBottom: 12 }}>
          <label style={{ fontSize: 12, color: "#7a8a9a", display: "block", marginBottom: 4 }}>
            الإيميل
          </label>
          <input
            type="email"
            style={{
              width: "100%", background: "#0d1117", border: "1px solid #2a3545",
              borderRadius: 8, padding: "10px 12px", color: "#e8e0d5",
              fontFamily: "inherit", fontSize: 14, outline: "none",
            }}
            placeholder="accountant@maamal.com"
            value={email}
            onChange={e => setEmail(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleLogin()}
          />
        </div>

        <div style={{ marginBottom: 16 }}>
          <label style={{ fontSize: 12, color: "#7a8a9a", display: "block", marginBottom: 4 }}>
            كلمة المرور
          </label>
          <input
            type="password"
            style={{
              width: "100%", background: "#0d1117", border: "1px solid #2a3545",
              borderRadius: 8, padding: "10px 12px", color: "#e8e0d5",
              fontFamily: "inherit", fontSize: 14, outline: "none",
            }}
            placeholder="••••••••"
            value={pass}
            onChange={e => setPass(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleLogin()}
          />
        </div>

        {err && (
          <div style={{
            background: "#1a0808", border: "1px solid #e5544444",
            borderRadius: 8, padding: "8px 12px", fontSize: 12, color: "#e55444", marginBottom: 12,
          }}>
            ⚠️ {err}
          </div>
        )}

        {/* أزرار */}
        <button
          style={{
            width: "100%", background: loading ? "#1a2535" : "linear-gradient(135deg, #4a90e2, #2980b9)",
            border: "none", borderRadius: 10, padding: "12px",
            color: "#fff", cursor: loading ? "not-allowed" : "pointer",
            fontFamily: "inherit", fontSize: 14, fontWeight: 700, marginBottom: 10,
          }}
          onClick={handleLogin}
          disabled={loading}
        >
          {loading ? "جاري التحقق..." : "🔑 دخول للإدخال الكامل"}
        </button>

        <button
          style={{
            width: "100%", background: "none", border: "1px solid #9b59b666",
            borderRadius: 10, padding: "10px", color: "#9b59b6",
            cursor: "pointer", fontFamily: "inherit", fontSize: 13, marginBottom: 10,
          }}
          onClick={onReadOnly}
        >
          👁 متابعة كمشاهد فقط (الموبايل)
        </button>

        <button
          style={{
            width: "100%", background: "none", border: "1px solid #2a3545",
            borderRadius: 10, padding: "8px", color: "#4a5a6a",
            cursor: "pointer", fontFamily: "inherit", fontSize: 12,
          }}
          onClick={onClose}
        >
          استخدام بدون مزامنة (محلي فقط)
        </button>

        <div style={{ fontSize: 10, color: "#3a4a5a", marginTop: 12, textAlign: "center", lineHeight: 1.6 }}>
          بيانات الدخول تُنشأ في Supabase → Authentication → Users
        </div>
      </div>
    </div>
  );
}

// ==================== SCALE WIDGET ====================
function ScaleWidget({ onRead, field }) {
  const [reading, setReading] = useState(null);
  const [simulating, setSimulating] = useState(false);

  // Simulate reading from scale (in real deployment replace with Serial/WebSerial API)
  const simulateScale = () => {
    setSimulating(true);
    setReading("جاري القراءة...");
    setTimeout(() => {
      // Random realistic truck weight: 8000–25000 kg
      const val = field === "grossWeight"
        ? Math.floor(Math.random() * 12000 + 13000)
        : Math.floor(Math.random() * 4000 + 6000);
      setReading(val);
      setSimulating(false);
      onRead(val);
    }, 1800);
  };

  return (
    <div style={{
      display: "flex",
      alignItems: "center",
      gap: 6,
      marginTop: 4,
    }}>
      <button
        type="button"
        onClick={simulateScale}
        disabled={simulating}
        style={{
          background: simulating ? "#1a2a1a" : "linear-gradient(135deg,#27ae60,#1a7a45)",
          border: "1px solid #27ae60",
          borderRadius: 6,
          padding: "4px 10px",
          color: simulating ? "#4caf50" : "#fff",
          fontSize: 11,
          cursor: simulating ? "not-allowed" : "pointer",
          fontFamily: "inherit",
          display: "flex",
          alignItems: "center",
          gap: 4,
          whiteSpace: "nowrap",
        }}
      >
        {simulating ? "⏳ قراءة..." : "⚖️ قراءة الميزان"}
      </button>
      {reading && !simulating && (
        <span style={{ fontSize: 11, color: "#4caf50" }}>✅ {fmtNum(reading)} كغم</span>
      )}
    </div>
  );
}

// ==================== PURCHASES (QUEUE SYSTEM) ====================
function Purchases({ data, save, isReadOnly }) {
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({});

  const canEdit = (recordDate) => {
    if (recordDate === today()) return true;
    const pw = window.prompt("سجل من يوم سابق — أدخل كلمة مرور المالك:");
    return pw === (data.settings?.reportPassword || "owner1234");
  };

  const startEdit = (rec) => {
    if (!canEdit(rec.date)) return;
    setEditId(rec.id);
    setEditForm({ supplier: rec.supplier, grossWeight: rec.grossWeight||rec.weight, tareWeight: rec.tareWeight||0, price: rec.price, payType: rec.payType, notes: rec.notes||"" });
  };

  const saveEdit = (id) => {
    const gw = parseFloat(editForm.grossWeight)||0;
    const tw = parseFloat(editForm.tareWeight)||0;
    const pr = parseFloat(editForm.price)||0;
    const net = gw - tw;
    const total = net * pr;
    save({ ...data, purchases: data.purchases.map(p => p.id === id ? {
      ...p, supplier: editForm.supplier, grossWeight: gw, tareWeight: tw, weight: net, price: pr, payType: editForm.payType, notes: editForm.notes, total
    } : p) });
    setEditId(null);
  };

  const [p1, setP1] = useState({ supplier: "", grossWeight: "", price: "", payType: "cash", date: today(), notes: "" });
  const [completing, setCompleting] = useState(null);
  const [tareVal, setTareVal] = useState("");
  const [simulating, setSimulating] = useState("");

  const pending = data.pendingWeighs || [];

  const scaleRead = (field, cb) => {
    setSimulating(field);
    setTimeout(() => {
      const v = field === "gross"
        ? Math.floor(Math.random() * 12000 + 13000)
        : Math.floor(Math.random() * 4000 + 6000);
      cb(v); setSimulating("");
    }, 1500);
  };

  const addToQueue = () => {
    if (!p1.supplier || !p1.grossWeight || !p1.price) return;
    const ticket = {
      id: uid(), supplier: p1.supplier,
      grossWeight: parseFloat(p1.grossWeight), price: parseFloat(p1.price),
      payType: p1.payType, date: p1.date, notes: p1.notes,
      time: new Date().toLocaleTimeString("ar-IQ", { hour: "2-digit", minute: "2-digit" }),
    };
    save({ ...data, pendingWeighs: [...pending, ticket] });
    setP1(f => ({ ...f, supplier: "", grossWeight: "", notes: "" }));
  };

  const completeTicket = (ticket) => {
    const tare = parseFloat(tareVal);
    if (!tare || tare >= ticket.grossWeight) return;
    const netWeight = ticket.grossWeight - tare;
    const total = netWeight * ticket.price;
    const rec = { id: uid(), supplier: ticket.supplier, grossWeight: ticket.grossWeight, tareWeight: tare, weight: netWeight, price: ticket.price, payType: ticket.payType, date: ticket.date, notes: ticket.notes, total };
    const newPending = pending.filter(p => p.id !== ticket.id);
    const newData = { ...data, purchases: [...data.purchases, rec], pendingWeighs: newPending };
    if (ticket.payType === "deferred") {
      newData.debts = [...(data.debts || []), { id: uid(), type: "supplier", name: ticket.supplier, amount: total, date: ticket.date, notes: `شراء ${netWeight} كغم صافي`, status: "pending" }];
    }
    save(newData); setCompleting(null); setTareVal("");
  };

  const del = (id) => save({ ...data, purchases: data.purchases.filter(p => p.id !== id) });
  const removeQueue = (id) => save({ ...data, pendingWeighs: pending.filter(p => p.id !== id) });

  return (
    <>
      <h2 style={{ color: "#f0b429", margin: "0 0 16px 0", fontSize: 18 }}>📦 المشتريات — نظام الطابور</h2>

      <div style={{ ...S.kpiGrid, gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: 16 }}>
        <div style={S.kpi("#4a90e2")}><div style={S.kpiVal}>{data.purchases.length}</div><div style={S.kpiLabel}>شحنات مكتملة</div></div>
        <div style={S.kpi("#e67e22")}><div style={S.kpiVal}>{fmtNum(data.purchases.reduce((s,p)=>s+(p.weight||0),0))} كغم</div><div style={S.kpiLabel}>إجمالي الصافي</div></div>
        <div style={S.kpi("#f0b429")}><div style={S.kpiVal}>{fmt(data.purchases.reduce((s,p)=>s+p.total,0))}</div><div style={S.kpiLabel}>إجمالي الكلفة</div></div>
      </div>

      {/* PHASE 1 */}
      <div style={{ ...S.card, border: "2px solid #e67e2244", background: "#14100a" }}>
        <div style={S.cardTitle}>
          🚛 المرحلة الأولى — وزن الشاحنة محمّلة
        </div>
        <div style={{ fontSize: 12, color: "#7a8a9a", marginBottom: 12, background: "#0d1117", borderRadius: 8, padding: "8px 12px" }}>
          💡 سجّل المجهز وأضفه للطابور ← يذهب للتفريغ ← عند عودته اضغط "رجع" لإدخال وزن الفارغ
        </div>
        <div style={S.formGrid}>
          <div style={S.formField}>
            <label style={S.label}>التاريخ</label>
            <input type="date" style={S.input} value={p1.date} onChange={e=>setP1(f=>({...f,date:e.target.value}))} />
          </div>
          <div style={S.formField}>
            <label style={S.label}>اسم المجهز</label>
            <AutocompleteInput
              style={{...S.input,borderColor:p1.supplier?"#e67e22":"#2a3545"}}
              placeholder="مثال: حسن، أحمد..."
              value={p1.supplier}
              onChange={v=>setP1(f=>({...f,supplier:v}))}
              suggestions={[...new Set(data.purchases.map(p=>p.supplier).filter(Boolean))]}
            />
          </div>
          <div style={S.formField}>
            <label style={S.label}>⚖️ وزن الشاحنة محمّلة (كغم)</label>
            <input type="number" style={{...S.input,borderColor:"#e67e2266"}} placeholder="مثال: 18500" value={p1.grossWeight} onChange={e=>setP1(f=>({...f,grossWeight:e.target.value}))} />
            <button type="button" onClick={()=>scaleRead("gross",v=>setP1(f=>({...f,grossWeight:v})))} disabled={simulating==="gross"} style={{marginTop:4,background:simulating==="gross"?"#1a2a1a":"linear-gradient(135deg,#27ae60,#1a7a45)",border:"1px solid #27ae60",borderRadius:6,padding:"5px 12px",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
              {simulating==="gross"?"⏳ قراءة...":"⚖️ قراءة الميزان"}
            </button>
          </div>
          <div style={S.formField}>
            <label style={S.label}>سعر الكغم (د.ع)</label>
            <input type="number" style={S.input} placeholder="السعر" value={p1.price} onChange={e=>setP1(f=>({...f,price:e.target.value}))} />
          </div>
          <div style={S.formField}>
            <label style={S.label}>طريقة الدفع</label>
            <select style={S.select} value={p1.payType} onChange={e=>setP1(f=>({...f,payType:e.target.value}))}>
              <option value="cash">نقدي</option><option value="deferred">آجل</option>
            </select>
          </div>
          <div style={S.formField}>
            <label style={S.label}>ملاحظات</label>
            <input style={S.input} placeholder="اختياري" value={p1.notes} onChange={e=>setP1(f=>({...f,notes:e.target.value}))} />
          </div>
        </div>
        <button style={{...S.btn("#e67e22"),width:"100%",opacity:(!p1.supplier||!p1.grossWeight||!p1.price)?0.4:1}} disabled={isReadOnly} onClick={addToQueue}>
          🚛 أضف للطابور ← ذهب للتفريغ
        </button>
      </div>

      {/* QUEUE */}
      {pending.length > 0 && (
        <div style={{...S.card,border:"2px solid #f0b42966",background:"#13120a"}}>
          <div style={{...S.cardTitle,justifyContent:"space-between"}}>
            <span>⏳ الطابور — بانتظار وزن العودة</span>
            <span style={{background:"#f0b42922",border:"1px solid #f0b42966",borderRadius:20,padding:"2px 12px",fontSize:13,color:"#f0b429"}}>{pending.length} 🚛</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {pending.map(ticket=>(
              <div key={ticket.id} style={{background:"#0d1117",border:"1px solid #2a3020",borderRadius:10,padding:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:24}}>🚛</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:16,color:"#f0e6c8"}}>{ticket.supplier}</div>
                      <div style={{fontSize:11,color:"#7a8a9a"}}>صعد الميزان: {ticket.time} • {ticket.date}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:14,color:"#e67e22",fontWeight:700}}>{fmtNum(ticket.grossWeight)} كغم</div>
                    <div style={{fontSize:10,color:"#7a8a9a"}}>محمّل</div>
                  </div>
                </div>

                {completing===ticket.id ? (
                  <div style={{background:"#0a1520",borderRadius:8,padding:12,border:"1px solid #1e4a60"}}>
                    <div style={{fontSize:12,color:"#4a90e2",fontWeight:700,marginBottom:8}}>⚖️ وزن الشاحنة فارغة (تارة)</div>
                    <div style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
                      <input type="number" style={{...S.input,flex:1,minWidth:120,borderColor:"#4a90e266"}} placeholder="وزن العربة فارغ" value={tareVal} onChange={e=>setTareVal(e.target.value)} />
                      <button type="button" onClick={()=>scaleRead("tare",v=>setTareVal(v))} disabled={simulating==="tare"} style={{background:simulating==="tare"?"#1a2a1a":"linear-gradient(135deg,#27ae60,#1a7a45)",border:"1px solid #27ae60",borderRadius:6,padding:"10px 14px",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                        {simulating==="tare"?"⏳":"⚖️ قراءة"}
                      </button>
                    </div>
                    {tareVal && parseFloat(tareVal)<ticket.grossWeight && (
                      <div style={{marginTop:8,background:"#0d2010",border:"1px solid #4caf5044",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:12,color:"#7a8a9a"}}>{fmtNum(ticket.grossWeight)} − {fmtNum(parseFloat(tareVal))} =</span>
                        <span style={{color:"#4caf50",fontWeight:700,fontSize:20}}>{fmtNum(ticket.grossWeight-parseFloat(tareVal))} كغم صافي</span>
                      </div>
                    )}
                    <div style={{display:"flex",gap:8,marginTop:10}}>
                      <button style={{...S.btn("#27ae60"),flex:1,opacity:(!tareVal||parseFloat(tareVal)>=ticket.grossWeight)?0.4:1}} onClick={()=>completeTicket(ticket)}>✅ إتمام وحفظ الشحنة</button>
                      <button style={{background:"none",border:"1px solid #4a5a6a",borderRadius:8,padding:"10px 14px",color:"#7a8a9a",cursor:"pointer",fontFamily:"inherit"}} onClick={()=>{setCompleting(null);setTareVal("")}}>إلغاء</button>
                    </div>
                  </div>
                ) : (
                  <div style={{display:"flex",gap:8}}>
                    <button style={{...S.btn("#4a90e2"),flex:1}} onClick={()=>{setCompleting(ticket.id);setTareVal("")}}>🔄 رجع — أدخل وزن الفارغ</button>
                    <button style={S.btnDanger} onClick={()=>{if(window.confirm("حذف من الطابور؟"))removeQueue(ticket.id)}}>🗑</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* COMPLETED TABLE */}
      <div style={S.card}>
        <div style={S.cardTitle}>✅ الشحنات المكتملة</div>
        {data.purchases.length===0 ? (
          <div style={S.emptyState}>📦 لا توجد شحنات مكتملة بعد</div>
        ) : (
          <table style={S.table}>
            <thead><tr>
              <th style={S.th}>التاريخ</th><th style={S.th}>المجهز</th>

                  <td style={S.td}>{p.supplier}</td>
                  <td style={{...S.td,color:"#e67e22"}}>{fmtNum(p.grossWeight||p.weight)}</td>
                  <td style={{...S.td,color:"#7a8a9a"}}>{fmtNum(p.tareWeight||0)}</td>
                  <td style={{...S.td,fontWeight:700,color:"#4caf50"}}>{fmtNum(p.weight||(p.grossWeight-p.tareWeight))}</td>
                  <td style={S.td}>{fmt(p.price)}</td>
                  <td style={{...S.td,fontWeight:700,color:"#f0b429"}}>{fmt(p.total)}</td>
                  <td style={S.td}><span style={S.badge(p.payType==="cash"?"#4caf50":"#e67e22")}>{p.payType==="cash"?"نقدي":"آجل"}</span></td>

                    <button style={S.btnDanger} onClick={()=>{if(window.confirm("هل أنت متأكد من حذف هذا السجل؟"))del(p.id)}}>🗑</button>
                    <button style={{...S.btnDanger, color: "#4a90e2", border: "1px solid #4a90e244"}} onClick={()=>startEdit(p)}>✏️</button>
                  </td>
                </tr>,
                editId === p.id ? (
                  <tr key={p.id+"_edit"}><td colSpan="9" style={{...S.td, padding: 12, background: "#0a1520", border: "1px solid #1e4a60"}}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>المجهز</label><input style={{...S.input,padding:"6px",fontSize:12}} value={editForm.supplier} onChange={e=>setEditForm(f=>({...f,supplier:e.target.value}))} /></div>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>وزن كلي</label><input type="number" style={{...S.input,padding:"6px",fontSize:12}} value={editForm.grossWeight} onChange={e=>setEditForm(f=>({...f,grossWeight:e.target.value}))} /></div>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>وزن فارغ</label><input type="number" style={{...S.input,padding:"6px",fontSize:12}} value={editForm.tareWeight} onChange={e=>setEditForm(f=>({...f,tareWeight:e.target.value}))} /></div>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>سعر/كغم</label><input type="number" style={{...S.input,padding:"6px",fontSize:12}} value={editForm.price} onChange={e=>setEditForm(f=>({...f,price:e.target.value}))} /></div>
                      <div style={{display:"flex",alignItems:"flex-end",gap:4}}>
                        <button style={{...S.btn("#27ae60"),padding:"6px 12px",fontSize:12}} onClick={()=>saveEdit(p.id)}>💾</button>
                        <button style={{...S.btnDanger,padding:"6px 8px"}} onClick={()=>setEditId(null)}>✕</button>
                      </div>
                    </div>
                  </td></tr>
                ) : null
                ])}
            </tbody>
          </table>
        )}
      </div>
    </>
  );
}

// ==================== SALES (QUEUE SYSTEM) ====================
function Sales({ data, save, isReadOnly }) {
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({});

  const canEdit = (recordDate) => {
    if (recordDate === today()) return true;
    const pw = window.prompt("سجل من يوم سابق — أدخل كلمة مرور المالك:");
    return pw === (data.settings?.reportPassword || "owner1234");
  };

  const startEdit = (rec) => {
    if (!canEdit(rec.date)) return;
    setEditId(rec.id);
    setEditForm({ customer: rec.customer, weight: rec.weight, price: rec.price, payType: rec.payType, notes: rec.notes||"" });
  };

  const saveEdit = (id) => {
    const w = parseFloat(editForm.weight)||0;
    const pr = parseFloat(editForm.price)||0;
    const total = w * pr;
    save({ ...data, sales: data.sales.map(s => s.id === id ? {
      ...s, customer: editForm.customer, weight: w, price: pr, payType: editForm.payType, notes: editForm.notes, total
    } : s) });
    setEditId(null);
  };

  const [form, setForm] = useState({ customer: "", estWeight: "", price: "", payType: "cash", date: today(), notes: "" });
  const [completing, setCompleting] = useState(null);
  const [actualWeight, setActualWeight] = useState("");

  const pending = data.pendingSales || [];

  // إضافة شحنة للطابور (خروج حمولة للعميل)
  const addToQueue = () => {
    if (!form.customer || !form.price) return;
    const ticket = {
      id: uid(), customer: form.customer,
      estWeight: parseFloat(form.estWeight) || 0, price: parseFloat(form.price),
      payType: form.payType, date: form.date, notes: form.notes,
      time: new Date().toLocaleTimeString("ar-IQ", { hour: "2-digit", minute: "2-digit" }),
    };
    save({ ...data, pendingSales: [...pending, ticket] });
    setForm(f => ({ ...f, customer: "", estWeight: "", notes: "" }));
  };

  // إتمام البيع بعد تأكيد الوزن من العميل
  const completeTicket = (ticket) => {
    const w = parseFloat(actualWeight);
    if (!w || w <= 0) return;
    const total = w * ticket.price;
    const rec = {
      id: uid(), customer: ticket.customer, estWeight: ticket.estWeight,
      weight: w, price: ticket.price, payType: ticket.payType,
      date: ticket.date, notes: ticket.notes, total,
    };
    const newPending = pending.filter(p => p.id !== ticket.id);
    const newData = { ...data, sales: [...data.sales, rec], pendingSales: newPending };
    // إنشاء دين تلقائي إذا آجل
    if (ticket.payType === "deferred") {
      newData.debts = [...(data.debts || []), {
        id: uid(), type: "customer", name: ticket.customer,
        amount: total, date: ticket.date,
        notes: `بيع ${w} طن`, status: "pending", payments: [],
      }];
    }
    save(newData);
    setCompleting(null);
    setActualWeight("");
  };

  // حذف من الطابور
  const removeQueue = (id) => {
    save({ ...data, pendingSales: pending.filter(p => p.id !== id) });
  };

  // حذف من المكتملات
  const del = (id) => {
    save({ ...data, sales: data.sales.filter(s => s.id !== id) });
  };

  return (
    <>
      <h2 style={{ color: "#f0b429", fontSize: 18, marginBottom: 16 }}>💰 المبيعات</h2>

      {/* KPIs */}
      <div style={{ ...S.kpiGrid, gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 16 }}>
        <div style={S.kpi("#27ae60")}>
          <div style={S.kpiVal}>{data.sales.length}</div>
          <div style={S.kpiLabel}>صفقات مكتملة</div>
        </div>
        <div style={S.kpi("#e67e22")}>
          <div style={S.kpiVal}>{pending.length}</div>
          <div style={S.kpiLabel}>بانتظار التأكيد</div>
        </div>
        <div style={S.kpi("#1abc9c")}>
          <div style={S.kpiVal}>{fmtNum(data.sales.reduce((s, p) => s + p.weight, 0))} طن</div>
          <div style={S.kpiLabel}>إجمالي الوزن</div>
        </div>
        <div style={S.kpi("#27ae60")}>
          <div style={S.kpiVal}>{fmt(data.sales.reduce((s, p) => s + p.total, 0))}</div>
          <div style={S.kpiLabel}>إجمالي الإيرادات</div>
        </div>
      </div>

      {/* FORM — تسجيل شحنة خارجة */}
      <div style={{ ...S.card, border: "2px solid #27ae6044" }}>
        <div style={S.cardTitle}>🚛 تسجيل شحنة خارجة (حمولة للعميل)</div>
        <div style={S.formGrid}>
          <div style={S.formField}>
            <label style={S.label}>التاريخ</label>
            <input type="date" style={S.input} value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
          </div>
          <div style={S.formField}>
            <label style={S.label}>اسم العميل (الزبون)</label>
            <AutocompleteInput
              style={{ ...S.input, borderColor: form.customer ? "#27ae60" : "#2a3545" }}
              placeholder="مثال: شركة النور، مصنع الحديد..."
              value={form.customer}
              onChange={v => setForm(f => ({ ...f, customer: v }))}
              suggestions={[...new Set(data.sales.map(s => s.customer).filter(Boolean))]}
            />
          </div>
          <div style={S.formField}>
            <label style={S.label}>الوزن التقديري (طن) — اختياري</label>
            <input type="number" style={{ ...S.input, borderColor: "#2a3545" }} placeholder="مثال: 20 (تقريبي)" value={form.estWeight} onChange={e => setForm(f => ({ ...f, estWeight: e.target.value }))} />
            <div style={{ fontSize: 10, color: "#4a5a6a", marginTop: 2 }}>الوزن الفعلي يُدخل لمّا العميل يأكد</div>
          </div>
          <div style={S.formField}>
            <label style={S.label}>سعر الطن (د.ع)</label>
            <input type="number" style={S.input} placeholder="السعر المتفق" value={form.price} onChange={e => setForm(f => ({ ...f, price: e.target.value }))} />
          </div>
          <div style={S.formField}>
            <label style={S.label}>طريقة الدفع</label>
            <select style={S.select} value={form.payType} onChange={e => setForm(f => ({ ...f, payType: e.target.value }))}>
              <option value="cash">نقدي</option><option value="deferred">آجل</option>
            </select>
          </div>
          <div style={S.formField}>
            <label style={S.label}>ملاحظات</label>
            <input style={S.input} placeholder="رقم التريلة، نوع الكارتون..." value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} />
          </div>
        </div>
        <button style={{ ...S.btn("#27ae60"), width: "100%", opacity: (!form.customer || !form.price) ? 0.4 : 1 }} disabled={isReadOnly} onClick={addToQueue}>
          🚛 تسجيل الشحنة ← بانتظار تأكيد الوزن من العميل
        </button>
      </div>

      {/* QUEUE — بانتظار تأكيد الوزن */}
      {pending.length > 0 && (
        <div style={{ ...S.card, border: "2px solid #f0b42966", background: "#13120a" }}>
          <div style={{ ...S.cardTitle, justifyContent: "space-between" }}>
            <span>⏳ بانتظار تأكيد الوزن من العميل</span>
            <span style={{ background: "#f0b42922", border: "1px solid #f0b42966", borderRadius: 20, padding: "2px 12px", fontSize: 13, color: "#f0b429" }}>{pending.length} 📦</span>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {pending.map(ticket => (
              <div key={ticket.id} style={{ background: "#0d1117", border: "1px solid #1e3020", borderRadius: 10, padding: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 24 }}>📦</span>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 16, color: "#f0e6c8" }}>{ticket.customer}</div>
                      <div style={{ fontSize: 11, color: "#7a8a9a" }}>خرجت: {ticket.time} • {ticket.date}</div>
                    </div>
                  </div>
                  <div style={{ textAlign: "left" }}>
                    {ticket.estWeight > 0 && <div style={{ fontSize: 14, color: "#e67e22", fontWeight: 700 }}>~{fmtNum(ticket.estWeight)} طن</div>}
                    <div style={{ fontSize: 10, color: "#7a8a9a" }}>سعر/طن: {fmt(ticket.price)}</div>
                    <div style={{ fontSize: 10, color: ticket.payType === "cash" ? "#4caf50" : "#e67e22" }}>{ticket.payType === "cash" ? "نقدي" : "آجل"}</div>
                  </div>
                </div>

                {ticket.notes && <div style={{ fontSize: 11, color: "#5a6a7a", marginBottom: 8, padding: "4px 8px", background: "#0a0e15", borderRadius: 6 }}>📝 {ticket.notes}</div>}

                {completing === ticket.id ? (
                  <div style={{ background: "#0a1520", borderRadius: 8, padding: 12, border: "1px solid #1e4a60" }}>
                    <div style={{ fontSize: 12, color: "#27ae60", fontWeight: 700, marginBottom: 8 }}>⚖️ الوزن الفعلي من العميل (طن)</div>
                    <div style={{ display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>
                      <input type="number" style={{ ...S.input, flex: 1, minWidth: 120, borderColor: "#27ae6066" }} placeholder="الوزن الفعلي بالطن" value={actualWeight} onChange={e => setActualWeight(e.target.value)} />
                    </div>
                    {actualWeight && parseFloat(actualWeight) > 0 && (
                      <div style={{ marginTop: 8, background: "#0d2010", border: "1px solid #4caf5044", borderRadius: 8, padding: "8px 12px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                          <span style={{ fontSize: 12, color: "#7a8a9a" }}>الوزن الفعلي:</span>
                          <span style={{ color: "#4caf50", fontWeight: 700, fontSize: 18 }}>{fmtNum(parseFloat(actualWeight))} طن</span>
                        </div>
                        {ticket.estWeight > 0 && (
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#7a8a9a" }}>
                            <span>الفرق عن التقديري:</span>
                            <span style={{ color: parseFloat(actualWeight) >= ticket.estWeight ? "#4caf50" : "#e55444" }}>
                              {parseFloat(actualWeight) >= ticket.estWeight ? "+" : ""}{fmtNum(parseFloat(actualWeight) - ticket.estWeight)} طن
                            </span>
                          </div>
                        )}
                        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, paddingTop: 6, borderTop: "1px solid #1e3020" }}>
                          <span style={{ fontSize: 13, color: "#7a8a9a" }}>المبلغ الإجمالي:</span>
                          <span style={{ color: "#f0b429", fontWeight: 700, fontSize: 20 }}>{fmt(parseFloat(actualWeight) * ticket.price)}</span>
                        </div>
                      </div>
                    )}
                    <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                      <button style={{ ...S.btn("#27ae60"), flex: 1, opacity: (!actualWeight || parseFloat(actualWeight) <= 0) ? 0.4 : 1 }} onClick={() => completeTicket(ticket)}>✅ تأكيد وإتمام البيع</button>
                      <button style={{ background: "none", border: "1px solid #4a5a6a", borderRadius: 8, padding: "10px 14px", color: "#7a8a9a", cursor: "pointer", fontFamily: "inherit" }} onClick={() => { setCompleting(null); setActualWeight(""); }}>إلغاء</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: "flex", gap: 8 }}>
                    <button style={{ ...S.btn("#4a90e2"), flex: 1 }} onClick={() => { setCompleting(ticket.id); setActualWeight(""); }}>📱 وصل تأكيد الوزن — أدخل الوزن الفعلي</button>
                    <button style={S.btnDanger} onClick={() => {if(window.confirm("حذف من الطابور؟"))removeQueue(ticket.id)}}>🗑</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* COMPLETED TABLE */}
      <div style={S.card}>
        <div style={S.cardTitle}>✅ المبيعات المكتملة</div>
        {data.sales.length === 0 ? (
          <div style={S.emptyState}>💰 لا توجد مبيعات مكتملة بعد</div>
        ) : (
          <table style={S.table}>
            <thead><tr>
              <th style={S.th}>التاريخ</th>
              <th style={S.th}>الزبون</th>
              <th style={{ ...S.th, color: "#7a8a9a" }}>تقديري</th>
              <th style={{ ...S.th, color: "#4caf50" }}>فعلي(طن)</th>
              <th style={S.th}>سعر/طن</th>
              <th style={S.th}>الإجمالي</th>
              <th style={S.th}>الدفع</th>
              <th style={S.th}></th>
            </tr></thead>
            <tbody>
              {[...data.sales].reverse().map(s => [
                <tr key={s.id}>
                  <td style={S.td}>{s.date}</td>
                  <td style={S.td}>{s.customer}</td>
                  <td style={{ ...S.td, color: "#5a6a7a", fontSize: 11 }}>{s.estWeight ? fmtNum(s.estWeight) : "—"}</td>
                  <td style={{ ...S.td, fontWeight: 700, color: "#4caf50" }}>{fmtNum(s.weight)}</td>
                  <td style={S.td}>{fmt(s.price)}</td>
                  <td style={{ ...S.td, fontWeight: 700, color: "#f0b429" }}>{fmt(s.total)}</td>
                  <td style={S.td}><span style={S.badge(s.payType === "cash" ? "#4caf50" : "#e67e22")}>{s.payType === "cash" ? "نقدي" : "آجل"}</span></td>
                  <td style={S.td}><button style={S.btnDanger} onClick={() => {if(window.confirm("هل أنت متأكد من حذف هذا السجل؟"))del(s.id)}}>🗑</button>
                    <button style={{...S.btnDanger, color: "#4a90e2", border: "1px solid #4a90e244"}} onClick={()=>startEdit(s)}>✏️</button>
                  </td>
                </tr>,
                editId === s.id ? (
                  <tr key={s.id+"_edit"}><td colSpan="8" style={{...S.td, padding: 12, background: "#0a1520", border: "1px solid #1e4a60"}}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>الزبون</label><input style={{...S.input,padding:"6px",fontSize:12}} value={editForm.customer} onChange={e=>setEditForm(f=>({...f,customer:e.target.value}))} /></div>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>الوزن (طن)</label><input type="number" style={{...S.input,padding:"6px",fontSize:12}} value={editForm.weight} onChange={e=>setEditForm(f=>({...f,weight:e.target.value}))} /></div>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>سعر/طن</label><input type="number" style={{...S.input,padding:"6px",fontSize:12}} value={editForm.price} onChange={e=>setEditForm(f=>({...f,price:e.target.value}))} /></div>
                      <div style={{display:"flex",alignItems:"flex-end",gap:4}}>
                        <button style={{...S.btn("#27ae60"),padding:"6px 12px",fontSize:12}} onClick={()=>saveEdit(s.id)}>💾 حفظ</button>
                        <button style={{...S.btnDanger,padding:"6px 8px"}} onClick={()=>setEditId(null)}>✕</button>
                      </div>
                    </div>
                  </td></tr>
                ) : null
              ])}
            </tbody>
          </table>
        )}
      </div>
    </>
  );
}

// ==================== MACHINERY ====================
function Machinery({ data, save, isReadOnly }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({
    date: today(),
    machine: "مولدة",
    expType: "fuel",
    amount: "",
    notes: "",
  });

  const add = () => {
    if (!form.amount || isReadOnly) return;
    const rec = { id: uid(), ...form, amount: parseFloat(form.amount) };
    save({ ...data, machinery: [...data.machinery, rec] });
    setForm({ date: today(), machine: "مولدة", expType: "fuel", amount: "", notes: "" });
    setShowForm(false);
  };

  const del = (id) => {
    save({ ...data, machinery: data.machinery.filter((m) => m.id !== id) });
  };

  const machines = ["مولدة", "شفل", "كابسة", "رافعة"];
  const machineIcons = { "مولدة": "⚡", "شفل": "🚜", "كابسة": "🏗", "رافعة": "🏋️" };
  const expTypeLabel = (t) => t === "fuel" ? "⛽ وقود" : t === "oil" ? "🛢️ زيت" : "🔧 صيانة";
  const expTypeColor = (t) => t === "fuel" ? "#e67e22" : t === "oil" ? "#8e44ad" : "#4a90e2";

  const byMachine = machines.map((m) => ({
    name: m,
    fuel: data.machinery.filter((x) => x.machine === m && x.expType === "fuel").reduce((s, x) => s + x.amount, 0),
    oil: data.machinery.filter((x) => x.machine === m && x.expType === "oil").reduce((s, x) => s + x.amount, 0),
    maintenance: data.machinery.filter((x) => x.machine === m && x.expType === "maintenance").reduce((s, x) => s + x.amount, 0),
  }));

  return (
    <>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h2 style={{ color: "#f0b429", margin: 0, fontSize: 18 }}>⚙️ الآليات والمعدات</h2>
        <button style={S.btn("#9b59b6")} onClick={() => setShowForm(true)}>
          <Icon name="add" size={14} /> إضافة مصرف
        </button>
      </div>

      {/* By Machine Summary — 4 columns */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 16 }}>
        {byMachine.map((m) => (
          <div key={m.name} style={S.kpi("#9b59b6")}>
            <div style={{ fontSize: 18, marginBottom: 4 }}>{machineIcons[m.name]}</div>
            <div style={{ fontSize: 12, color: "#c8b0e8", fontWeight: 700 }}>{m.name}</div>
            <div style={{ fontSize: 10, color: "#e67e22", marginTop: 4 }}>⛽ {fmt(m.fuel)}</div>
            <div style={{ fontSize: 10, color: "#8e44ad" }}>🛢️ {fmt(m.oil)}</div>
            <div style={{ fontSize: 10, color: "#4a90e2" }}>🔧 {fmt(m.maintenance)}</div>
          </div>
        ))}
      </div>

      <div style={S.card}>
        {data.machinery.length === 0 ? (
          <div style={S.emptyState}>⚙️ لا توجد مصاريف مسجلة للآليات</div>
        ) : (
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>التاريخ</th>
                <th style={S.th}>الآلية</th>
                <th style={S.th}>نوع المصرف</th>
                <th style={S.th}>المبلغ</th>
                <th style={S.th}>ملاحظات</th>
                <th style={S.th}></th>
              </tr>
            </thead>
            <tbody>
              {[...data.machinery].reverse().map((m) => (
                <tr key={m.id}>
                  <td style={S.td}>{m.date}</td>
                  <td style={S.td}>{m.machine}</td>
                  <td style={S.td}>
                    <span style={S.badge(expTypeColor(m.expType))}>
                      {expTypeLabel(m.expType)}
                    </span>
                  </td>
                  <td style={{ ...S.td, color: "#e55444", fontWeight: 700 }}>
                    {fmt(m.amount)}
                  </td>
                  <td style={{ ...S.td, color: "#7a8a9a" }}>{m.notes}</td>
                  <td style={S.td}>
                    <button style={S.btnDanger} onClick={() => del(m.id)}>
                      🗑
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {showForm && (
        <Modal title="تسجيل مصرف آلية" onClose={() => setShowForm(false)}>
          <div style={S.formGrid}>
            <div style={S.formField}>
              <label style={S.label}>التاريخ</label>
              <input
                type="date"
                style={S.input}
                value={form.date}
                onChange={(e) => setForm({ ...form, date: e.target.value })}
              />
            </div>
            <div style={S.formField}>
              <label style={S.label}>الآلية</label>
              <select
                style={S.select}
                value={form.machine}
                onChange={(e) => setForm({ ...form, machine: e.target.value })}
              >
                <option>مولدة</option>
                <option>شفل</option>
                <option>كابسة</option>
                <option>رافعة</option>
              </select>
            </div>
            <div style={S.formField}>
              <label style={S.label}>نوع المصرف</label>
              <select
                style={S.select}
                value={form.expType}
                onChange={(e) => setForm({ ...form, expType: e.target.value })}
              >
                <option value="fuel">⛽ وقود</option>
                <option value="oil">🛢️ زيت</option>
                <option value="maintenance">🔧 صيانة</option>
              </select>
            </div>
            <div style={S.formField}>
              <label style={S.label}>المبلغ (د.ع)</label>
              <input
                type="number"
                style={S.input}
                placeholder="المبلغ بالدينار"
                value={form.amount}
                onChange={(e) => setForm({ ...form, amount: e.target.value })}
              />
            </div>
          </div>
          <div style={{ ...S.formField, marginBottom: 16 }}>
            <label style={S.label}>ملاحظات</label>
            <input
              style={S.input}
              placeholder="تفاصيل إضافية"
              value={form.notes}
              onChange={(e) => setForm({ ...form, notes: e.target.value })}
            />
          </div>
          <button
            style={{ ...S.btn("#9b59b6"), width: "100%" }}
            onClick={add}
          >
            💾 حفظ المصرف
          </button>
        </Modal>
      )}
    </>
  );
}

// ==================== WORKERS ====================
function Workers({ data, save, isReadOnly }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ name: "", role: "", wageType: "daily", wage: "", extraPay: "", advance: "", notes: "" });
  const [editing, setEditing] = useState(null);

  const add = () => {
    if (!form.name || !form.wage) return;
    save({ ...data, workers: [...data.workers, {
      id: uid(), ...form, wage: parseFloat(form.wage)||0, extraPay: parseFloat(form.extraPay)||0, advance: parseFloat(form.advance)||0,
    }] });
    setForm({ name: "", role: "", wageType: "daily", wage: "", extraPay: "", advance: "", notes: "" });
    setShowForm(false);
  };

  const del = (id) => {
    if (!window.confirm("هل أنت متأكد من حذف هذا الموظف؟")) return;
    save({ ...data, workers: data.workers.filter(w => w.id !== id) });
  };

  const resetWorker = (id) => {
    if (!window.confirm("تصفير سلف وأجور إضافية؟ (بعد دفع الراتب)")) return;
    save({ ...data, workers: data.workers.map(w => w.id === id ? { ...w, extraPay: 0, advance: 0 } : w) });
  };

  const quickUpdate = (id, field, value) => {
    save({ ...data, workers: data.workers.map(w => w.id === id ? { ...w, [field]: parseFloat(value)||0 } : w) });
  };

  const calcNet = (w) => (w.wage||0) + (w.extraPay||0) - (w.advance||0);
  const totalPayroll = data.workers.reduce((s, w) => s + calcNet(w), 0);

  return (
    <>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h2 style={{ color: "#f0b429", margin: 0, fontSize: 18 }}>👷 الموظفون والرواتب</h2>
        <button onClick={() => !isReadOnly && setShowForm(true)} disabled={isReadOnly} style={{...S.btn("#4a90e2"), opacity: isReadOnly?0.3:1}}>
          <Icon name="add" size={14} /> إضافة موظف
        </button>
      </div>

      <div style={{ ...S.kpiGrid, gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: 16 }}>
        <div style={S.kpi("#1abc9c")}><div style={S.kpiVal}>{data.workers.length}</div><div style={S.kpiLabel}>عدد العمال</div></div>
        <div style={S.kpi("#e55444")}><div style={S.kpiVal}>{fmt(data.workers.reduce((s,w) => s+(w.advance||0), 0))}</div><div style={S.kpiLabel}>إجمالي السلف</div></div>
        <div style={S.kpi("#1abc9c")}><div style={S.kpiVal}>{fmt(totalPayroll)}</div><div style={S.kpiLabel}>صافي الرواتب</div></div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {data.workers.length === 0 ? (
          <div style={{ ...S.card, ...S.emptyState }}>👷 لا توجد بيانات موظفين</div>
        ) : data.workers.map(w => {
          const net = calcNet(w);
          const isEditing = editing === w.id;
          return (
            <div key={w.id} style={{ ...S.card, padding: 14, marginBottom: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 22 }}>👷</span>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15, color: "#f0e6c8" }}>{w.name}</div>
                    <div style={{ fontSize: 11, color: "#7a8a9a" }}>{w.role || "عامل"} • <span style={{ color: w.wageType === "monthly" ? "#4a90e2" : "#1abc9c" }}>{w.wageType === "monthly" ? "شهري" : "يومي"}</span></div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 4 }}>
                  <button title="تعديل سريع" style={{ background: "none", border: "1px solid #4a90e244", borderRadius: 6, padding: "4px 8px", color: "#4a90e2", cursor: "pointer", fontSize: 12 }}
                    onClick={() => setEditing(isEditing ? null : w.id)}>✏️</button>
                  <button title="تصفير" style={{ ...S.btnDanger, background: "#0d2b1a", border: "1px solid #1abc9c66", color: "#1abc9c", fontSize: 14 }}
                    onClick={() => resetWorker(w.id)}>↺</button>
                  <button style={S.btnDanger} onClick={() => del(w.id)}>🗑</button>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6, marginBottom: 8 }}>
                <div style={{ background: "#0d1117", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#1abc9c" }}>{fmt(w.wage)}</div>
                  <div style={{ fontSize: 9, color: "#5a6a7a" }}>الأجر</div>
                </div>
                <div style={{ background: (w.extraPay||0) > 0 ? "#1a1a0a" : "#0d1117", border: (w.extraPay||0) > 0 ? "1px solid #f0b42944" : "none", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#f0b429" }}>{(w.extraPay||0) > 0 ? fmt(w.extraPay) : "—"}</div>
                  <div style={{ fontSize: 9, color: "#5a6a7a" }}>أجور إضافية</div>
                </div>
                <div style={{ background: "#0d1117", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#e55444" }}>{(w.advance||0) > 0 ? fmt(w.advance) : "—"}</div>
                  <div style={{ fontSize: 9, color: "#5a6a7a" }}>سلفة</div>
