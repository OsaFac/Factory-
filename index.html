        <div style={S.kpi("#e55444")}><div style={S.kpiVal}>{fmt(data.workers.reduce((s,w) => s+(w.advance||0), 0))}</div><div style={S.kpiLabel}>إجمالي السلف</div></div>
        <div style={S.kpi("#1abc9c")}><div style={S.kpiVal}>{fmt(totalPayroll)}</div><div style={S.kpiLabel}>صافي الرواتب</div></div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {data.workers.length === 0 ? (
          <div style={{ ...S.card, ...S.emptyState }}>👷 لا توجد بيانات موظفين</div>
        ) : data.workers.map(w => {
          const net = calcNet(w);
          const isEditing = editing === w.id;
          return (
            <div key={w.id} style={{ ...S.card, padding: 14, marginBottom: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 22 }}>👷</span>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15, color: "#f0e6c8" }}>{w.name}</div>
                    <div style={{ fontSize: 11, color: "#7a8a9a" }}>{w.role || "عامل"} • <span style={{ color: w.wageType === "monthly" ? "#4a90e2" : "#1abc9c" }}>{w.wageType === "monthly" ? "شهري" : "يومي"}</span></div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 4 }}>
                  <button title="تعديل سريع" style={{ background: "none", border: "1px solid #4a90e244", borderRadius: 6, padding: "4px 8px", color: "#4a90e2", cursor: "pointer", fontSize: 12 }}
                    onClick={() => setEditing(isEditing ? null : w.id)}>✏️</button>
                  <button title="تصفير" style={{ ...S.btnDanger, background: "#0d2b1a", border: "1px solid #1abc9c66", color: "#1abc9c", fontSize: 14 }}
                    onClick={() => resetWorker(w.id)}>↺</button>
                  <button style={S.btnDanger} onClick={() => del(w.id)}>🗑</button>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6, marginBottom: 8 }}>
                <div style={{ background: "#0d1117", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#1abc9c" }}>{fmt(w.wage)}</div>
                  <div style={{ fontSize: 9, color: "#5a6a7a" }}>الأجر</div>
                </div>
                <div style={{ background: (w.extraPay||0) > 0 ? "#1a1a0a" : "#0d1117", border: (w.extraPay||0) > 0 ? "1px solid #f0b42944" : "none", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#f0b429" }}>{(w.extraPay||0) > 0 ? fmt(w.extraPay) : "—"}</div>
                  <div style={{ fontSize: 9, color: "#5a6a7a" }}>أجور إضافية</div>
                </div>
                <div style={{ background: "#0d1117", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#e55444" }}>{(w.advance||0) > 0 ? fmt(w.advance) : "—"}</div>
                  <div style={{ fontSize: 9, color: "#5a6a7a" }}>سلفة</div>
                </div>
                <div style={{ background: "#0a1510", border: "1px solid #1abc9c44", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: net >= 0 ? "#1abc9c" : "#e55444" }}>{fmt(net)}</div>
                  <div style={{ fontSize: 9, color: "#5a6a7a" }}>الصافي</div>
                </div>
              </div>
              {isEditing && (
                <div style={{ background: "#0a1520", borderRadius: 8, padding: 10, border: "1px solid #1e4a60", display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                  <div>
                    <label style={{ fontSize: 10, color: "#1abc9c", display: "block" }}>الأجر</label>
                    <input type="number" style={{ ...S.input, padding: "6px 8px", fontSize: 13 }} value={w.wage||""} onChange={e => quickUpdate(w.id, "wage", e.target.value)} />
                  </div>
                  <div>
                    <label style={{ fontSize: 10, color: "#f0b429", display: "block" }}>أجور إضافية</label>
                    <input type="number" style={{ ...S.input, padding: "6px 8px", fontSize: 13, borderColor: "#f0b42944" }} placeholder="أوفر تايم" value={w.extraPay||""} onChange={e => quickUpdate(w.id, "extraPay", e.target.value)} />
                  </div>
                  <div>
                    <label style={{ fontSize: 10, color: "#e55444", display: "block" }}>سلفة</label>
                    <input type="number" style={{ ...S.input, padding: "6px 8px", fontSize: 13 }} value={w.advance||""} onChange={e => quickUpdate(w.id, "advance", e.target.value)} />
                  </div>
                </div>
              )}
              {w.notes && <div style={{ fontSize: 10, color: "#5a6a7a", marginTop: 4 }}>📝 {w.notes}</div>}
            </div>
          );
        })}
      </div>

      {showForm && (
        <Modal title="إضافة موظف جديد" onClose={() => setShowForm(false)}>
          <div style={S.formGrid}>
            <div style={S.formField}><label style={S.label}>اسم الموظف</label>
              <AutocompleteInput id="wrk-name" style={S.input} placeholder="اسم الموظف" value={form.name} onChange={v => setForm({...form, name: v})} suggestions={[...new Set(data.workers.map(w=>w.name).filter(Boolean))]} onKeyDown={enterKey("wrk-role")} /></div>
            <div style={S.formField}><label style={S.label}>الوظيفة</label>
              <input id="wrk-role" style={S.input} placeholder="عامل كبس، سائق..." value={form.role} onChange={e => setForm({...form, role: e.target.value})} onKeyDown={enterKey("wrk-wage")} /></div>
            <div style={S.formField}><label style={S.label}>الأجر (د.ع)</label>
              <input id="wrk-wage" type="number" style={S.input} placeholder="المبلغ" value={form.wage} onChange={e => setForm({...form, wage: e.target.value})} onKeyDown={enterKey("wrk-extra")} /></div>
            <div style={S.formField}><label style={S.label}>أجور إضافية (أوفر تايم)</label>
              <input id="wrk-extra" type="number" style={S.input} placeholder="0" value={form.extraPay} onChange={e => setForm({...form, extraPay: e.target.value})} onKeyDown={enterKey("wrk-advance")} />
              <div style={{ fontSize: 10, color: "#4a5a6a", marginTop: 2 }}>مبلغ ثابت عن أعمال إضافية</div></div>
            <div style={S.formField}><label style={S.label}>سلفة (د.ع)</label>
              <input id="wrk-advance" type="number" style={S.input} placeholder="0" value={form.advance} onChange={e => setForm({...form, advance: e.target.value})} onKeyDown={enterKey(null, add)} /></div>
            <div style={S.formField}><label style={S.label}>ملاحظات</label>
              <input style={S.input} placeholder="ملاحظات اختيارية" value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} onKeyDown={enterKey(null, add)} /></div>
          </div>
          <button style={{ ...S.btn("#1abc9c"), width: "100%" }} onClick={add}>💾 حفظ بيانات الموظف</button>
        </Modal>
      )}
    </>
  );
}

// ==================== DEBT CARD (extracted to prevent remount) ====================
function DebtCard({ d, color, payingId, payAmount, payNote, setPayingId, setPayAmount, setPayNote, addPayment, del, fmt, fmtNum }) {
  const paid = (d.payments || []).reduce((s, p) => s + p.amount, 0);
  const remaining = d.amount - paid;
  const pct = d.amount > 0 ? (paid / d.amount) * 100 : 0;
  const statusColor = d.status === "paid" ? "#4caf50" : d.status === "partial" ? "#f0b429" : "#e67e22";
  const statusLabel = d.status === "paid" ? "✅ مسدد بالكامل" : d.status === "partial" ? "🔶 مسدد جزئياً" : "⏳ معلق";
  const isPayingThis = payingId === d.id;

  return (
    <div style={{ background: "#0d1117", border: `1px solid ${statusColor}33`, borderRadius: 10, padding: 12, opacity: d.status === "paid" ? 0.65 : 1, marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <div>
          <div style={{ fontWeight: 700, fontSize: 15, color: "#e8e0d5" }}>{d.name}</div>
          <div style={{ fontSize: 11, color: "#7a8a9a" }}>{d.date}{d.notes ? ` — ${d.notes}` : ""}</div>
        </div>
        <span style={{ background: statusColor + "22", color: statusColor, borderRadius: 12, padding: "2px 8px", fontSize: 10, fontWeight: 700 }}>{statusLabel}</span>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
        <div style={{ background: "#161b25", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color }}>{fmt(d.amount)}</div>
          <div style={{ fontSize: 10, color: "#7a8a9a" }}>المبلغ الأصلي</div>
        </div>
        <div style={{ background: "#161b25", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#4caf50" }}>{fmt(paid)}</div>
          <div style={{ fontSize: 10, color: "#7a8a9a" }}>المسدد</div>
        </div>
        <div style={{ background: remaining > 0 ? "#1a0d0d" : "#0d1a0d", borderRadius: 6, padding: "6px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: remaining > 0 ? "#e55444" : "#4caf50" }}>{fmt(remaining)}</div>
          <div style={{ fontSize: 10, color: "#7a8a9a" }}>المتبقي</div>
        </div>
      </div>

      {d.amount > 0 && (
        <div style={{ height: 6, background: "#0a0d10", borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
          <div style={{ height: "100%", width: `${Math.min(100, pct)}%`, background: "linear-gradient(90deg, #4caf50, #27ae60)", borderRadius: 4 }} />
        </div>
      )}

      {(d.payments || []).length > 0 && (
        <div style={{ background: "#0a0e15", borderRadius: 6, padding: "6px 8px", marginBottom: 8 }}>
          <div style={{ fontSize: 10, color: "#7a8a9a", marginBottom: 4 }}>سجل التسديدات:</div>
          {d.payments.map((p, i) => (
            <div key={p.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, padding: "2px 0", borderBottom: i < d.payments.length - 1 ? "1px solid #1e2530" : "none" }}>
              <span style={{ color: "#c8d0da" }}>{p.date}{p.note ? ` — ${p.note}` : ""}</span>
              <span style={{ color: "#4caf50", fontWeight: 700 }}>{fmt(p.amount)}</span>
            </div>
          ))}
        </div>
      )}

      {d.status !== "paid" && (
        isPayingThis ? (
          <div style={{ background: "#0a1520", borderRadius: 8, padding: 10, border: "1px solid #4a90e244" }}>
            <div style={{ fontSize: 12, color: "#4a90e2", fontWeight: 700, marginBottom: 8 }}>
              تسجيل دفعة — المتبقي: {fmt(remaining)}
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <input
                type="number"
                style={{ background: "#0d1117", border: "1px solid #2a3545", borderRadius: 8, padding: "8px 10px", color: "#e8e0d5", fontFamily: "inherit", fontSize: 14, flex: 2, outline: "none" }}
                placeholder={`المبلغ (أقصى: ${Math.round(remaining)})`}
                value={payAmount}
                onChange={e => setPayAmount(e.target.value)}
                autoFocus
              />
              <input
                style={{ background: "#0d1117", border: "1px solid #2a3545", borderRadius: 8, padding: "8px 10px", color: "#e8e0d5", fontFamily: "inherit", fontSize: 14, flex: 3, outline: "none" }}
                placeholder="ملاحظة (اختياري)"
                value={payNote}
                onChange={e => setPayNote(e.target.value)}
              />
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button
                style={{ flex: 1, background: "#27ae60", border: "none", borderRadius: 8, padding: "10px", color: "#fff", cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 700, opacity: !payAmount ? 0.4 : 1 }}
                onClick={() => addPayment(d.id)}
              >
                ✅ حفظ الدفعة
              </button>
              <button
                style={{ background: "none", border: "1px solid #4a5a6a", borderRadius: 8, padding: "10px 14px", color: "#7a8a9a", cursor: "pointer", fontFamily: "inherit" }}
                onClick={() => { setPayingId(null); setPayAmount(""); setPayNote(""); }}
              >
                إلغاء
              </button>
            </div>
          </div>
        ) : (
          <div style={{ display: "flex", gap: 8 }}>
            <button
              style={{ flex: 1, background: "#1a1200", border: "1px solid #f0b42966", borderRadius: 8, padding: "8px", color: "#f0b429", cursor: "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: 700 }}
              onClick={() => { setPayingId(d.id); setPayAmount(""); setPayNote(""); }}
            >
              💳 تسديد دفعة
            </button>
            <button
              style={{ background: "#1a0808", border: "1px solid #e5544466", borderRadius: 8, padding: "8px 10px", color: "#e55444", cursor: "pointer", fontFamily: "inherit" }}
              onClick={() => del(d.id)}
            >
              🗑
            </button>
          </div>
        )
      )}
      {d.status === "paid" && (
        <button style={{ width: "100%", textAlign: "center", background: "#1a0808", border: "1px solid #e5544466", borderRadius: 8, padding: "6px", color: "#e55444", cursor: "pointer", fontFamily: "inherit", fontSize: 12 }} onClick={() => del(d.id)}>🗑 حذف</button>
      )}
    </div>
  );
}

// ==================== DEBTS ====================
function Debts({ data, save, isReadOnly, logAction = ()=>{} }) {
  const [showForm, setShowForm] = useState(false);
  const [payingId, setPayingId] = useState(null);
  const [payAmount, setPayAmount] = useState("");
  const [payNote, setPayNote] = useState("");
  const [form, setForm] = useState({ date: today(), type: "customer", name: "", amount: "", notes: "" });

  const add = () => {
    if (!form.name || !form.amount) return;
    const rec = { id: uid(), ...form, amount: parseFloat(form.amount), status: "pending", payments: [] };
    save({ ...data, debts: [...data.debts, rec] });
    setForm({ date: today(), type: "customer", name: "", amount: "", notes: "" });
    setShowForm(false);
  };

  const addPayment = (id) => {
    const amount = parseFloat(payAmount);
    if (!amount || amount <= 0) return;
    const debt = data.debts.find(d => d.id === id);
    if (!debt) return;
    const paid = (debt.payments || []).reduce((s, p) => s + p.amount, 0);
    const remaining = debt.amount - paid;
    const actualPay = Math.min(amount, remaining);
    const newPayments = [...(debt.payments || []), { id: uid(), amount: actualPay, date: today(), note: payNote }];
    const newPaid = paid + actualPay;
    const status = newPaid >= debt.amount ? "paid" : "partial";
    save({ ...data, debts: data.debts.map(d => d.id === id ? { ...d, payments: newPayments, status } : d) });
    setPayingId(null); setPayAmount(""); setPayNote("");
  };

  const del = (id) => save({ ...data, debts: data.debts.filter(d => d.id !== id) });

  const getRemaining = (d) => d.amount - (d.payments || []).reduce((s, p) => s + p.amount, 0);
  const getPaid = (d) => (d.payments || []).reduce((s, p) => s + p.amount, 0);

  const customerDebts = data.debts.filter(d => d.type === "customer");
  const supplierDebts = data.debts.filter(d => d.type === "supplier");
  const pendingCustomer = customerDebts.filter(d => d.status !== "paid").reduce((s, d) => s + getRemaining(d), 0);
  const pendingSupplier = supplierDebts.filter(d => d.status !== "paid").reduce((s, d) => s + getRemaining(d), 0);

  const renderDebtList = (debts, color) => debts.map(d => (
    <DebtCard
      key={d.id}
      d={d}
      color={color}
      payingId={payingId}
      payAmount={payAmount}
      payNote={payNote}
      setPayingId={setPayingId}
      setPayAmount={setPayAmount}
      setPayNote={setPayNote}
      addPayment={addPayment}
      del={del}
      fmt={fmt}
      fmtNum={fmtNum}
    />
  ));

  return (
    <>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h2 style={{ color: "#f0b429", margin: 0, fontSize: 18 }}>📋 متابعة الديون</h2>
        <button onClick={() => !isReadOnly && setShowForm(true)} disabled={isReadOnly} style={{...S.btn("#e67e22"), opacity: isReadOnly?0.3:1}}>
          <Icon name="add" size={14} /> إضافة دين
        </button>
      </div>

      <div style={{ ...S.kpiGrid, gridTemplateColumns: "repeat(2,1fr)", marginBottom: 16 }}>
        <div style={S.kpi("#27ae60")}>
          <div style={S.kpiVal}>{fmt(pendingCustomer)}</div>
          <div style={S.kpiLabel}>متبقي من الزبائن</div>
        </div>
        <div style={S.kpi("#e55444")}>
          <div style={S.kpiVal}>{fmt(pendingSupplier)}</div>
          <div style={S.kpiLabel}>متبقي للمجهزين</div>
        </div>
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>👤 ديون الزبائن</div>
        {customerDebts.length === 0 ? <div style={S.emptyState}>لا توجد ديون زبائن</div> : renderDebtList(customerDebts, "#27ae60")}
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>🏭 ديون المجهزين</div>
        {supplierDebts.length === 0 ? <div style={S.emptyState}>لا توجد ديون مجهزين</div> : renderDebtList(supplierDebts, "#e55444")}
      </div>

      {showForm && (
        <Modal title="إضافة دين جديد" onClose={() => setShowForm(false)}>
          <div style={S.formGrid}>
            <div style={S.formField}>
              <label style={S.label}>التاريخ</label>
              <input type="date" style={S.input} value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} />
            </div>
            <div style={S.formField}>
              <label style={S.label}>نوع الدين</label>
              <select style={S.select} value={form.type} onChange={e => setForm({ ...form, type: e.target.value })}>
                <option value="customer">دين زبون (لنا)</option>
                <option value="supplier">دين مجهز (علينا)</option>
              </select>
            </div>
            <div style={S.formField}>
              <label style={S.label}>الاسم</label>
              <AutocompleteInput
                id="dbt-name"
                style={S.input}
                placeholder="اسم الزبون أو المجهز"
                value={form.name}
                onChange={v => setForm({ ...form, name: v })}
                onKeyDown={enterKey("dbt-amount")}
                suggestions={[
                  ...new Set([
                    ...data.sales.map(s=>s.customer),
                    ...data.purchases.map(p=>p.supplier),
                    ...data.debts.map(d=>d.name),
                  ].filter(Boolean))
                ]}
              />
            </div>
            <div style={S.formField}>
              <label style={S.label}>المبلغ (د.ع)</label>
              <input id="dbt-amount" type="number" style={S.input} placeholder="المبلغ الكلي" value={form.amount} onChange={e => setForm({ ...form, amount: e.target.value })} onKeyDown={enterKey(null, add)} />
            </div>
            <div style={{ ...S.formField, gridColumn: "1/-1" }}>
              <label style={S.label}>ملاحظات</label>
              <input style={S.input} placeholder="تفاصيل الدين" value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} onKeyDown={enterKey(null, add)} />
            </div>
          </div>
          <button style={{ ...S.btn("#e67e22"), width: "100%" }} onClick={add}>💾 حفظ الدين</button>
        </Modal>
      )}
    </>
  );
}

// ==================== REPORTS (PASSWORD PROTECTED) ====================
const REPORT_PASSWORD = "owner1234"; // change in settings

function Reports({ data, save, unlocked, onUnlock, onLock }) {
  const { ask: askPin, Modal2: PinModal } = useOwnerPin();
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState(false);
  const [reportType, setReportType] = useState("summary"); // summary | sales | purchases | machinery | workers | expenses | daily
  const [periodType, setPeriodType] = useState("today"); // today | week | month | year | custom | all
  const [dateFrom, setDateFrom] = useState(today());
  const [dateTo, setDateTo] = useState(today());
  const [editPartners, setEditPartners] = useState(false);
  const [partnerForm, setPartnerForm] = useState(data.partners);

  // إغلاق تلقائي بعد 10 دقائق من عدم الاستخدام
  useEffect(() => {
    if (!unlocked) return;
    const timer = setTimeout(() => onLock(), 10 * 60 * 1000);
    return () => clearTimeout(timer);
  }, [unlocked, data, onLock]);

  if (!unlocked) {
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "48px 20px" }}>
        <div style={{ fontSize: 56, marginBottom: 16 }}>🔒</div>
        <div style={{ fontSize: 18, fontWeight: 700, color: "#f0b429", marginBottom: 8 }}>قسم التقارير والأرباح</div>
        <div style={{ fontSize: 13, color: "#7a8a9a", marginBottom: 24, textAlign: "center" }}>
          هذا القسم محمي بكلمة مرور<br />لأصحاب المعمل فقط
        </div>
        <div style={{ width: "100%", maxWidth: 320 }}>
          <input
            type="password"
            style={{ ...S.input, textAlign: "center", fontSize: 18, letterSpacing: 4, marginBottom: 10, borderColor: pwError ? "#e55444" : "#2a3545" }}
            placeholder="••••••••"
            value={pwInput}
            onChange={e => { setPwInput(e.target.value); setPwError(false); }}
            onKeyDown={e => { if (e.key === "Enter") { if (pwInput === (data.settings?.reportPassword || REPORT_PASSWORD)) { onUnlock(); setPwInput(""); } else setPwError(true); } }}
          />
          {pwError && <div style={{ color: "#e55444", fontSize: 12, textAlign: "center", marginBottom: 8 }}>❌ كلمة المرور خاطئة</div>}
          <button style={{ ...S.btn("#f0b429"), width: "100%", color: "#0f1117" }} onClick={() => {
            if (pwInput === (data.settings?.reportPassword || REPORT_PASSWORD)) { onUnlock(); setPwInput(""); }
            else setPwError(true);
          }}>
            🔓 دخول
          </button>
        </div>
      </div>
    );
  }

  // ---- Filter by period ----
  const getRange = () => {
    const now = new Date(); const y = now.getFullYear(); const m = now.getMonth();
    if (periodType === "today") { const t = today(); return [t, t]; }
    if (periodType === "week") {
      const d = new Date(); d.setDate(d.getDate() - 6);
      return [d.toISOString().split("T")[0], today()];
    }
    if (periodType === "month") return [`${y}-${String(m+1).padStart(2,"0")}-01`, today()];
    if (periodType === "year") return [`${y}-01-01`, today()];
    if (periodType === "custom") return [dateFrom, dateTo];
    return [null, null]; // all
  };

  const [rangeFrom, rangeTo] = getRange();
  const inRange = (item, field = "date") => {
    if (!rangeFrom) return true;
    const d = item[field]; return d >= rangeFrom && d <= rangeTo;
  };

  const filtPurchases = data.purchases.filter(i => inRange(i));
  const filtSales = data.sales.filter(i => inRange(i));
  const filtMachinery = data.machinery.filter(i => inRange(i));
  const filtExpenses = (data.expenses || []).filter(i => inRange(i));

  const totSales = filtSales.reduce((s, p) => s + (p.total || 0), 0);
  const totPurchases = filtPurchases.reduce((s, p) => s + (p.total || 0), 0);
  const totMachinery = filtMachinery.reduce((s, m) => s + (m.amount || 0), 0);
  const totExpensesGen = filtExpenses.reduce((s, e) => s + (e.amount || 0), 0);
  const totWorkers = data.workers.reduce((s, w) => {
    const g = w.wageType === "monthly" ? w.wage : (w.wage || 0) * (w.shifts || 0);
    return s + g - (w.advance || 0);
  }, 0);
  const totalAllCosts = totPurchases + totMachinery + totExpensesGen + (periodType === "month" || periodType === "all" ? totWorkers : 0);
  const netProfit = totSales - totalAllCosts;
  const isProfit = netProfit >= 0;

  // ---- Auto daily snapshot (saved at end of day) ----
  const todayStr = today();
  const snapshots = data.dailySnapshots || [];
  const hasToday = snapshots.some(s => s.date === todayStr);
  const saveSnapshot = () => {
    if (hasToday) return;
    const todaySales     = data.sales.filter(s => s.date === todayStr).reduce((acc, curr) => acc + curr.total, 0);
    const todayPurchases = data.purchases.filter(p => p.date === todayStr).reduce((acc, curr) => acc + curr.total, 0);
    const todayExpenses  = (data.expenses || []).filter(e => e.date === todayStr).reduce((acc, curr) => acc + curr.amount, 0);
    const todayMachinery = data.machinery.filter(m => m.date === todayStr).reduce((acc, curr) => acc + curr.amount, 0);
    const snap = {
      date: todayStr,
      sales:     todaySales,
      purchases: todayPurchases,
      expenses:  todayExpenses,
      machinery: todayMachinery,
      net: todaySales - (todayPurchases + todayExpenses + todayMachinery),
    };
    save({ ...data, dailySnapshots: [...snapshots, snap] });
  };

  const savePartners = () => { save({ ...data, partners: partnerForm }); setEditPartners(false); };

  const periodLabels = { today: "اليوم", week: "الأسبوع", month: "الشهر", year: "السنة", custom: "فترة مخصصة", all: "كل الفترات" };

  const btnPeriod = (v) => ({
    padding: "6px 12px", borderRadius: 20, border: `1px solid ${periodType===v?"#f0b429":"#2a3545"}`,
    background: periodType===v?"#f0b429":"none", color: periodType===v?"#0f1117":"#7a8a9a",
    cursor: "pointer", fontSize: 11, fontFamily: "inherit", fontWeight: periodType===v?700:400,
  });
  const btnReport = (v) => ({
    padding: "6px 10px", borderRadius: 8, border: `1px solid ${reportType===v?"#4a90e2":"#2a3545"}`,
    background: reportType===v?"#1a2a3a":"none", color: reportType===v?"#4a90e2":"#7a8a9a",
    cursor: "pointer", fontSize: 11, fontFamily: "inherit",
  });

  return (
    <>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <h2 style={{ color: "#f0b429", margin: 0, fontSize: 18 }}>📈 التقارير والتحليل</h2>
        <button style={{ ...S.btn("#e55444"), fontSize: 11, padding: "6px 10px" }} onClick={onLock}>
          🔒 قفل
        </button>
      </div>

      {/* Period & report type selector */}
      <div style={{ background: "#0d1117", borderRadius: 12, padding: 14, border: "1px solid #2a3545", marginBottom: 12 }}>
        {/* Quick period buttons */}
        <div style={{ fontSize: 11, color: "#7a8a9a", marginBottom: 6, fontWeight: 700 }}>📅 الفترة الزمنية</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
          {["today","week","month","year","custom","all"].map(v => (
            <button key={v} style={btnPeriod(v)} onClick={() => setPeriodType(v)}>{periodLabels[v]}</button>
          ))}
        </div>

        {/* Date range - ALWAYS visible, highlighted when custom */}
        <div style={{ background: periodType==="custom" ? "#0a1520" : "#0a0d10", borderRadius: 8, padding: "10px 12px", border: `1px solid ${periodType==="custom"?"#4a90e2":"#1e2530"}`, marginBottom: 10 }}>
          <div style={{ fontSize: 11, color: periodType==="custom"?"#4a90e2":"#4a5a6a", fontWeight: 700, marginBottom: 8 }}>
            🔍 بحث بالتاريخ — {periodType==="custom" ? "مفعّل" : "اختر تاريخاً أو اضغط «فترة مخصصة»"}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <div>
              <label style={{ ...S.label, color: "#4a90e2" }}>من تاريخ</label>
              <input
                type="date"
                style={{ ...S.input, fontSize: 13, borderColor: periodType==="custom"?"#4a90e266":"#1e2530" }}
                value={dateFrom}
                onChange={e => { setDateFrom(e.target.value); setPeriodType("custom"); }}
              />
            </div>
            <div>
              <label style={{ ...S.label, color: "#4a90e2" }}>إلى تاريخ</label>
              <input
                type="date"
                style={{ ...S.input, fontSize: 13, borderColor: periodType==="custom"?"#4a90e266":"#1e2530" }}
                value={dateTo}
                onChange={e => { setDateTo(e.target.value); setPeriodType("custom"); }}
              />
            </div>
          </div>
          {periodType === "custom" && (
            <div style={{ fontSize: 11, color: "#4a90e2", marginTop: 6, textAlign: "center" }}>
              ✅ عرض النتائج من {dateFrom} إلى {dateTo}
            </div>
          )}
        </div>

        {/* Report type */}
        <div style={{ fontSize: 11, color: "#7a8a9a", marginBottom: 6, fontWeight: 700 }}>📋 نوع التقرير</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {[["summary","📊 ملخص"],["detailed","📋 تقرير مفصل"],["sales","💰 مبيعات"],["purchases","📦 مشتريات"],["machinery","⚙️ آليات"],["workers","👷 موظفون"],["expenses","🧾 مصاريف"],["daily","📅 سجل يومي"]].map(([v,l]) => (
            <button key={v} style={btnReport(v)} onClick={() => setReportType(v)}>{l}</button>
          ))}
        </div>
      </div>

      {/* ---- SUMMARY ---- */}
      {reportType === "summary" && (
        <>
          {/* Net result banner */}
          <div style={{ ...S.card, background: isProfit ? "#0a140a" : "#140a0a", border: `2px solid ${isProfit?"#4caf5066":"#e5544466"}`, marginBottom: 12 }}>
            <div style={{ textAlign: "center", padding: "10px 0" }}>
              <div style={{ fontSize: 13, color: "#7a8a9a", marginBottom: 4 }}>{periodLabels[periodType]} — {periodType==="custom"?`${dateFrom} → ${dateTo}`:""}</div>
              <div style={{ fontSize: 30, fontWeight: 700, color: isProfit?"#4caf50":"#e55444" }}>
                {isProfit?"▲ ربح":"▼ خسارة"} {fmt(Math.abs(netProfit))}
              </div>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10, marginBottom: 12 }}>
            {[
              {l:"إيرادات المبيعات", v:fmt(totSales), c:"#4caf50"},
              {l:"تكلفة المشتريات", v:fmt(totPurchases), c:"#e67e22"},
              {l:"مصاريف الآليات", v:fmt(totMachinery), c:"#9b59b6"},
              {l:"مصاريف عامة", v:fmt(totExpensesGen), c:"#e55444"},
            ].map((k,i)=>(
              <div key={i} style={{ ...S.kpi(k.c), padding: 10 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: k.c }}>{k.v}</div>
                <div style={{ fontSize: 11, color: "#7a8a9a" }}>{k.l}</div>
              </div>
            ))}
          </div>

          {/* Partners */}
          <div style={S.card}>
            <div style={{ ...S.cardTitle, justifyContent: "space-between" }}>
              <span>🤝 توزيع الأرباح</span>
              <button style={{ ...S.btn("#4a90e2"), padding: "4px 10px", fontSize: 11 }} onClick={() => setEditPartners(!editPartners)}>✏️ تعديل</button>

            {editPartners ? (
              <div>
                {partnerForm.map((p,i) => (
                  <div key={p.id} style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                    <input style={{ ...S.input, flex: 2 }} value={p.name} onChange={e => { const nf=[...partnerForm]; nf[i]={...nf[i],name:e.target.value}; setPartnerForm(nf); }} />
                    <input type="number" style={{ ...S.input, flex: 1 }} value={p.share} onChange={e => { const nf=[...partnerForm]; nf[i]={...nf[i],share:parseFloat(e.target.value)||0}; setPartnerForm(nf); }} />
                    <span style={{ color: "#7a8a9a", alignSelf: "center", fontSize: 12 }}>%</span>
                  </div>
                ))}
                <button style={{ ...S.btn("#27ae60"), width: "100%" }} onClick={savePartners}>💾 حفظ</button>
              </div>
            ) : isProfit ? (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8 }}>
                {data.partners.map(p => {
                  const earned = Math.round((netProfit * p.share) / 100);
                  const withdrawn = (data.partnerWithdrawals || []).filter(w => w.partnerId === p.id).reduce((s,w) => s + w.amount, 0);
                  const remaining = earned - withdrawn;
                  return (
                    <div key={p.id} style={{ background: "#0d1520", borderRadius: 10, padding: 12, textAlign: "center" }}>
                      <div style={{ fontSize: 18, marginBottom: 4 }}>👤</div>
                      <div style={{ fontWeight: 700, color: "#e8e0d5", fontSize: 13 }}>{p.name}</div>
                      <div style={{ fontSize: 11, color: "#7a8a9a" }}>{p.share}%</div>
                      <div style={{ fontSize: 16, fontWeight: 700, color: "#4caf50", marginTop: 6 }}>{fmt(earned)}</div>
                      {withdrawn > 0 && <>
                        <div style={{ fontSize: 11, color: "#e55444", marginTop: 2 }}>سحب: {fmt(withdrawn)}</div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: remaining >= 0 ? "#f0b429" : "#e55444", marginTop: 2 }}>
                          متبقي: {fmt(remaining)}
                        </div>
                      </>}
                      <button onClick={async () => {
                        const amt = await askPin(`سحب من حصة ${p.name} (المتاح: ${fmt(remaining)}) — أدخل المبلغ:`);
                        if (!amt || isNaN(parseFloat(amt))) return;
                        const w = { id: uid(), partnerId: p.id, partnerName: p.name, amount: parseFloat(amt), date: today(), type: "profit", notes: "سحب أرباح" };
                        save({ ...data, partnerWithdrawals: [...(data.partnerWithdrawals||[]), w] });
                      }} style={{ marginTop: 8, background: "none", border: "1px solid #f0b42966", borderRadius: 6, padding: "4px 10px", color: "#f0b429", cursor: "pointer", fontFamily: "inherit", fontSize: 11, width: "100%" }}>
                        💸 سحب
                      </button>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div style={{ textAlign: "center", color: "#e55444", padding: 16 }}>⚠️ لا يوجد ربح للتوزيع</div>
            )}
          </div>

          {/* سجل السحوبات */}
          {(data.partnerWithdrawals || []).length > 0 && (
            <div style={{ ...S.card, border: "1px solid #f0b42933" }}>
              <div style={{ ...S.cardTitle, justifyContent: "space-between" }}>
                <span>💸 سجل سحوبات الشركاء</span>
                <span style={{ fontSize: 12, color: "#e55444" }}>
                  إجمالي: {fmt((data.partnerWithdrawals||[]).reduce((s,w)=>s+w.amount,0))}
                </span>
              </div>
              <table style={S.table}>
                <thead><tr>
                  <th style={S.th}>التاريخ</th>
                  <th style={S.th}>الشريك</th>
                  <th style={S.th}>النوع</th>
                  <th style={S.th}>المبلغ</th>
                  <th style={S.th}>ملاحظات</th>
                  <th style={S.th}></th>
                </tr></thead>
                <tbody>
                  {[...(data.partnerWithdrawals||[])].reverse().map(w => (
                    <tr key={w.id}>
                      <td style={S.td}>{w.date}</td>
                      <td style={{ ...S.td, fontWeight: 700 }}>{w.partnerName}</td>
                      <td style={S.td}>
                        <span style={S.badge(w.type==="advance"?"#e55444":"#f0b429")}>
                          {w.type==="advance"?"💰 سلفة":"💸 أرباح"}
                        </span>
                      </td>
                      <td style={{ ...S.td, color: "#e55444", fontWeight: 700 }}>{fmt(w.amount)}</td>
                      <td style={{ ...S.td, color: "#7a8a9a" }}>{w.notes||"—"}</td>
                      <td style={S.td}>
                        <button style={S.btnDanger} onClick={() => {
                          if (window.confirm("حذف هذا السحب؟")) save({ ...data, partnerWithdrawals: (data.partnerWithdrawals||[]).filter(x=>x.id!==w.id) });
                        }}>🗑</button>
                      </td>
                    </tr>
                  ))}

        const allEvents = [
          ...filtSales.map(s => ({ date:s.date, type:"sale", icon:"💰", label:`بيع — ${s.customer}`, dir:"in", amount:s.total||0, weight:`${s.weight||0} طن`, notes:s.notes||"", payType:s.payType })),

          ...filtMachinery.map(m => ({ date:m.date, type:"machinery", icon:"⚙️", label:`${m.expType==="fuel"?"وقود":m.expType==="oil"?"زيت":m.expType==="wire"?"سيم ربط":"صيانة"}${m.machine?" — "+m.machine:""}`, dir:"out", amount:m.amount||0, weight:m.qty?`${m.qty} ${m.expType==="wire"?"كغم":"لتر"}`:"", notes:m.notes||"", payType:"" })),

          ...(data.cashTransactions||[]).filter(t=>inRange(t)).map(t => ({ date:t.date, type:"cash", icon:t.dir==="in"?"↑":"↓", label:t.label||"معاملة صندوق", dir:t.dir, amount:t.amount||0, weight:"", notes:t.notes||"", payType:"", isCash:true })),
        ].sort((a,b) => a.date.localeCompare(b.date));

        const sumIn    = allEvents.filter(e=>e.dir==="in"  && !e.isCash).reduce((s,e)=>s+(e.amount||0),0);
        const sumOut   = allEvents.filter(e=>e.dir==="out" && !e.isCash).reduce((s,e)=>s+(e.amount||0),0);
        const cashInT  = allEvents.filter(e=>e.dir==="in"  &&  e.isCash).reduce((s,e)=>s+(e.amount||0),0);
        const cashOutT = allEvents.filter(e=>e.dir==="out" &&  e.isCash).reduce((s,e)=>s+(e.amount||0),0);
        const netOps   = sumIn - sumOut;

        const printReport = () => {
          const msgTxt = `تقرير مفصل — ${factoryName}\nالفترة: ${periodLabel}\nإجمالي مبيعات: ${sumIn.toLocaleString()} د.ع\nإجمالي مشتريات: ${filtPurchases.reduce((s,p)=>s+(p.total||0),0).toLocaleString()} د.ع\nمصاريف: ${(totMachinery+totExpensesGen).toLocaleString()} د.ع\nصافي الفترة: ${netOps.toLocaleString()} د.ع ${netOps>=0?"▲ ربح":"▼ خسارة"}`;

              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#f0b429"}}>📋 التقرير المفصل</div>
                <div style={{fontSize:11,color:"#7a8a9a",marginTop:2}}>{periodLabel} — {allEvents.length} حركة</div>
              </div>
              <PrintShareBar onPrint={printReport} />
            </div>

            {/* ملخص سريع */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:12}}>
              {[
                {l:"💰 المبيعات",           v:sumIn,                    c:"#27ae60"},
                {l:"📦 المشتريات",          v:filtPurchases.reduce((s,p)=>s+(p.total||0),0), c:"#e67e22"},
                {l:"⚙️ مصاريف آليات+عامة", v:totMachinery+totExpensesGen, c:"#9b59b6"},

              ].map((k,i)=>(
                <div key={i} style={{background:"#0d1520",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between"}}>

            {cashInT>0||cashOutT>0 ? (

            {allEvents.length === 0 ? <div style={S.emptyState}>لا توجد حركات في هذه الفترة</div> : (

                    <th style={{...S.th,color:"#e55444"}}>خارج ▼</th>

                  <tbody>
                    {allEvents.map((e,i)=>(
                      <tr key={i} style={{opacity:e.isCash?0.65:1}}>
                        <td style={{...S.td,fontSize:11,color:"#7a8a9a"}}>{e.date}</td>

                        <td style={{...S.td,color:"#e55444",fontWeight:700}}>{e.dir==="out"?fmt(e.amount):"—"}</td>
                        <td style={S.td}>{e.payType?<span style={S.badge(e.payType==="cash"?"#27ae60":"#e67e22")}>{e.payType==="cash"?"نقدي":"آجل"}</span>:"—"}</td>
                        <td style={{...S.td,color:"#9b59b6",fontSize:11}}>{e.notes||"—"}</td>

                {/* المحصلة في الأسفل */}
                <div style={{background:netOps>=0?"#0a1a0a":"#1a0a0a",border:`2px solid ${netOps>=0?"#27ae6066":"#e5544466"}`,borderRadius:12,padding:16,marginTop:8}}>
                  <div style={{fontSize:12,color:"#7a8a9a",marginBottom:10,fontWeight:700}}>📊 المحصلة الإجمالية للفترة</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                    <div style={{background:"#0d1a0d",borderRadius:8,padding:"8px 12px"}}>
                      <div style={{fontSize:11,color:"#7a8a9a"}}>إجمالي الداخل (مبيعات)</div>
                      <div style={{fontSize:18,fontWeight:700,color:"#27ae60",marginTop:4}}>{fmt(sumIn)}</div>
                    </div>
                    <div style={{background:"#1a0d0d",borderRadius:8,padding:"8px 12px"}}>
                      <div style={{fontSize:11,color:"#7a8a9a"}}>إجمالي الخارج (مشتريات+مصاريف)</div>
                      <div style={{fontSize:18,fontWeight:700,color:"#e55444",marginTop:4}}>{fmt(sumOut)}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"center",padding:"12px 0",borderTop:"1px solid #1e2530"}}>
                    <div style={{fontSize:13,color:"#7a8a9a",marginBottom:6}}>{netOps>=0?"▲ صافي الربح":"▼ صافي الخسارة"}</div>
                    <div style={{fontSize:32,fontWeight:700,color:netOps>=0?"#27ae60":"#e55444"}}>{fmt(Math.abs(netOps))}</div>
                    <div style={{fontSize:11,color:"#4a5a6a",marginTop:4}}>د.ع — {periodLabel}</div>
                  </div>
                </div>
              </>
            )}
          </div>
        );
      })()}

      {reportType === "daily" && (
        <div style={S.card}>
          <div style={{ ...S.cardTitle, justifyContent: "space-between" }}>
            <span>📅 السجل اليومي المحفوظ</span>
            <button style={{ ...S.btn("#4a90e2"), fontSize: 11, padding: "4px 10px" }} onClick={saveSnapshot} disabled={hasToday}>
              {hasToday ? "✅ محفوظ اليوم" : "💾 حفظ اليوم"}
            </button>
          </div>
          {snapshots.length === 0 ? (
            <div style={S.emptyState}>📅 لا توجد لقطات يومية محفوظة بعد — اضغط "حفظ اليوم" كل مساء</div>
          ) : (
            <table style={S.table}>
              <thead><tr>
                <th style={S.th}>التاريخ</th><th style={S.th}>مبيعات</th>
                <th style={S.th}>مشتريات</th><th style={S.th}>مصاريف</th>
                <th style={{...S.th,color:"#4caf50"}}>صافي اليوم</th>
              </tr></thead>
              <tbody>
                {[...snapshots].reverse().map((s,i) => (
                  <tr key={i}>
                    <td style={{...S.td,fontWeight:600}}>{s.date}</td>
                    <td style={{...S.td,color:"#4caf50"}}>{fmt(s.sales)}</td>
                    <td style={{...S.td,color:"#e67e22"}}>{fmt(s.purchases)}</td>
                    <td style={{...S.td,color:"#e55444"}}>{fmt((s.expenses||0)+(s.machinery||0))}</td>
                    <td style={{...S.td,fontWeight:700,color:s.net>=0?"#4caf50":"#e55444"}}>{fmt(s.net)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}
    {PinModal}
    </>
  );
}

// ── n8n Webhook helpers ──
const N8N_KEY = "cardboard_n8n_cfg";
function getN8nCfg()    { try { return JSON.parse(localStorage.getItem(N8N_KEY) || "{}"); } catch { return {}; } }
function setN8nCfg(cfg) { try { localStorage.setItem(N8N_KEY, JSON.stringify(cfg)); } catch {} }

// ==================== SETTINGS ====================
function Settings({ data, save, updateSbCfg, hasSb, token, syncStatus, onLoginClick, onSignOut }) {
  const [name, setName]   = useState(data.settings?.factoryName || "معمل كبس الكارتون");
  const [newPw, setNewPw] = useState("");

  // Supabase config state (reads from localStorage)
  const storedCfg = getSbCfg();
  const [sbUrl,        setSbUrl]        = useState(storedCfg.url  || "");
  const [sbKey,        setSbKey]        = useState(storedCfg.key  || "");
  const [sbMode,       setSbMode]       = useState(storedCfg.mode || "write");
  const [sbTestStatus, setSbTestStatus] = useState(""); // "" | "testing" | "ok" | "error"

  // n8n config state
  const storedN8n = getN8nCfg();
  const [n8nWebhook,    setN8nWebhook]    = useState(storedN8n.webhook || "");
  const [n8nSecret,     setN8nSecret]     = useState(storedN8n.secret  || "");
  const [n8nTestStatus, setN8nTestStatus] = useState(""); // "" | "testing" | "ok" | "error"

  const saveN8nCfg = () => {
    setN8nCfg({ webhook: n8nWebhook.trim(), secret: n8nSecret.trim() });
    alert("✅ تم حفظ إعدادات n8n بنجاح!");
  };

  const testN8nWebhook = async () => {
    if (!n8nWebhook.trim()) return;
    setN8nTestStatus("testing");
    try {
      const cfg = getSbCfg();
      const payload = {
        action: "test_connection",
        timestamp: new Date().toISOString(),
        factory: data.settings?.factoryName || "معمل كبس الكارتون",
        secret: n8nSecret,
        summary: {
          totalSales: data.sales.reduce((s,p) => s+(p.total||0),0),
          totalPurchases: data.purchases.reduce((s,p) => s+(p.total||0),0),
          openDebts: data.debts.filter(d=>d.status!=="paid").length,
          workersCount: data.workers.length,
        }
      };
      const res = await fetch(n8nWebhook.trim(), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      setN8nTestStatus(res.ok ? "ok" : "error");
    } catch { setN8nTestStatus("error"); }
  };

  const sendManualReport = async () => {
    const cfg = getN8nCfg();
    if (!cfg.webhook) { alert("أدخل Webhook URL أولاً"); return; }
    const todayStr = today();
    const totalPurchases = data.purchases.reduce((s,p) => s+(p.total||0),0);
    const totalSales = data.sales.reduce((s,p) => s+(p.total||0),0);
    const totalWorkers = data.workers.reduce((s,w) => s+(w.wage||0)+(w.extraPay||0),0);
    const totalMachinery = data.machinery.reduce((s,m) => s+(m.amount||0),0);
    const totalExpenses = (data.expenses||[]).reduce((s,e) => s+(e.amount||0),0);
    const netProfit = totalSales - (totalPurchases + totalWorkers + totalMachinery + totalExpenses);
    const pendingDebtsIn = data.debts.filter(d=>d.type==="customer"&&d.status!=="paid").reduce((s,d)=>s+((d.amount||0)-(d.payments||[]).reduce((a,p)=>a+p.amount,0)),0);
    const pendingDebtsOut = data.debts.filter(d=>d.type==="supplier"&&d.status!=="paid").reduce((s,d)=>s+((d.amount||0)-(d.payments||[]).reduce((a,p)=>a+p.amount,0)),0);
    const todaySales = data.sales.filter(s=>s.date===todayStr).reduce((a,s)=>a+s.total,0);
    const todayPurchases = data.purchases.filter(p=>p.date===todayStr).reduce((a,p)=>a+p.total,0);
    try {
      const res = await fetch(cfg.webhook, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "manual_report",
          secret: cfg.secret,
          timestamp: new Date().toISOString(),
          date: todayStr,
          factory: data.settings?.factoryName || "معمل كبس الكارتون",
          summary: {
            totalSales, totalPurchases, totalWorkers, totalMachinery, totalExpenses, netProfit,
            pendingDebtsIn, pendingDebtsOut,
            todaySales, todayPurchases,
            workersCount: data.workers.length,
            openDebtsCount: data.debts.filter(d=>d.status!=="paid").length,
            pendingWeighsCount: (data.pendingWeighs||[]).length,
            pendingSalesCount: (data.pendingSales||[]).length,
          },
          partners: data.partners.map(p => ({
            name: p.name,
            share: p.share,
            profit: Math.round(netProfit * p.share / 100),
          })),
          alerts: [
            ...data.debts.filter(d=>d.status!=="paid").filter(d=>{
              const paid=(d.payments||[]).reduce((a,p)=>a+p.amount,0);
              const remaining=(d.amount||0)-paid;
              const daysOld=Math.floor((Date.now()-new Date(d.date).getTime())/(86400000));
              return remaining>0 && daysOld>30;
            }).map(d=>({ type:"old_debt", name:d.name, amount:d.amount, daysOld: Math.floor((Date.now()-new Date(d.date).getTime())/(86400000)) })),
            ...(data.pendingWeighs||[]).length>3 ? [{ type:"queue_alert", message:`${(data.pendingWeighs||[]).length} شاحنات في الطابور` }] : [],
          ]
        }),
      });
      if (res.ok) alert("✅ تم إرسال التقرير إلى n8n بنجاح!");
      else alert("❌ فشل الإرسال — تأكد من Webhook URL");
    } catch(e) { alert("❌ خطأ: " + e.message); }
  };

  const saveSbCfg = () => {
    const cfg = { url: sbUrl.trim(), key: sbKey.trim(), mode: sbMode };
    updateSbCfg(cfg);
    alert("✅ تم حفظ إعدادات Supabase.\n\nأعد تشغيل التطبيق لتفعيل المزامنة.\nثم سجّل دخولك بالإيميل وكلمة المرور.");
  };

  const testSbConnection = async () => {
    if (!sbUrl.trim() || !sbKey.trim()) return;
    setSbTestStatus("testing");
    try {
      const result = await sbAPI.pull(sbUrl.trim(), sbKey.trim(), null);
      setSbTestStatus(result !== undefined ? "ok" : "error");
    } catch { setSbTestStatus("error"); }
  };

  const clearSbCfg = () => {
    if (window.confirm("هل تريد فصل هذا الجهاز عن Supabase؟")) {
      updateSbCfg({});
      setSbUrl(""); setSbKey(""); setSbMode("write");
      setSbToken("");
      alert("✅ تم فصل الجهاز — يعمل محلياً فقط");
    }
  };

  const exportData = () => {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `factory-data-${today()}.json`;
    a.click();
  };

  const resetConfirm = () => {
    if (window.confirm("⚠️ هل أنت متأكد من حذف جميع البيانات؟")) {
      save(defaultData);
    }
  };

  return (
    <>
      <h2 style={{ color: "#f0b429", margin: "0 0 16px 0", fontSize: 18 }}>
        🔧 الإعدادات
      </h2>

      <div style={S.card}>
        <div style={S.cardTitle}>🏭 إعدادات المعمل</div>
        <div style={{ ...S.formField, marginBottom: 12 }}>
          <label style={S.label}>اسم المعمل</label>
          <input style={S.input} value={name} onChange={e => setName(e.target.value)} />
        </div>
        <button
          style={{ ...S.btn("#f0b429"), color: "#0f1117", width: "100%", marginBottom: 8 }}
          onClick={() => save({ ...data, settings: { ...data.settings, factoryName: name } })}
        >
          💾 حفظ الاسم
        </button>
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>🔐 تغيير كلمة مرور التقارير</div>
        <div style={{ fontSize: 12, color: "#7a8a9a", marginBottom: 10 }}>
          كلمة المرور الحالية لحماية التقارير والأرباح
        </div>
        <input type="password" style={{ ...S.input, marginBottom: 10 }} placeholder="كلمة المرور الجديدة"
          value={newPw} onChange={e => setNewPw(e.target.value)} />
        <button style={{ ...S.btn("#e55444"), width: "100%" }} onClick={() => {
          if (newPw.length < 4) return;
          save({ ...data, settings: { ...data.settings, reportPassword: newPw } });
          setNewPw("");
          alert("✅ تم تغيير كلمة المرور");
        }}>
          🔐 تغيير كلمة مرور المالك
        </button>
        <div style={{ marginTop: 10, fontSize: 11, color: "#4a5a6a" }}>كلمات مرور الأدوار الأخرى:</div>
        {[
          { key: "accountantPin", label: "كلمة مرور المحاسب 📒", default: "acc2024" },
          { key: "productionPin", label: "كلمة مرور مدير الإنتاج 🏭", default: "prod2024" },
        ].map(({ key, label, default: def }) => (
          <div key={key} style={{ marginTop: 8 }}>
            <label style={{ ...S.label, marginBottom: 4 }}>{label} (الافتراضي: {def})</label>
            <div style={{ display: "flex", gap: 8 }}>
              <input type="password" style={{ ...S.input, flex: 1 }} placeholder={`كلمة مرور جديدة لـ ${label}`}
                id={`pin-${key}`} />
              <button style={{ ...S.btn("#4a90e2"), minWidth: 80 }} onClick={() => {
                const v = document.getElementById(`pin-${key}`)?.value;
                if (!v || v.length < 4) return;
                save({ ...data, settings: { ...data.settings, [key]: v } });
                document.getElementById(`pin-${key}`).value = "";
                alert(`✅ تم تغيير ${label}`);
              }}>حفظ</button>
            </div>
          </div>
        ))}
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>📤 تصدير واسترجاع البيانات</div>
        <button style={{ ...S.btn("#4a90e2"), width: "100%", marginBottom: 10 }} onClick={exportData}>
          📥 تصدير نسخة احتياطية JSON
        </button>
        <div style={{ background: "#0d1117", borderRadius: 8, padding: 12, fontSize: 11, color: "#7a8a9a", marginBottom: 10 }}>
          إجمالي السجلات: {data.purchases.length + data.sales.length + data.machinery.length + data.workers.length + (data.expenses||[]).length} سجل
        </div>
        <button style={{ ...S.btnDanger, width: "100%", textAlign: "center" }} onClick={resetConfirm}>
          ⚠️ إعادة تعيين جميع البيانات
        </button>
      </div>

      {/* FIX 6: Database & backup info */}
      {/* ══ SUPABASE CONFIG ══ */}
      <div style={{ background: "#060e1a", borderRadius: 12, padding: 16, border: "1px solid #4a90e266", marginBottom: 12 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: "#4a90e2", marginBottom: 4 }}>☁️ ربط Supabase — مزامنة سحابية</div>
        <div style={{ fontSize: 11, color: "#7a8a9a", marginBottom: 14 }}>
          ربط الجهاز بقاعدة بيانات Supabase — يحل مشكلة ضياع البيانات والمزامنة بين الأجهزة
        </div>

        {/* Device Mode */}
        <div style={{ marginBottom: 12 }}>
          <label style={S.label}>نوع هذا الجهاز</label>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 6 }}>
            {[
              { v: "write", label: "✏️ جهاز الكتابة", desc: "اللابتوب — يكتب ويقرأ", color: "#27ae60" },
              { v: "read",  label: "👁️ جهاز القراءة", desc: "الموبايل — يراقب فقط", color: "#9b59b6" },
            ].map(opt => (
              <div
                key={opt.v}
                onClick={() => setSbMode(opt.v)}
                style={{
                  borderRadius: 8, padding: "10px 12px", cursor: "pointer",
                  border: `2px solid ${sbMode === opt.v ? opt.color : "#2a3545"}`,
                  background: sbMode === opt.v ? opt.color + "15" : "#0d1117",
                  transition: "all 0.2s",
                }}
              >

const EXPENSE_CATS = [
  { id: "rent", label: "إيجار", icon: "🏠" },
  { id: "food", label: "طعام", icon: "🍽️" },
  { id: "transport", label: "نقل", icon: "🚗" },
  { id: "misc", label: "نثرية", icon: "📎" },
  { id: "electricity", label: "كهرباء", icon: "⚡" },
  { id: "internet", label: "إنترنت", icon: "🌐" },
];


function Expenses({ data, save, isReadOnly, logAction = ()=>{} }) {
  const [form, setForm] = useState({ date: today(), category: "rent", amount: "", notes: "" });
  const [lastSaved, setLastSaved] = useState(null);

  const expenses = data.expenses || [];

  const add = () => {
    if (!form.amount || isReadOnly) return;
    const rec = { id: uid(), ...form, amount: parseFloat(form.amount) };
    save({ ...data, expenses: [...expenses, rec] });
    setLastSaved(EXPENSE_CATS.find(c => c.id === form.category)?.label);
    setForm(f => ({ ...f, amount: "", notes: "" }));
  };

  const del = (id) => save({ ...data, expenses: expenses.filter(e => e.id !== id) });

  const total = expenses.reduce((s, e) => s + e.amount, 0);
  const byCat = EXPENSE_CATS.map(c => ({
    ...c,
    total: expenses.filter(e => e.category === c.id).reduce((s, e) => s + e.amount, 0),
  }));

  return (
    <>
      <h2 style={{ color: "#f0b429", margin: "0 0 16px 0", fontSize: 18 }}>🧾 المصاريف العامة</h2>

      {isReadOnly && (
        <div style={{ background: "#0d0820", border: "1px solid #9b59b644", borderRadius: 10, padding: "10px 14px", marginBottom: 14, display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
          <span style={{ fontSize: 18 }}>👁️</span>
          <span style={{ color: "#9b59b6", fontWeight: 700 }}>وضع المراقبة — لا يمكن إضافة أو تعديل البيانات من هذا الجهاز</span>
        </div>
      )}


      {/* Category summary */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 16 }}>
        {byCat.map(c => (
          <div key={c.id} style={S.kpi("#e55444")}>
            <div style={{ fontSize: 18, marginBottom: 2 }}>{c.icon}</div>
            <div style={{ fontSize: 11, color: "#c8a0a0", fontWeight: 700 }}>{c.label}</div>
            <div style={{ fontSize: 13, color: c.total > 0 ? "#e55444" : "#4a5a6a", fontWeight: 700, marginTop: 4 }}>{fmt(c.total)}</div>
          </div>
        ))}
      </div>

      {/* Total */}
      <div style={{ ...S.card, background: "#1a0a0a", border: "1px solid #e5544444", marginBottom: 16, padding: "12px 16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ color: "#7a8a9a", fontSize: 14 }}>إجمالي المصاريف</span>
          <span style={{ color: "#e55444", fontWeight: 700, fontSize: 22 }}>{fmt(total)}</span>
        </div>
      </div>

      {/* Form — always open */}
      <div style={{ ...S.card, border: "1px solid #e5544444", background: "#13100f" }}>
        <div style={{ ...S.cardTitle, justifyContent: "space-between" }}>
          <span>➕ إضافة مصروف</span>
          {lastSaved && <span style={{ fontSize: 11, color: "#4caf50", fontWeight: 400 }}>✅ تم حفظ: {lastSaved}</span>}
        </div>
        <div style={S.formGrid}>
          <div style={S.formField}>
            <label style={S.label}>التاريخ</label>
            <input type="date" style={S.input} value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
          </div>
          <div style={S.formField}>
            <label style={S.label}>نوع المصروف</label>
            <select style={S.select} value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}>
              {EXPENSE_CATS.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select>
          </div>
          <div style={S.formField}>
            <label style={S.label}>المبلغ (د.ع)</label>
            <input id="exp-amount" type="number" style={S.input} placeholder="المبلغ" value={form.amount} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} onKeyDown={enterKey(null, add)} />

      </div>

        <div style={S.cardTitle}>📋 سجل المصاريف</div>
        {expenses.length === 0 ? (

          <table style={S.table}>
            <thead><tr>

                    <td style={{ ...S.td, color: "#7a8a9a", fontSize: 11 }}>{e.notes}</td>

                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </>
  );
}

const AI_KEY_STORAGE = "cardboard_ai_key";
const AI_PROVIDER_STORAGE = "cardboard_ai_provider";
const AI_HISTORY_KEY = "cardboard_ai_history";

function getAIKey() { try { return localStorage.getItem(AI_KEY_STORAGE) || ""; } catch { return ""; } }
function setAIKey(k) { try { localStorage.setItem(AI_KEY_STORAGE, k); } catch {} }
function getAIProvider() { try { return localStorage.getItem(AI_PROVIDER_STORAGE) || "gemini"; } catch { return "gemini"; } }
function setAIProviderStorage(p) { try { localStorage.setItem(AI_PROVIDER_STORAGE, p); } catch {} }

function AIAssistant({ data }) {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [apiKey, setApiKeyState] = useState(() => getAIKey());
  const [provider, setProviderState] = useState(() => getAIProvider());
  const [showSettings, setShowSettings] = useState(false);
  const [tempKey, setTempKey] = useState("");
  const chatRef = React.useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages]);

  // Build factory context summary for AI
  const buildContext = () => {
    const todayStr = today();
    const totalPurchases = data.purchases.reduce((s, p) => s + (p.total || 0), 0);
    const totalSales = data.sales.reduce((s, p) => s + (p.total || 0), 0);
    const totalWorkers = data.workers.reduce((s, w) => s + (w.wage||0) + (w.extraPay||0), 0);
    const totalMachinery = data.machinery.reduce((s, m) => s + (m.amount || 0), 0);
    const totalExpenses = (data.expenses || []).reduce((s, e) => s + (e.amount || 0), 0);
    const netProfit = totalSales - (totalPurchases + totalWorkers + totalMachinery + totalExpenses);

    const pendingDebtsIn = data.debts.filter(d => d.type === "customer" && d.status !== "paid")
      .reduce((s, d) => s + ((d.amount || 0) - (d.payments || []).reduce((a, p) => a + p.amount, 0)), 0);
    const pendingDebtsOut = data.debts.filter(d => d.type === "supplier" && d.status !== "paid")
      .reduce((s, d) => s + ((d.amount || 0) - (d.payments || []).reduce((a, p) => a + p.amount, 0)), 0);

    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput("");
    setLoading(true);

    try {
      let assistantText = "";

      if (provider === "anthropic") {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-3-5-sonnet-latest",
            max_tokens: 1500,
            system: buildContext(),
            messages: newMessages.map(m => ({ role: m.role, content: m.content })),
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `HTTP ${res.status}`);
        }
        const result = await res.json();
        assistantText = result.content.map(c => c.text || "").join("");
      } else if (provider === "gemini") {
        // Google Gemini
        const geminiMessages = newMessages.map(m => ({
          role: m.role === "assistant" ? "model" : "user",
          parts: [{ text: m.content }],
        }));
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            systemInstruction: { parts: [{ text: buildContext() }] },
            contents: geminiMessages,
            generationConfig: { maxOutputTokens: 1500 },
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `HTTP ${res.status}`);
        }
        const result = await res.json();
        assistantText = result.candidates?.[0]?.content?.parts?.map(p => p.text || "").join("") || "لم أتمكن من الرد";
      } else {
        // OpenAI compatible
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`,
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            max_tokens: 1500,
            messages: [
              { role: "system", content: buildContext() },
              ...newMessages.map(m => ({ role: m.role, content: m.content })),
            ],
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `HTTP ${res.status}`);
        }
        const result = await res.json();
        assistantText = result.choices[0]?.message?.content || "";
      }

      setMessages([...newMessages, { role: "assistant", content: assistantText }]);
    } catch (err) {
      setMessages([...newMessages, { role: "assistant", content: `⚠️ خطأ: ${err.message}\n\nتأكد من مفتاح API والاتصال بالإنترنت.` }]);

    setLoading(false);
  };
