                      {msg.content}
                    </div>
                  </div>
                ))}

                {loading && (
                  <div style={{ display: "flex", justifyContent: "flex-start" }}>
                    <div style={{
                      background: "#1a2235", border: "1px solid #2a3545",
                      borderRadius: "16px 16px 16px 4px", padding: "12px 18px",
                      fontSize: 13, color: "#7a8a9a",
                    }}>
                      <span style={{ animation: "pulse-ai 1s infinite" }}>🤖</span> جاري التحليل...
                    </div>
                  </div>
                )}
              </>
            )}
          </div>

          {/* Quick prompts bar (when there are messages) */}
          {messages.length > 0 && !showSettings && (
            <div style={{
              padding: "4px 8px", borderTop: "1px solid #1e2530",
              display: "flex", gap: 4, overflowX: "auto",
            }}>
              {QUICK_PROMPTS.slice(0, 4).map((q, i) => (
                <button key={i} onClick={() => sendMessage(q.prompt)} style={{
                  background: "#0d1117", border: "1px solid #1e2530", borderRadius: 12,
                  padding: "3px 8px", color: "#7a8a9a", cursor: "pointer",
                  fontSize: 10, fontFamily: "inherit", whiteSpace: "nowrap",
                }}>
                  {q.icon} {q.text}
                </button>
              ))}
            </div>
          )}

          {/* Input */}
          {!showSettings && (
            <div style={{
              padding: "10px 12px",
              borderTop: "1px solid #2a3545",
              display: "flex",
              gap: 8,
              alignItems: "center",
              background: "#0d1117",
            }}>
              <input
                style={{
                  flex: 1,
                  background: "#161d2b",
                  border: "1px solid #2a3545",
                  borderRadius: 20,
                  padding: "9px 14px",
                  color: "#e8e0d5",
                  fontSize: 13,
                  fontFamily: "inherit",
                  outline: "none",
                }}
                placeholder={apiKey ? "اسأل عن بيانات المعمل..." : "أدخل مفتاح API أولاً ⚙️"}
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === "Enter" && !loading && sendMessage(input)}
                disabled={loading}
              />
              <button
                onClick={() => sendMessage(input)}
                disabled={loading || !input.trim()}
                style={{
                  width: 38, height: 38, borderRadius: "50%",
                  background: loading || !input.trim() ? "#1a2235" : "linear-gradient(135deg, #4a90e2, #6c5ce7)",
                  border: "none", cursor: loading ? "not-allowed" : "pointer",
                  color: "#fff", fontSize: 16,
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}
              >
                ↑
              </button>
            </div>
          )}
        </div>
      )}
    </>
  );
}

// ==================== PRODUCTION MODULE ====================
function Production({ data, save, isReadOnly }) {
  const [form, setForm] = useState({ date: today(), balesCount: "", baleWeightTons: "", baleWeightKg: "", notes: "", shift: "صباح" });
  const productions = data.productions || [];

  // وزن البالة = أطنان + كغم إضافية
  const calcBaleWeight = (tons, kg) => (parseFloat(tons)||0) + (parseFloat(kg)||0)/1000;

  const addProduction = () => {
    const baleWeight = calcBaleWeight(form.baleWeightTons, form.baleWeightKg);
    if (!form.balesCount || baleWeight <= 0) return;
    const rec = {
      id: uid(), date: form.date, shift: form.shift,
      balesCount: parseInt(form.balesCount),
      baleWeightTons: parseFloat(form.baleWeightTons)||0,
      baleWeightKg: parseFloat(form.baleWeightKg)||0,
      totalWeightTons: baleWeight * parseInt(form.balesCount),
      notes: form.notes,
      time: new Date().toLocaleTimeString("ar-IQ", { hour: "2-digit", minute: "2-digit" }),
    };
    const newInventory = (data.balesInventory||0) + rec.totalWeightTons;
    save({ ...data, productions: [...productions, rec], balesInventory: newInventory });
    setForm(f => ({ ...f, balesCount: "", baleWeightTons: "", baleWeightKg: "", notes: "" }));
  };

  const del = (id) => {
    const rec = productions.find(p => p.id === id);
    if (!rec || !window.confirm("حذف سجل الإنتاج؟")) return;
    save({ ...data, productions: productions.filter(p => p.id !== id), balesInventory: Math.max(0,(data.balesInventory||0)-rec.totalWeightTons) });
  };

  const totalProducedTons = productions.reduce((s, p) => s + (p.totalWeightTons||0), 0);
  const salesWeightTons = data.sales.reduce((s, x) => s + (x.weight||0), 0); // طن مباشرة
  const inventoryTons = Math.max(0, (data.balesInventory||0) - salesWeightTons);
  const purchasesWeightTons = data.purchases.reduce((s, p) => s + (p.weight||0)/1000, 0);

  return (
    <>
      <h2 style={{ color: "#f0b429", margin: "0 0 16px 0", fontSize: 18 }}>🏭 الإنتاج والمخزن</h2>

      {/* KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10, marginBottom: 16 }}>
        {[
          { l: "📦 مشتريات الخام", v: `${purchasesWeightTons.toFixed(2)} طن`, c: "#e67e22" },
          { l: "🏭 إجمالي الإنتاج", v: `${totalProducedTons.toFixed(2)} طن`, c: "#27ae60" },
          { l: "📦 مخزن البالات",   v: `${inventoryTons.toFixed(2)} طن`,   c: "#4a90e2" },
          { l: "💰 مبيع من المخزن", v: `${salesWeightTons.toFixed(2)} طن`,  c: "#f0b429" },
        ].map((k,i) => (
          <div key={i} style={{ background: `linear-gradient(135deg,${k.c}18,#0d1117)`, border: `1px solid ${k.c}33`, borderRadius: 12, padding: "12px 14px" }}>
            <div style={{ fontSize: 17, fontWeight: 700, color: k.c }}>{k.v}</div>
            <div style={{ fontSize: 11, color: "#7a8a9a", marginTop: 3 }}>{k.l}</div>
          </div>
        ))}
      </div>

      {/* إضافة إنتاج */}
      <div style={{ ...S.card, border: "2px solid #27ae6044" }}>
        <div style={S.cardTitle}>➕ تسجيل إنتاج</div>
        <div style={S.formGrid}>
          <div style={S.formField}>
            <label style={S.label}>التاريخ</label>
            <input type="date" style={S.input} value={form.date} onChange={e => setForm(f=>({...f,date:e.target.value}))} />
          </div>
          <div style={S.formField}>
            <label style={S.label}>الوردية</label>
            <select style={S.select} value={form.shift} onChange={e => setForm(f=>({...f,shift:e.target.value}))}>
              <option>صباح</option><option>مساء</option><option>ليل</option>
            </select>
          </div>
          <div style={S.formField}>
            <label style={S.label}>عدد البالات</label>
            <input id="prd-count" type="number" style={S.input} placeholder="مثال: 50" value={form.balesCount} onChange={e => setForm(f=>({...f,balesCount:e.target.value}))} onKeyDown={enterKey("prd-tons")} />
          </div>
          {/* وزن البالة الواحدة */}
          <div style={S.formField}>
            <label style={S.label}>وزن البالة الواحدة</label>
            <div style={{ display: "flex", gap: 6 }}>
              <div style={{ flex: 1 }}>
                <input id="prd-tons" type="number" style={{ ...S.input, borderColor: "#27ae6066" }} placeholder="طن" value={form.baleWeightTons} onChange={e => setForm(f=>({...f,baleWeightTons:e.target.value}))} onKeyDown={enterKey("prd-kg")} />
                <div style={{ fontSize: 10, color: "#7a8a9a", marginTop: 2, textAlign: "center" }}>طن</div>
              </div>
              <div style={{ flex: 1 }}>
                <input id="prd-kg" type="number" style={{ ...S.input, borderColor: "#4a90e266" }} placeholder="كغم إضافي" value={form.baleWeightKg} onChange={e => setForm(f=>({...f,baleWeightKg:e.target.value}))} min="0" max="999" onKeyDown={enterKey(null, addProduction)} />
                <div style={{ fontSize: 10, color: "#7a8a9a", marginTop: 2, textAlign: "center" }}>+ كغم</div>
              </div>
            </div>
            {(form.baleWeightTons||form.baleWeightKg) && (
              <div style={{ fontSize: 11, color: "#27ae60", marginTop: 4 }}>
                ✓ وزن البالة: {calcBaleWeight(form.baleWeightTons, form.baleWeightKg).toFixed(3)} طن
                {form.balesCount && ` × ${form.balesCount} = ${(calcBaleWeight(form.baleWeightTons,form.baleWeightKg)*parseInt(form.balesCount||0)).toFixed(3)} طن`}
              </div>
            )}
          </div>
          <div style={{ ...S.formField, gridColumn: "1/-1" }}>
            <label style={S.label}>ملاحظات (اختياري)</label>
            <input style={S.input} placeholder="اختياري" value={form.notes} onChange={e => setForm(f=>({...f,notes:e.target.value}))} onKeyDown={enterKey(null, addProduction)} />
          </div>
        </div>
        <button style={{ ...S.btn("#27ae60"), width: "100%", opacity: (!form.balesCount||(!form.baleWeightTons&&!form.baleWeightKg)) ? 0.4 : 1 }}
          disabled={isReadOnly||!form.balesCount||(!form.baleWeightTons&&!form.baleWeightKg)} onClick={addProduction}>
          🏭 حفظ سجل الإنتاج
        </button>
      </div>

      {/* سجل الإنتاج */}
      <div style={S.card}>
        <div style={S.cardTitle}>📋 سجل الإنتاج</div>
        {productions.length === 0 ? <div style={S.emptyState}>🏭 لا توجد سجلات بعد</div> : (
          <table style={S.table}>
            <thead><tr>
              <th style={S.th}>التاريخ</th>
              <th style={S.th}>الوردية</th>
              <th style={S.th}>البالات</th>
              <th style={{...S.th,color:"#7a8a9a"}}>وزن البالة</th>
              <th style={{...S.th,color:"#27ae60"}}>الإجمالي (طن)</th>
              <th style={{...S.th,color:"#7a8a9a"}}>ملاحظات</th>
              <th style={S.th}></th>
            </tr></thead>
            <tbody>
              {[...productions].reverse().map(p => (
                <tr key={p.id}>
                  <td style={S.td}>{p.date}<div style={{fontSize:9,color:"#4a5a6a"}}>{p.time}</div></td>
                  <td style={S.td}>{p.shift}</td>
                  <td style={S.td}>{p.balesCount} بالة</td>
                  <td style={{...S.td,color:"#7a8a9a"}}>{p.baleWeightTons}ط {p.baleWeightKg?`+${p.baleWeightKg}كغم`:""}</td>
                  <td style={{...S.td,color:"#27ae60",fontWeight:700}}>{(p.totalWeightTons||0).toFixed(3)} طن</td>
                  {p.notes ? <td style={{...S.td,color:"#9b59b6",fontSize:11}}>{p.notes}</td> : <td style={S.td}></td>}
                  <td style={S.td}>{!isReadOnly && <button style={S.btnDanger} onClick={()=>del(p.id)}>🗑</button>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </>
  );
}


// ==================== CASHBOX (الصندوق) ====================
function CashBox({ data, save, isReadOnly }) {
  const { ask: askPin, Modal2: PinModal } = useOwnerPin();
  const [view, setView] = useState("journal"); // journal | partners | profit
  const [showDeposit, setShowDeposit] = useState(false);
  const [showWithdraw, setShowWithdraw] = useState(false);
  const [showAddPartner, setShowAddPartner] = useState(false);
  const [depForm, setDepForm]   = useState({ date: today(), amount: "", partnerName: "", type: "cash", notes: "" });
  const [wdForm,  setWdForm]    = useState({ date: today(), amount: "", partnerId: "", type: "advance", notes: "" });
  const [pForm,   setPForm]     = useState({ name: "", share: "" });

  const partners            = data.partners || [];
  const cashTransactions    = data.cashTransactions || []; // unified ledger
  const openingBalance      = data.settings?.openingBalance || 0;

  // ── حسابات الصندوق ──
  // الداخل: رصيد أول المدة + مبيعات نقدية + إيداعات يدوية
  const cashSalesTotal    = data.sales.filter(s => s.payType !== "deferred").reduce((s,x) => s+(x.total||0), 0);
  const cashPurchTotal    = data.purchases.filter(p => p.payType !== "deferred").reduce((s,p) => s+(p.total||0), 0);
  const manualIn          = cashTransactions.filter(t => t.dir === "in" ).reduce((s,t)=>s+t.amount,0);
  const manualOut         = cashTransactions.filter(t => t.dir === "out").reduce((s,t)=>s+t.amount,0);
  const salariesTotal     = data.workers.reduce((s,w)=>s+(w.wage||0)+(w.extraPay||0)-(w.advance||0),0); // السلفة طلعت مسبقاً
  const machineryTotal    = data.machinery.reduce((s,m)=>s+(m.amount||0),0);
  const expensesTotal     = (data.expenses||[]).reduce((s,e)=>s+(e.amount||0),0);

  const totalIn  = openingBalance + cashSalesTotal + manualIn;
  const totalOut = cashPurchTotal + salariesTotal + machineryTotal + expensesTotal + manualOut;
  const balance  = totalIn - totalOut;

  // حسابات الأرباح
  const netRevenue   = data.sales.reduce((s,x)=>s+(x.total||0),0);
  const netCosts     = data.purchases.reduce((s,x)=>s+(x.total||0),0)
                     + data.workers.reduce((s,w)=>s+(w.wage||0)+(w.extraPay||0),0)
                     + data.machinery.reduce((s,m)=>s+(m.amount||0),0)
                     + (data.expenses||[]).reduce((s,e)=>s+(e.amount||0),0);
  const netProfit    = netRevenue - netCosts;
  const perPartner   = partners.length > 0 ? Math.floor(netProfit / partners.length) : 0;

  // إضافة معاملة
  const addTx = (tx) => save({ ...data, cashTransactions: [...cashTransactions, { id: uid(), ...tx }] });
  const delTx = (id) => save({ ...data, cashTransactions: cashTransactions.filter(t=>t.id!==id) });

  const handleDeposit = () => {
    if (!depForm.amount) return;
    addTx({ date: depForm.date, dir: "in", amount: parseFloat(depForm.amount),
      label: depForm.type === "partner" ? `إيداع — ${depForm.partnerName}` : "إيداع نقدي",
      type: depForm.type, notes: depForm.notes });
    setDepForm({ date: today(), amount: "", partnerName: "", type: "cash", notes: "" });
    setShowDeposit(false);
  };

  const handleWithdraw = () => {
    if (!wdForm.amount) return;
    const p = partners.find(x=>x.id===wdForm.partnerId);
    const label = wdForm.type === "advance"
      ? `سلفة${p?" — "+p.name:""}`
      : `سحب نقدي${p?" — "+p.name:""}`;
    const newTx = { id: uid(), date: wdForm.date, dir: "out", amount: parseFloat(wdForm.amount), label, type: wdForm.type, partnerId: wdForm.partnerId||"", notes: wdForm.notes };
    const newWithdrawals = p
      ? [...(data.partnerWithdrawals||[]), { id: uid(), partnerId: p.id, partnerName: p.name, amount: parseFloat(wdForm.amount), date: wdForm.date, type: wdForm.type, notes: wdForm.notes||label }]
      : (data.partnerWithdrawals||[]);
    save({ ...data, cashTransactions: [...cashTransactions, newTx], partnerWithdrawals: newWithdrawals });
    setWdForm({ date: today(), amount: "", partnerId: "", type: "advance", notes: "" });
    setShowWithdraw(false);
  };

  const addPartner = () => {
    if (!pForm.name) return;
    const newP = { id: uid(), name: pForm.name, share: parseFloat(pForm.share)||Math.floor(100/Math.max(partners.length+1,1)) };
    save({ ...data, partners: [...partners, newP] });
    setPForm({ name: "", share: "" });
    setShowAddPartner(false);
  };
  const delPartner = (id) => { if(window.confirm("حذف الشريك؟")) save({...data, partners: partners.filter(p=>p.id!==id)}); };

  // يومية الصندوق — المعاملات اليدوية فقط (سلف، إيداعات، سحوبات، مصاريف)
  // المبيعات والمشتريات لا تظهر هنا - تراجع في تبويب الأرباح
  const autoTx = [
    ...cashTransactions.map(t => ({ ...t, auto:false })),
  ].filter(t=>t.amount>0).sort((a,b)=>b.date.localeCompare(a.date)||0);

  const TX_COLOR = { in:"#27ae60", out:"#e55444" };
  const TX_ICON  = { sale:"💰", purchase:"🚚", salary:"👷", cash:"💵", partner:"🤝", advance:"💳", withdraw:"📤" };

  return (
    <>
      {/* العنوان + أزرار */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{color:"#f0b429",margin:0,fontSize:18}}>💵 الصندوق</h2>
        <div style={{display:"flex",gap:6}}>
          <button style={{...S.btn("#27ae60"),fontSize:11,padding:"7px 12px"}} onClick={()=>setShowDeposit(true)} disabled={isReadOnly}>📥 إيداع</button>
          <button style={{...S.btn("#e55444"),fontSize:11,padding:"7px 12px"}} onClick={()=>setShowWithdraw(true)} disabled={isReadOnly}>📤 سحب</button>
          <button style={{...S.btn("#4a5a6a"),fontSize:11,padding:"7px 10px"}} onClick={async ()=>{
            const v=await askPin("رصيد أول المدة (أدخل الرقم):");
            if(v!==null&&!isNaN(parseFloat(v))) save({...data,settings:{...data.settings,openingBalance:parseFloat(v)}});
          }}>⚙️ رصيد أول المدة</button>
        </div>
      </div>

      {/* الرصيد الحالي */}
      <div style={{background:balance>=0?"linear-gradient(135deg,#0a200a,#0d1117)":"linear-gradient(135deg,#200a0a,#0d1117)",border:`3px solid ${balance>=0?"#27ae60":"#e55444"}`,borderRadius:16,padding:20,textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:12,color:"#7a8a9a",marginBottom:6}}>💰 رصيد الصندوق الحالي</div>
        <div style={{fontSize:38,fontWeight:700,color:balance>=0?"#27ae60":"#e55444"}}>{fmt(balance)}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
          <div style={{background:"#0d1a0d",borderRadius:8,padding:"8px 0",textAlign:"center"}}>
            <div style={{fontSize:14,color:"#27ae60",fontWeight:700}}>{fmt(totalIn)}</div>
            <div style={{fontSize:10,color:"#7a8a9a"}}>📥 إجمالي الداخل</div>
          </div>
          <div style={{background:"#1a0d0d",borderRadius:8,padding:"8px 0",textAlign:"center"}}>
            <div style={{fontSize:14,color:"#e55444",fontWeight:700}}>{fmt(totalOut)}</div>
            <div style={{fontSize:10,color:"#7a8a9a"}}>📤 إجمالي الخارج</div>
          </div>
        </div>
      </div>

      {/* تبويبات داخلية */}
      <div style={{display:"flex",gap:6,marginBottom:14,borderBottom:"1px solid #1e2530",paddingBottom:10}}>
        {[["journal","📋 يومية الصندوق"],["partners","👥 الشركاء"],["profit","📊 الأرباح 🔒"]].map(([v,l])=>(
          <button key={v} onClick={async ()=>{
            if(v==="profit"){
              const pw=await askPin("أدخل كلمة مرور المالك:");
              if(pw !== (data.settings?.reportPassword||"owner1234")) return;
            }
            setView(v);
          }} style={{background:view===v?"#1a2a3a":"none",border:`1px solid ${view===v?"#4a90e2":"#2a3545"}`,borderRadius:20,padding:"5px 14px",color:view===v?"#4a90e2":"#7a8a9a",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>
            {l}
          </button>
        ))}
      </div>

      {/* ── يومية الصندوق ── */}
      {view === "journal" && (
        <div style={S.card}>
          <div style={{...S.cardTitle,justifyContent:"space-between"}}>
            <span>📋 يومية الصندوق</span>
            <span style={{fontSize:11,color:"#4a5a6a"}}>{autoTx.length} حركة</span>
          </div>
          {autoTx.length === 0 ? <div style={S.emptyState}>لا توجد حركات بعد</div> : (
            <table style={S.table}>
              <thead><tr>
                <th style={S.th}>التاريخ</th>
                <th style={S.th}>البيان</th>
                <th style={{...S.th,color:"#27ae60"}}>داخل ▲</th>
                <th style={{...S.th,color:"#e55444"}}>خارج ▼</th>
                <th style={{...S.th,color:"#7a8a9a"}}>ملاحظات</th>
                <th style={S.th}></th>
              </tr></thead>
              <tbody>
                {(() => {
                  // حساب الرصيد التراكمي بمرّة واحدة O(n)
                  const reversed = [...autoTx].reverse();
                  const runnings = [];
                  let r = openingBalance;
                  reversed.forEach(tx => { r += tx.dir==="in"?tx.amount:-tx.amount; runnings.push(r); });
                  runnings.reverse();
                  return autoTx.map((t,i) => {
                  const running = runnings[i];
                  return (
                    <tr key={t.id}>
                      <td style={{...S.td,color:"#7a8a9a",fontSize:11}}>{t.date}</td>
                      <td style={S.td}><span style={{fontSize:14,marginLeft:4}}>{TX_ICON[t.type]||"💵"}</span>{t.label}</td>
                      <td style={{...S.td,color:"#27ae60",fontWeight:700}}>{t.dir==="in"?fmt(t.amount):"—"}</td>
                      <td style={{...S.td,color:"#e55444",fontWeight:700}}>{t.dir==="out"?fmt(t.amount):"—"}</td>
                      {t.notes ? <td style={{...S.td,color:"#9b59b6",fontSize:11}}>{t.notes}</td> : <td style={S.td}></td>}
                      <td style={S.td}>{!t.auto && !isReadOnly && <button style={S.btnDanger} onClick={()=>delTx(t.id)}>🗑</button>}</td>
                    </tr>
                  );
                });
                })()}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* ── الشركاء ── */}
      {view === "partners" && (
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{color:"#f0b429",fontWeight:700}}>👥 الشركاء</span>
            <button style={{...S.btn("#9b59b6"),fontSize:11,padding:"6px 12px"}} onClick={()=>setShowAddPartner(true)}>➕ إضافة شريك</button>
          </div>
          {partners.length === 0 ? (
            <div style={S.emptyState}>لا يوجد شركاء — اضغط "إضافة شريك"</div>
          ) : (
            <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(partners.length,2)},1fr)`,gap:12}}>
              {partners.map(p => {
                const drawn = (data.partnerWithdrawals||[]).filter(w=>w.partnerId===p.id).reduce((s,w)=>s+w.amount,0);
                const share = Math.floor(netProfit / partners.length);
                const remaining = share - drawn;
                return (
                  <div key={p.id} style={{background:"#0d1520",border:"1px solid #2a3545",borderRadius:14,padding:16,textAlign:"center"}}>
                    <div style={{fontSize:28,marginBottom:6}}>👤</div>
                    <div style={{fontWeight:700,color:"#e8e0d5",fontSize:15}}>{p.name}</div>
                    <div style={{fontSize:11,color:"#7a8a9a",marginBottom:10}}>{p.share}% من الحصص</div>
                    <div style={{background:"#0a0f1a",borderRadius:8,padding:"8px 10px",marginBottom:8}}>
                      <div style={{fontSize:13,color:"#27ae60",fontWeight:700}}>{fmt(Math.max(0,share))}</div>
                      <div style={{fontSize:10,color:"#7a8a9a"}}>حصة الأرباح</div>
                    </div>
                    {drawn > 0 && (
                      <div style={{background:"#1a0d0d",borderRadius:8,padding:"6px 10px",marginBottom:8}}>

                    <div key={p.id} style={{background:"#0d1520",borderRadius:10,padding:12,textAlign:"center"}}>

              </div>

            <div style={{...S.formField,gridColumn:"1/-1"}}><label style={S.label}>المبلغ (د.ع)</label><input id="dep-amount" type="number" style={S.input} placeholder="المبلغ" value={depForm.amount} onChange={e=>setDepForm(f=>({...f,amount:e.target.value}))} onKeyDown={enterKey("dep-notes")} /></div>
            <div style={{...S.formField,gridColumn:"1/-1"}}><label style={S.label}>ملاحظات</label><input id="dep-notes" style={S.input} placeholder="اختياري" value={depForm.notes} onChange={e=>setDepForm(f=>({...f,notes:e.target.value}))} onKeyDown={enterKey(null, handleDeposit)} /></div>
          </div>
          <button style={{...S.btn("#27ae60"),width:"100%"}} onClick={handleDeposit} disabled={!depForm.amount}>💾 حفظ الإيداع</button>

      )}

      {/* Modal سحب */}
      {showWithdraw && (
        <Modal title="📤 سحب من الصندوق" onClose={()=>setShowWithdraw(false)}>
          <div style={S.formGrid}>
            <div style={S.formField}><label style={S.label}>التاريخ</label><input type="date" style={S.input} value={wdForm.date} onChange={e=>setWdForm(f=>({...f,date:e.target.value}))} /></div>
            <div style={S.formField}>
              <label style={S.label}>نوع السحب</label>
              <select style={S.select} value={wdForm.type} onChange={e=>setWdForm(f=>({...f,type:e.target.value}))}>

                <option value="withdraw">📤 سحب نقدي</option>
              </select>

            <div style={{...S.formField,gridColumn:"1/-1"}}>
              <label style={S.label}>الشريك {wdForm.type==="withdraw"?"(اختياري)":"(مطلوب)"}</label>
              <select style={S.select} value={wdForm.partnerId} onChange={e=>setWdForm(f=>({...f,partnerId:e.target.value}))}>

            </div>
            <div style={{...S.formField,gridColumn:"1/-1"}}><label style={S.label}>المبلغ (د.ع)</label><input id="wd-amount" type="number" style={S.input} placeholder="المبلغ" value={wdForm.amount} onChange={e=>setWdForm(f=>({...f,amount:e.target.value}))} onKeyDown={enterKey("wd-notes")} /></div>
            <div style={{...S.formField,gridColumn:"1/-1"}}><label style={S.label}>ملاحظات</label><input id="wd-notes" style={S.input} placeholder="اختياري" value={wdForm.notes} onChange={e=>setWdForm(f=>({...f,notes:e.target.value}))} onKeyDown={enterKey(null, handleWithdraw)} /></div>
          </div>
          <button style={{...S.btn("#e55444"),width:"100%"}} onClick={handleWithdraw} disabled={!wdForm.amount}>💾 تأكيد السحب</button>
        </Modal>
      )}

      {/* Modal إضافة شريك */}
      {showAddPartner && (
        <Modal title="➕ إضافة شريك" onClose={()=>setShowAddPartner(false)}>
          <div style={S.formGrid}>
            <div style={{...S.formField,gridColumn:"1/-1"}}><label style={S.label}>اسم الشريك</label><input id="ptr-name" style={S.input} placeholder="مثال: أحمد" value={pForm.name} onChange={e=>setPForm(f=>({...f,name:e.target.value}))} onKeyDown={enterKey("ptr-share")} /></div>
            <div style={{...S.formField,gridColumn:"1/-1"}}>
              <label style={S.label}>نسبة الحصة % (اختياري — يوزع بالتساوي تلقائياً)</label>
              <input id="ptr-share" type="number" style={S.input} placeholder="مثال: 33" value={pForm.share} onChange={e=>setPForm(f=>({...f,share:e.target.value}))} onKeyDown={enterKey(null, addPartner)} />
            </div>
          </div>
          <button style={{...S.btn("#9b59b6"),width:"100%"}} onClick={addPartner} disabled={!pForm.name}>💾 إضافة</button>
        </Modal>
      )}
      {PinModal}
    </>
  );
}

  { id: "purchases",  label: "المشتريات", icon: "purchases" },
  { id: "sales",      label: "المبيعات",  icon: "sales" },
  { id: "production", label: "الإنتاج",   icon: "factory" },
  { id: "machinery",  label: "الآليات",   icon: "machinery" },

];

function RoleModal({ ROLES, settings, setUserRole, setShowRoleModal, setUnlocked }) {
  const [pin, setPin] = useState("");
  const [target, setTarget] = useState("");
  const ROLE_PINS = {
    owner:      settings?.reportPassword || "owner1234",
    accountant: settings?.accountantPin  || "acc2024",
    production: settings?.productionPin  || "prod2024",
  };
  const tryLogin = () => {
    if (!target) return;
    if (target === "viewer") { setUserRole("viewer"); localStorage.setItem("factory_role","viewer"); setShowRoleModal(false); return; }
    if (pin === ROLE_PINS[target]) {
      setUserRole(target); localStorage.setItem("factory_role", target); setShowRoleModal(false);
      if (target === "owner") setUnlocked(true);
    } else alert("كلمة المرور غير صحيحة");
  };
  return (
    <Modal title="🔐 تبديل الدور" onClose={() => setShowRoleModal(false)}>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <div style={{ fontSize: 12, color: "#7a8a9a" }}>اختر دورك في النظام:</div>
        {Object.entries(ROLES).map(([key, r]) => (
          <button key={key} onClick={() => setTarget(key)} style={{
            background: target === key ? "#1a2a3a" : "#0d1117",
            border: `2px solid ${target === key ? "#4a90e2" : "#2a3545"}`,
            borderRadius: 8, padding: "10px 14px", color: "#e8e0d5",
            cursor: "pointer", fontSize: 13, fontFamily: "inherit", textAlign: "right",
          }}>{r.label}</button>
        ))}
        {target && target !== "viewer" && (
          <input type="password" style={S.input} placeholder={`كلمة مرور ${ROLES[target]?.label}`}
            value={pin} onChange={e => setPin(e.target.value)}
            onKeyDown={e => e.key === "Enter" && tryLogin()} autoFocus />
        )}
        <button style={S.btn()} onClick={tryLogin} disabled={!target}>✓ تأكيد</button>
        <div style={{ fontSize: 11, color: "#4a5a6a", background: "#0d1117", borderRadius: 6, padding: 8 }}>
          الأفتراضية: مالك = {ROLES.owner.label} ← يمكن تغيير كلمات المرور في الإعدادات
        </div>
      </div>
    </Modal>
  );
}

function App() {
  const {
    data, save: rawSave, loaded,
    token, hasSb, isReadOnly,
    syncStatus, lastSync,
    signIn, signOut, forceSync, updateSbCfg,
    showLogin, setShowLogin,
  } = useStorage();

  const [tab, setTab]           = useState("dashboard");
  const [unlocked, setUnlocked] = useState(false);

  const [userRole, setUserRole] = useState(() => {
    try { return localStorage.getItem("factory_role") || "owner"; } catch { return "owner"; }
  });
  const [showRoleModal, setShowRoleModal] = useState(false);

  // صلاحيات كل دور
  const ROLES = {
    owner:       { label: "المالك 👑",        canDelete: true,  canEdit: true,  canViewMoney: true,  canAddProduction: true  },
    accountant:  { label: "المحاسب 📒",       canDelete: true,  canEdit: true,  canViewMoney: true,  canAddProduction: true  },
    production:  { label: "مدير الإنتاج 🏭", canDelete: false, canEdit: false, canViewMoney: false, canAddProduction: true  },
    viewer:      { label: "مشاهد 👁",         canDelete: false, canEdit: false, canViewMoney: false, canAddProduction: false },
  };
  const role = ROLES[userRole] || ROLES.viewer;
  const canDelete = role.canDelete;

  // ── سجل تدقيق المحاسب (آمن — يُدمج مع البيانات الجديدة) ──
  const buildLogEntry = (action, section, details) => {
    if (userRole !== "accountant") return null;
    return {
      id: uid(),
      action,   // "حذف" | "تعديل"
      section,  // "مشتريات" | "مبيعات" | ...
      details,  // نص وصفي
      by: "المحاسب",
      at: today() + " " + new Date().toLocaleTimeString("ar-IQ", {hour:"2-digit",minute:"2-digit"}),
    };
  };
  // logAction تُستخدم من المكونات — تدمج السجل مع البيانات بنفس الكائن
  const logAction = (action, section, details, dataOverride) => {
    const entry = buildLogEntry(action, section, details);
    if (!entry) return dataOverride || data;
    const base = dataOverride || data;
    return { ...base, auditLog: [...(base.auditLog||[]), entry] };
  };

  const save = isReadOnly
    ? () => alert("وضع المشاهدة فقط\nلا يمكن الإدخال أو التعديل من هذا الجهاز.")
    : rawSave;

  if (!loaded) {
    return (
      <div style={{ ...S.app, justifyContent: "center", alignItems: "center", fontSize: 18, color: "#f0b429" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🏭</div>
          <div>جاري تحميل النظام...</div>
          {hasSb && <div style={{ fontSize: 13, color: "#4a90e2", marginTop: 8 }}>جاري المزامنة مع السحابة...</div>}
        </div>
      </div>
    );
  }

  return (
    <div style={S.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #2a3545; border-radius: 2px; }
        input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }
        select option { background: #0d1117; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      `}</style>

      {/* Header */}
      <div style={{ ...S.header, justifyContent: "space-between" }}>
        <div style={S.headerTitle}>
          🏭 {data.settings?.factoryName || "معمل كبس الكارتون"}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button onClick={() => setShowRoleModal(true)} style={{
            background: "none", border: "1px solid #2a3545", borderRadius: 8,
            padding: "4px 10px", color: "#7a8a9a", cursor: "pointer",
            fontFamily: "inherit", fontSize: 11,
          }}>
            {ROLES[userRole]?.label || "👁 مشاهد"}
          </button>
          <SyncBar
            hasSb={hasSb} isReadOnly={isReadOnly} token={token}
            syncStatus={syncStatus} lastSync={lastSync} forceSync={forceSync}
            onLoginClick={() => setShowLogin(true)}
            onSignOut={() => signOut()}
          />
        </div>
      </div>

      {/* شريط المشاهدة */}
      {isReadOnly && (
        <div style={{
          background: "#1a0a25", borderBottom: "1px solid #9b59b633",
          padding: "5px 16px", fontSize: 11, color: "#9b59b6",
          display: "flex", alignItems: "center", gap: 8, justifyContent: "center",
        }}>
          <span>👁</span>
          <span>وضع المشاهدة — يتجدد كل 30 ثانية — لا يمكن الإدخال</span>
          <button onClick={() => setShowLogin(true)} style={{
            background: "none", border: "1px solid #9b59b6", borderRadius: 6,
            padding: "1px 8px", color: "#9b59b6", cursor: "pointer",
            fontFamily: "inherit", fontSize: 10,
          }}>دخول للإدخال</button>
        </div>
      )}

      {/* Navigation */}
      <nav style={S.nav}>
        {TABS.map((t) => (
          <button key={t.id} style={S.navBtn(tab === t.id)} onClick={() => setTab(t.id)}>
            <Icon name={t.icon} size={15} />

            {t.id === "purchases" && (data.pendingWeighs||[]).length > 0 && (
              <span style={{ background: "#e67e22", color: "#fff", borderRadius: 10, padding: "1px 6px", fontSize: 10, fontWeight: 700 }}>

                {(data.pendingSales||[]).length}

                📦

      </nav>

      {/* Content */}
      <div style={S.content}>
        {tab === "dashboard" && <Dashboard data={data} unlocked={unlocked} />}
        {tab === "cashbox"   && <CashBox   data={data} save={save} isReadOnly={isReadOnly} />}
        {tab === "purchases" && <Purchases data={data} save={save} isReadOnly={isReadOnly} logAction={logAction} />}
        {tab === "sales"     && <Sales     data={data} save={save} isReadOnly={isReadOnly} logAction={logAction} />}
        {tab === "production"&& <Production data={data} save={save} isReadOnly={isReadOnly || !role.canAddProduction} />}
        {tab === "machinery" && <Machinery data={data} save={save} isReadOnly={isReadOnly} logAction={logAction} />}
        {tab === "workers"   && <Workers   data={data} save={save} isReadOnly={isReadOnly} logAction={logAction} />}
        {tab === "expenses"  && <Expenses  data={data} save={save} isReadOnly={isReadOnly} logAction={logAction} />}
        {tab === "debts"     && <Debts     data={data} save={save} isReadOnly={isReadOnly} logAction={logAction} />}
        {tab === "reports"   && (
          <Reports
            data={data} save={save}
            unlocked={unlocked}
            onUnlock={() => setUnlocked(true)}
            onLock={() => setUnlocked(false)}
          />
        )}
        {tab === "settings"  && (
          <Settings
            data={data} save={save}
            updateSbCfg={updateSbCfg}
            hasSb={hasSb} token={token}
            syncStatus={syncStatus}
            onLoginClick={() => setShowLogin(true)}
            onSignOut={() => signOut()}
          />
        )}
      </div>

      {/* AI Assistant - يظهر فقط لصاحب المعمل بعد فك القفل */}
      {unlocked && <AIAssistant data={data} />}

      {/* Role Modal */}
      {showRoleModal && <RoleModal ROLES={ROLES} settings={data.settings} setUserRole={setUserRole} setShowRoleModal={setShowRoleModal} setUnlocked={setUnlocked} />}

      {/* Login Modal */}
      {showLogin && (
        <LoginModal
          onSignIn={signIn}
          onClose={() => setShowLogin(false)}
          onReadOnly={() => {
            const cfg = getSbCfg();
            setSbCfg({ ...cfg, mode: "read" });
            setSbToken(""); // مسح أي token قديم
            setShowLogin(false);
          }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
