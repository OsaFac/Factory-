const { useState, useEffect, useCallback, useRef } = React;

// ==================== STORAGE HELPERS ====================
const STORAGE_KEY  = "cardboard_factory_v1";
const SB_CFG_KEY   = "cardboard_sb_cfg";   // إعدادات Supabase (localStorage)
const SB_TOKEN_KEY = "cardboard_sb_token"; // JWT token بعد تسجيل الدخول

// ── إعدادات Supabase — localStorage حقيقي ──
function getSbCfg()    { try { return JSON.parse(localStorage.getItem(SB_CFG_KEY)  || "{}"); } catch { return {}; } }
function setSbCfg(cfg) { try { localStorage.setItem(SB_CFG_KEY, JSON.stringify(cfg)); } catch {} }
function getSbToken()  { try { return localStorage.getItem(SB_TOKEN_KEY) || ""; }        catch { return ""; } }
function setSbToken(t) { try { if (t) localStorage.setItem(SB_TOKEN_KEY, t); else localStorage.removeItem(SB_TOKEN_KEY); } catch {} }
function getSbRefreshToken()  { try { return localStorage.getItem(SB_TOKEN_KEY + "_refresh") || ""; } catch { return ""; } }
function setSbRefreshToken(t) { try { if (t) localStorage.setItem(SB_TOKEN_KEY + "_refresh", t); else localStorage.removeItem(SB_TOKEN_KEY + "_refresh"); } catch {} }

// ── IndexedDB حقيقي — سعة مئات الميجابايت ──
const IDB_NAME    = "FactoryDB";
const IDB_STORE   = "kv";
const IDB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE, { keyPath: "key" });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror   = (e) => reject(e.target.error);
  });
}

const window_storage = {
  get: async (key) => {
    if (!window.indexedDB) {
      const val = localStorage.getItem(key);
      return val ? { value: val } : null;
    }
    try {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx  = db.transaction(IDB_STORE, "readonly");
        const req = tx.objectStore(IDB_STORE).get(key);
        req.onsuccess = () => resolve(req.result ? { value: req.result.value } : null);
        req.onerror   = () => reject(req.error);
      });
    } catch { return null; }
  },
  set: async (key, val) => {
    if (!window.indexedDB) {
      localStorage.setItem(key, val);
      return { value: val };
    }
    try {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx  = db.transaction(IDB_STORE, "readwrite");
        const req = tx.objectStore(IDB_STORE).put({ key, value: val });
        req.onsuccess = () => resolve({ value: val });
        req.onerror   = () => reject(req.error);
      });
    } catch { return null; }
  },
};

// ══════════════════════════════════════════════════════
// Supabase REST Client — بدون npm، يعمل بـ fetch مباشرة
// يستخدم Auth الحقيقي (email/password ← JWT ← RLS)
// ══════════════════════════════════════════════════════
const sbAPI = {
  // ── تسجيل الدخول: يُرجع access_token أو null ──
  signIn: async (url, anonKey, email, password) => {
    try {
      const res = await fetch(`${url}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: { apikey: anonKey, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      if (!res.ok) return null;
      const data = await res.json();
      // حفظ refresh_token أيضاً
      if (data.refresh_token) setSbRefreshToken(data.refresh_token);
      return data.access_token || null;
    } catch { return null; }
  },

  // ── تجديد التوكن تلقائياً قبل انتهاء الساعة ──
  refreshToken: async (url, anonKey) => {
    try {
      const refreshToken = getSbRefreshToken();
      if (!refreshToken) return null;
      const res = await fetch(`${url}/auth/v1/token?grant_type=refresh_token`, {
        method: "POST",
        headers: { apikey: anonKey, "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_token: refreshToken }),
      });
      if (!res.ok) return null;
      const data = await res.json();
      if (data.refresh_token) setSbRefreshToken(data.refresh_token);
      if (data.access_token) setSbToken(data.access_token);
      return data.access_token || null;
    } catch { return null; }
  },

  // ── تسجيل الخروج ──
  signOut: async (url, anonKey, token) => {
    try {
      await fetch(`${url}/auth/v1/logout`, {
        method: "POST",
        headers: { apikey: anonKey, Authorization: `Bearer ${token}` },
      });
    } catch {}
  },

  // ── قراءة البيانات (anon = قراءة فقط، JWT = قراءة+كتابة) ──
  pull: async (url, anonKey, token) => {
    try {
      // anon يقرأ بدون JWT (RLS تسمح بـ SELECT لـ anon)
      const bearer = token || anonKey;
      const res = await fetch(
        `${url}/rest/v1/factory_data?key=eq.main&select=value,updated_at`,
        { headers: { apikey: anonKey, Authorization: `Bearer ${bearer}` } }
      );
      if (!res.ok) return null;
      const rows = await res.json();
      return rows && rows[0] ? rows[0] : null;
    } catch { return null; }
  },

  // ── كتابة البيانات (يحتاج JWT — authenticated فقط بحسب RLS) ──
  push: async (url, anonKey, token, payload) => {
    try {
      const res = await fetch(`${url}/rest/v1/factory_data`, {
        method: "POST",
        headers: {
          apikey: anonKey,
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
          Prefer: "resolution=merge-duplicates,return=minimal",
        },
        body: JSON.stringify({ key: "main", value: payload, updated_at: new Date().toISOString() }),
      });
      return res.ok;
    } catch { return false; }
  },
};

const defaultData = {
  purchases: [],
  sales: [],
  machinery: [],
  workers: [],
  debts: [],
  expenses: [],
  productions: [],
  balesInventory: 0,
  auditLog: [],
  cashTransactions: [],
  partnerWithdrawals: [],
  cashDeposits: [],
  pendingWeighs: [],
  pendingSales: [],
  partners: [
    { id: 1, name: "أحمد", share: 33.33 },
    { id: 2, name: "محمد", share: 33.33 },
    { id: 3, name: "علي", share: 33.34 },
  ],
  settings: { factoryName: "معمل كبس الكارتون", currency: "د.ع" },
};

function useStorage() {
  const [data, setData]             = useState(defaultData);
  const [loaded, setLoaded]         = useState(false);
  const [token, setToken]           = useState(() => getSbToken());   // JWT للكتابة
  const [syncStatus, setSyncStatus] = useState("idle");
  const [lastSync, setLastSync]     = useState(null);
  const [showLogin, setShowLogin]   = useState(false);

  const cfg      = getSbCfg();
  const hasSb    = !!(cfg.url && cfg.key);
  // isReadOnly: مفعّل عندما يكون mode=read (الموبايل) وبدون JWT
  const isReadOnly = cfg.mode === "read" && !token;

  // ── تحميل المحلي + مزامنة تنازلية أولية ──
  useEffect(() => {
    const load = async () => {
      let localData = null;
      try {
        const r = await window_storage.get(STORAGE_KEY);
        if (r?.value) localData = { ...defaultData, ...JSON.parse(r.value) };
      } catch {}

      if (hasSb) {
        setSyncStatus("syncing");
        try {
          const remote = await sbAPI.pull(cfg.url, cfg.key, token || null);
          if (remote?.value) {
            const remoteData = { ...defaultData, ...JSON.parse(remote.value) };
            const remoteTs   = remoteData?._ts || 0;
            const localTs    = localData?._ts || 0;
            // الموبايل يأخذ دائماً من السحابة
            if (isReadOnly || remoteTs > localTs) {
              localData = remoteData;
              try { await window_storage.set(STORAGE_KEY, JSON.stringify(localData)); } catch {}
              setLastSync(new Date());
              setSyncStatus("ok");
            } else if (!isReadOnly && localTs > remoteTs && token) {
              // اللابتوب أحدث: ارفع البيانات العالقة فوراً عند فتح البرنامج
              const ok = await sbAPI.push(cfg.url, cfg.key, token, JSON.stringify(localData));
              setLastSync(new Date());
              setSyncStatus(ok ? "ok" : "offline");
            } else {
              // متطابقان
              setLastSync(new Date());
              setSyncStatus("ok");
            }
          } else {
            // السحابة فارغة — ارفع البيانات المحلية إن وجدت
            if (!isReadOnly && localData && token) {
              const ok = await sbAPI.push(cfg.url, cfg.key, token, JSON.stringify(localData));
              setLastSync(new Date());
              setSyncStatus(ok ? "ok" : "offline");
            } else {
              setSyncStatus(localData ? "offline" : "idle");
            }
          }
        } catch { setSyncStatus("offline"); }
      }

      setData(localData || defaultData);
      setLoaded(true);
    };
    load();
  }, [hasSb, isReadOnly, token]); // تبعيات صحيحة لتجنب stale state

  // ── تجديد التوكن تلقائياً كل 45 دقيقة ──
  useEffect(() => {
    if (!token || !hasSb) return;
    const doRefresh = async () => {
      const c2 = getSbCfg();
      if (!c2.url || !c2.key) return;
      const newToken = await sbAPI.refreshToken(c2.url, c2.key);
      if (newToken) setToken(newToken);
    };
    const iv = setInterval(doRefresh, 45 * 60 * 1000);
    // تجديد التوكن عند العودة من السكون
    const onFocus = () => doRefresh();
    window.addEventListener("focus", onFocus);
    return () => { clearInterval(iv); window.removeEventListener("focus", onFocus); };
  }, [token, hasSb]);

  // ── Auto-refresh للموبايل كل 30 ثانية ──
  useEffect(() => {
    if (!isReadOnly || !hasSb) return;
    const iv = setInterval(async () => {
      setSyncStatus("syncing");
      try {
        const remote = await sbAPI.pull(cfg.url, cfg.key, null);
        if (remote?.value) {
          const nd = { ...defaultData, ...JSON.parse(remote.value) };
          setData(nd);
          await window_storage.set(STORAGE_KEY, JSON.stringify(nd)).catch(() => {});
          setLastSync(new Date());
          setSyncStatus("ok");
        }
      } catch { setSyncStatus("offline"); }
    }, 30000);
    return () => clearInterval(iv);
  }, [isReadOnly, hasSb, cfg.url, cfg.key]);

  // ── حفظ: محلي فوراً + Supabase خلفياً (فقط مع JWT) ──
  const save = useCallback(async (newData) => {
    if (isReadOnly) return;
    const stamped = { ...newData, _ts: Date.now() };
    setData(stamped);
    try {
      const res = await window_storage.set(STORAGE_KEY, JSON.stringify(stamped));
      if (!res) throw new Error("IndexedDB returned null");
    } catch (err) {
      console.error("فشل الحفظ المحلي:", err);
      setSyncStatus("save_error");
      alert("⚠️ فشل الحفظ المحلي!\nالبيانات لم تُحفظ. تأكد من مساحة المتصفح.");
      setTimeout(() => setSyncStatus("idle"), 5000);
    }
    const c2 = getSbCfg();
    if (c2.url && c2.key && token) {
      setSyncStatus("syncing");
      const ok = await sbAPI.push(c2.url, c2.key, token, JSON.stringify(stamped));
      if (ok) { setLastSync(new Date()); setSyncStatus("ok"); }
      else setSyncStatus("offline");
    }
  }, [isReadOnly, token]);

  // ── تسجيل الدخول (اللابتوب) ──
  const signIn = useCallback(async (email, password) => {
    const c2 = getSbCfg();
    if (!c2.url || !c2.key) return "أدخل رابط Supabase ومفتاح anon في الإعدادات أولاً";
    setSyncStatus("syncing");
    const jwt = await sbAPI.signIn(c2.url, c2.key, email, password);
    if (!jwt) { setSyncStatus("error"); return "الإيميل أو كلمة المرور غير صحيحة"; }
    setSbToken(jwt);
    setToken(jwt);
    // تحديث mode إلى write بعد الدخول
    setSbCfg({ ...c2, mode: "write" });
    setSyncStatus("ok");
    setShowLogin(false);
    // مزامنة فورية
    const remote = await sbAPI.pull(c2.url, c2.key, jwt);
    if (remote?.value) {
      const nd = { ...defaultData, ...JSON.parse(remote.value) };
      setData(nd);
      await window_storage.set(STORAGE_KEY, JSON.stringify(nd)).catch(() => {});
      setLastSync(new Date());
    }
    return null; // null = نجاح
  }, []);

  // ── تسجيل الخروج ──
  const signOut = useCallback(async () => {
    const c2 = getSbCfg();
    if (token && c2.url && c2.key) await sbAPI.signOut(c2.url, c2.key, token);
    setSbToken("");
    setToken("");
    setSyncStatus("idle");
  }, [token]);

  // ── مزامنة يدوية ──
  // ── مزامنة يدوية ذكية (مع فحص من الأحدث) ──
  const forceSync = useCallback(async () => {
    const c2 = getSbCfg();
    if (!c2.url || !c2.key) return;
    setSyncStatus("syncing");
    try {
      // 1. جلب البيانات المحلية لمعرفة وقت التحديث
      const localStr = await window_storage.get(STORAGE_KEY);
      const localObj = localStr?.value ? JSON.parse(localStr.value) : null;
      const localTs = localObj?._ts || 0;

      // 2. جلب البيانات من السحابة
      const remote = await sbAPI.pull(c2.url, c2.key, token || null);

      if (remote?.value) {
        const remoteObj = JSON.parse(remote.value);
        const remoteTs = remoteObj?._ts || 0;

        // 3. إذا كان اللابتوب أحدث → ارفع للسحابة
        if (!isReadOnly && localTs > remoteTs && token) {
          const ok = await sbAPI.push(c2.url, c2.key, token, JSON.stringify(localObj));
          if (ok) { setLastSync(new Date()); setSyncStatus("ok"); }
          else { setSyncStatus("offline"); }
        }
        // 4. إذا كانت السحابة أحدث أو موبايل → اسحب
        else if (isReadOnly || remoteTs > localTs) {
          const nd = { ...defaultData, ...remoteObj };
          setData(nd);
          await window_storage.set(STORAGE_KEY, JSON.stringify(nd)).catch(() => {});
          setLastSync(new Date());
          setSyncStatus("ok");
        } else {
          // متطابقان
          setLastSync(new Date());
          setSyncStatus("ok");
        }
      } else {
        // السحابة فارغة → ارفع بيانات اللابتوب فوراً
        if (!isReadOnly && localObj && token) {
          const ok = await sbAPI.push(c2.url, c2.key, token, JSON.stringify(localObj));
          if (ok) { setLastSync(new Date()); setSyncStatus("ok"); }
          else setSyncStatus("offline");
        } else {
          setSyncStatus("offline");
        }
      }
    } catch { setSyncStatus("error"); }
  }, [token, isReadOnly]);

  // ── تحديث إعدادات Supabase من الإعدادات ──
  const updateSbCfg = useCallback((newCfg) => {
    setSbCfg(newCfg);
    if (!newCfg.url || !newCfg.key) { setToken(""); setSbToken(""); }
  }, []);

  return {
    data, save, loaded,
    token, hasSb, isReadOnly,
    syncStatus, lastSync,
    signIn, signOut, forceSync, updateSbCfg,
    showLogin, setShowLogin,
  };
}

// ==================== WEB SERIAL API HELPER ====================
// مُعرَّفة هنا قبل Purchases لتجنب ReferenceError (hoisting)
async function readFromScale(onValue, onError) {
  try {
    if (!navigator.serial) {
      onError("المتصفح لا يدعم Web Serial — استخدم Chrome أو Edge");
      return;
    }
    const port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });
    const reader = port.readable.getReader();
    let buffer = "";
    const timeout = setTimeout(async () => {
      reader.cancel();
      await port.close();
      onError("انتهت المهلة — لم يُرسل الميزان بيانات");
    }, 8000);
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += new TextDecoder().decode(value);
      const match = buffer.match(/(\d+\.?\d*)/);
      if (match) {
        clearTimeout(timeout);
        reader.cancel();
        await port.close();
        onValue(parseFloat(match[1]) || 0);
        break;
      }
    }
  } catch (e) {
    if (e.name !== "AbortError") onError(e.message);
  }
}

const enterKey = (nextId, actionFn) => (e) => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  if (nextId) {
    const el = document.getElementById(nextId);
    if (el) { el.focus(); el.select && el.select(); }
  }
  if (actionFn) actionFn();
};

function useOwnerPin() {
  const [state, setState] = useState({ open: false, title: "", resolve: null });
  const [pin, setPin] = useState("");
  const ask = (title) => new Promise(resolve => {
    setPin("");
    setState({ open: true, title, resolve });
  });
  const confirm = () => {
    state.resolve && state.resolve(pin);
    setState({ open: false, title: "", resolve: null });
  };
  const cancel = () => {
    state.resolve && state.resolve(null);
    setState({ open: false, title: "", resolve: null });
  };
  const Modal2 = state.open ? (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center" }}
      onClick={cancel}>
      <div style={{ background:"#161b25",border:"1px solid #2a3545",borderRadius:12,padding:20,width:280,maxWidth:"90vw" }}
        onClick={e=>e.stopPropagation()}>
        <div style={{ color:"#e8e0d5",fontSize:14,marginBottom:12,fontWeight:600 }}>{state.title}</div>
        <input type="password" autoFocus value={pin} onChange={e=>setPin(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter") confirm(); if(e.key==="Escape") cancel(); }}
          placeholder="••••••••"
          style={{ width:"100%",background:"#0d1117",border:"1px solid #2a3545",borderRadius:6,
            padding:"8px 10px",color:"#e8e0d5",fontSize:14,outline:"none",marginBottom:12,direction:"ltr",fontFamily:"inherit" }} />
        <div style={{ display:"flex",gap:8 }}>
          <button onClick={confirm}
            style={{ flex:1,background:"#1a4a7a",border:"none",borderRadius:6,padding:"8px",color:"#e8e0d5",cursor:"pointer",fontSize:13 }}>✓ تأكيد</button>
          <button onClick={cancel}
            style={{ flex:1,background:"#2a3545",border:"none",borderRadius:6,padding:"8px",color:"#e8e0d5",cursor:"pointer",fontSize:13 }}>✕ إلغاء</button>
        </div>
      </div>
    </div>
  ) : null;
  return { ask, Modal2 };
}

function AutocompleteInput({ value, onChange, suggestions, placeholder, style, id, onKeyDown, inputRef }) {
  const [show, setShow] = useState(false);
  const filtered = value.length >= 1
    ? [...new Set(suggestions.filter(s => s && s.includes(value) && s !== value))].slice(0, 6)
    : [];

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && filtered.length > 0 && show) {
      onChange(filtered[0]); setShow(false); e.preventDefault(); return;
    }
    if (onKeyDown) onKeyDown(e);
  };

  return (
    <div style={{ position: "relative" }}>
      <input
        id={id}
        ref={inputRef}
        style={style}
        value={value}
        placeholder={placeholder}
        onChange={e => { onChange(e.target.value); setShow(true); }}
        onFocus={() => setShow(true)}
        onBlur={() => setTimeout(() => setShow(false), 150)}
        onKeyDown={handleKeyDown}
        autoComplete="off"
      />
      {show && filtered.length > 0 && (
        <div style={{
          position: "absolute", top: "100%", right: 0, left: 0, zIndex: 999,
          background: "#1a2535", border: "1px solid #2a3545", borderRadius: 8,
          overflow: "hidden", boxShadow: "0 4px 20px rgba(0,0,0,0.5)",
        }}>
          {filtered.map((s, i) => (
            <div
              key={i}
              style={{
                padding: "9px 12px", cursor: "pointer", fontSize: 13,
                color: "#e8e0d5", borderBottom: i < filtered.length - 1 ? "1px solid #2a3545" : "none",
                display: "flex", alignItems: "center", gap: 8,
              }}
              onMouseDown={() => { onChange(s); setShow(false); }}
            >
              <span style={{ color: "#f0b429", fontSize: 11 }}>🔍</span>
              {s}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const todayPurchasesKg    = todayPurchases.reduce((s,p) => s+(p.weight||0), 0);          // كغم

                            + todayExpenses.reduce((s,e)=>s+(e.amount||0),0);

      {/* ══ إجماليات كلية — للمالك فقط ══ */}

          <div style={{background:"#0a0f0a",border:"1px solid #27ae6033",borderRadius:14,padding:14,marginBottom:12}}>

                {l:"إجمالي المبيعات",     v:fmt(totalSales),   c:"#27ae60", icon:"💰"},

      {/* آخر العمليات — آخر مبيعة + آخر مشترية فقط */}

        {[
          ...(data.purchases.length > 0 ? [data.purchases[data.purchases.length-1]].map(p=>({text:`شراء ${(p.weight||0).toLocaleString()} كغم من ${p.supplier}`, sub:fmt(p.total||0), date:p.date, icon:"🚚", c:"#e67e22"})) : []),
          ...(data.sales.length > 0 ? [data.sales[data.sales.length-1]].map(s=>({text:`بيع لـ ${s.customer}`, sub:fmt(s.total||0), date:s.date, icon:"💰", c:"#27ae60"})) : []),
        ].sort((a,b)=>b.date.localeCompare(a.date)).map((item,i)=>(

              <div style={{fontSize:12,color:"#c8d0da"}}>{item.text}</div>
              <div style={{fontSize:10,color:"#4a5a6a"}}>{item.date}</div>
            </div>
            <span style={{fontSize:12,fontWeight:700,color:item.c}}>{item.sub}</span>
          </div>
        ))}
        {data.purchases.length===0&&data.sales.length===0&&(
          <div style={{textAlign:"center",color:"#4a5a6a",fontSize:12}}>لا توجد عمليات بعد</div>

}

// ==================== PURCHASES (QUEUE SYSTEM) ====================
function Purchases({ data, save, isReadOnly, logAction = ()=>{} }) {

  // ── Refs للتنقل التلقائي ──
  const { ask: askPin, Modal2: PinModal } = useOwnerPin();
  const supplierRef  = useRef(null);
  const grossRef     = useRef(null);
  const priceRef     = useRef(null);
  const humidityRef  = useRef(null);

  // تركيز تلقائي على المجهز عند فتح الصفحة
  useEffect(() => {
    if (!isReadOnly) setTimeout(() => supplierRef.current?.focus(), 100);
  }, [isReadOnly]);

  const [editId, setEditId]   = useState(null);
  const [editForm, setEditForm] = useState({});

  const canEdit = async (recordDate) => {
    if (recordDate === today()) return true;
    const pw = await askPin("سجل من يوم سابق — أدخل كلمة مرور المالك:");
    return pw === (data.settings?.reportPassword || "owner1234");
  };

  const startEdit = (rec) => {
    if (!canEdit(rec.date)) return;
    setEditId(rec.id);
    setEditForm({ supplier: rec.supplier, grossWeight: rec.grossWeight||rec.weight, tareWeight: rec.tareWeight||0, price: rec.price, payType: rec.payType, notes: rec.notes||"", humidityPct: rec.humidityPct||0 });
  };

  const saveEdit = (id) => {
    const orig = data.purchases.find(p => p.id === id);
    const gw = parseFloat(editForm.grossWeight)||0;
    const tw = parseFloat(editForm.tareWeight)||0;
    const pr = parseFloat(editForm.price)||0;
    const hp = parseFloat(editForm.humidityPct)||0;
    const netBeforeHumidity = gw - tw;
    const humidityDeduct = Math.round(netBeforeHumidity * hp / 100);
    const net = netBeforeHumidity - humidityDeduct;
    const total = net * pr;
    const editedData = { ...data, purchases: data.purchases.map(p => p.id === id ? {
      ...p, supplier: editForm.supplier, grossWeight: gw, tareWeight: tw,
      weight: net, netBeforeHumidity, humidityPct: hp, humidityDeduct,
      price: pr, payType: editForm.payType, notes: editForm.notes, total
    } : p) };
    save(orig ? logAction("تعديل", "مشتريات", "تعديل شحنة: " + orig.supplier + " — " + orig.date, editedData) : editedData);
    setEditId(null);
  };

  const [p1, setP1] = useState({ supplier: "", grossWeight: "", price: "", payType: "cash", date: today(), notes: "", humidityPct: "" });
  const [grossLocked,   setGrossLocked]   = useState(false);
  const [grossIsManual, setGrossIsManual] = useState(false);
  const [simulating,    setSimulating]    = useState("");
  const [completing,    setCompleting]    = useState(null);
  const [tareVal,       setTareVal]       = useState("");
  const [tareLocked,    setTareLocked]    = useState(false);
  const [tareIsManual,  setTareIsManual]  = useState(false);

  const pending = data.pendingWeighs || [];

  // ── Handler: ضغط Enter على المجهز → الوزن ──
  const handleSupplierKey = (e) => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    if (p1.supplier.trim()) grossRef.current?.focus();
  };

  // ── Handler: ضغط Enter على الوزن → قفل + السعر ──
  const handleGrossKey = (e) => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    const gw = parseFloat(p1.grossWeight);
    if (isNaN(gw) || gw <= 0) return;
    if (!grossLocked) { setGrossLocked(true); setGrossIsManual(true); }
    setTimeout(() => { priceRef.current?.focus(); priceRef.current?.select(); }, 40);
  };

  // ── Handler: الميزان COM → قفل تلقائي + انتقال للسعر ──
  const handleScaleGross = (val) => {
    setP1(f => ({ ...f, grossWeight: val, isManual: false }));
    setGrossLocked(true); setGrossIsManual(false); setSimulating("");
    setTimeout(() => { priceRef.current?.focus(); priceRef.current?.select(); }, 60);
  };

  // ── Handler: زر قفل يدوي → السعر ──
  const handleLockClick = () => {
    setGrossLocked(true); setGrossIsManual(true);
    setTimeout(() => { priceRef.current?.focus(); priceRef.current?.select(); }, 40);
  };

  // ── Handler: ضغط Enter على السعر → الرطوبة دائماً ──
  const handlePriceKey = (e) => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    if (!p1.price) return;
    setTimeout(() => humidityRef.current?.focus(), 30);
  };

  // ── Handler: ضغط Enter على الرطوبة → حفظ (فارغة أو بقيمة) ──
  const handleHumidityKey = (e) => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    doAddToQueue();
  };

  // ── دالة الحفظ للطابور ──
  const doAddToQueue = () => {
    if (!p1.supplier.trim()) { supplierRef.current?.focus(); return; }
    const gw = parseFloat(p1.grossWeight);
    if (isNaN(gw) || gw <= 0) { grossRef.current?.focus(); return; }
    if (!p1.price) { priceRef.current?.focus(); return; }

    const prevWeighs = data.purchases.filter(p => p.supplier === p1.supplier).map(p => p.grossWeight || 0);
    if (prevWeighs.length >= 3) {
      const avg = prevWeighs.reduce((a,b)=>a+b,0) / prevWeighs.length;
      const diff = Math.abs(gw - avg) / avg;
      if (diff > 0.25) {
        const ok = window.confirm(`⚠️ وزن ${fmtNum(gw)} كغم يختلف ${Math.round(diff*100)}% عن معدل ${p1.supplier} (${fmtNum(Math.round(avg))} كغم)\nهل تريد المتابعة؟`);
        if (!ok) return;
      }
    }

    const ticket = {
      id: uid(), supplier: p1.supplier,
      grossWeight: gw, price: parseFloat(p1.price),
      payType: p1.payType, date: p1.date, notes: p1.notes,
      humidityPct: parseFloat(p1.humidityPct) || 0,
      grossIsManual,
      grossTime: new Date().toLocaleTimeString("ar-IQ", { hour:"2-digit", minute:"2-digit" }),
      time: new Date().toLocaleTimeString("ar-IQ", { hour:"2-digit", minute:"2-digit" }),
    };
    save({ ...data, pendingWeighs: [...pending, ticket] });
    setP1({ supplier:"", grossWeight:"", price:"", payType:"cash", date:today(), notes:"", humidityPct:"" });
    setGrossLocked(false); setGrossIsManual(false);
    // ← رجوع المؤشر للمجهز للشاحنة التالية
    setTimeout(() => supplierRef.current?.focus(), 80);
  };

  const addToQueue = doAddToQueue; // alias للزر

  const completeTicket = (ticket) => {
    const tare = parseFloat(tareVal);
    if (isNaN(tare) || tare <= 0 || tare >= ticket.grossWeight) return;
    const prevTares = data.purchases.filter(p => p.supplier === ticket.supplier && p.tareWeight > 0).map(p => p.tareWeight);
    if (prevTares.length >= 2) {
      const avgTare = prevTares.reduce((a,b)=>a+b,0) / prevTares.length;
      const diff = Math.abs(tare - avgTare) / avgTare;
      if (diff > 0.12) {
        const direction = tare > avgTare ? "أعلى" : "أقل";
        const ok = window.confirm(`⚠️ Tare Audit\nوزن الفارغ: ${fmtNum(tare)} كغم\nمعدل ${ticket.supplier}: ${fmtNum(Math.round(avgTare))} كغم\nالفرق: ${Math.round(diff*100)}% ${direction}\nهل تريد المتابعة؟`);
        if (!ok) return;
      }
    }
    const netBeforeHumidity = ticket.grossWeight - tare;
    const humidityPct = ticket.humidityPct || 0;
    const humidityDeduct = Math.round(netBeforeHumidity * humidityPct / 100);
    const netWeight = netBeforeHumidity - humidityDeduct;
    const total = netWeight * ticket.price;
    const rec = {
      id: uid(), supplier: ticket.supplier,
      grossWeight: ticket.grossWeight, tareWeight: tare,
      weight: netWeight, netBeforeHumidity,
      humidityPct, humidityDeduct,
      price: ticket.price, payType: ticket.payType,
      date: ticket.date, notes: ticket.notes, total,
      grossTime: ticket.grossTime || ticket.time,
      tareTime: new Date().toLocaleTimeString("ar-IQ", { hour:"2-digit", minute:"2-digit" }),
      weightLocked: true,
    };
    const newPending = pending.filter(p => p.id !== ticket.id);
    const newData = { ...data, purchases: [...data.purchases, rec], pendingWeighs: newPending };
    if (ticket.payType === "deferred") {
      newData.debts = [...(data.debts||[]), { id:uid(), type:"supplier", name:ticket.supplier, amount:total, date:ticket.date, notes:`شراء ${netWeight} كغم صافي`, status:"pending" }];
    }
    save(newData); setCompleting(null); setTareVal("");
    setTimeout(() => supplierRef.current?.focus(), 80);
  };

  const del = (id) => {
    const rec = data.purchases.find(p => p.id === id);
    const newData = { ...data, purchases: data.purchases.filter(p => p.id !== id) };
    save(rec ? logAction("حذف", "مشتريات", "حذف شحنة: " + rec.supplier + " — " + rec.weight + " كغم — " + rec.date, newData) : newData);
  };
  const removeQueue = (id) => save({ ...data, pendingWeighs: pending.filter(p => p.id !== id) });

  // ── حساب المخزون للعرض ──
  const totalPurchasesKg = data.purchases.reduce((s,p)=>s+(p.weight||0),0);
  const totalCost = data.purchases.reduce((s,p)=>s+(p.total||0),0);

  return (
    <>
      <h2 style={{ color:"#f0b429", margin:"0 0 16px 0", fontSize:18 }}>📦 المشتريات — نظام الطابور</h2>

      {/* KPIs */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:14 }}>
        {[
          { l:"إجمالي الكلفة",   v:fmt(totalCost),                       c:"#f0b429" },
          { l:"إجمالي الصافي",   v:`${fmtNum(totalPurchasesKg)} كغم`,    c:"#e67e22" },
          { l:"شحنات مكتملة",    v:`${data.purchases.length}`,            c:"#4caf50" },
        ].map((k,i) => (
          <div key={i} style={S.kpi(k.c)}>
            <div style={S.kpiVal}>{k.v}</div>
            <div style={S.kpiLabel}>{k.l}</div>
          </div>
        ))}
      </div>

      {/* PHASE 1 */}
      <div style={{ ...S.card, border:"2px solid #e67e2244", background:"#14100a" }}>
        <div style={S.cardTitle}>🚛 المرحلة الأولى — وزن الشاحنة محمّلة</div>
        <div style={{ fontSize:11, color:"#7a8a9a", marginBottom:10, background:"#0d1117", borderRadius:6, padding:"6px 10px" }}>
          💡 المجهز → Enter → الوزن → Enter(أو ميزان) → السعر → Enter → الرطوبة → Enter → حفظ
        </div>
        <div style={S.formGrid}>
          <div style={S.formField}>
            <label style={S.label}>التاريخ</label>
            <input type="date" style={S.input} value={p1.date} onChange={e=>setP1(f=>({...f,date:e.target.value}))} />
          </div>
          {/* ── المجهز ── */}
          <div style={S.formField}>
            <label style={S.label}>اسم المجهز</label>
            <AutocompleteInput
              inputRef={supplierRef}
              style={{...S.input, borderColor:p1.supplier?"#e67e22":"#2a3545"}}
              placeholder="مثال: حسن، أحمد..."
              value={p1.supplier}
              onChange={v=>setP1(f=>({...f,supplier:v}))}
              suggestions={[...new Set(data.purchases.map(p=>p.supplier).filter(Boolean))]}
              onKeyDown={handleSupplierKey}
            />
          </div>
          {/* ── الوزن الكلي ── */}
          <div style={S.formField}>
            <label style={S.label}>
              ⚖️ وزن الشاحنة محمّلة (كغم)
              {p1.isManual && p1.grossWeight && !grossLocked && <span style={{color:"#f0b429",fontSize:10,marginRight:6}}>🖊️ يدوي</span>}
              {grossLocked && <span style={{color:"#27ae60",fontSize:10,marginRight:6}}>🔒 مقفل</span>}
            </label>
            <div style={{position:"relative"}}>
              <input
                ref={grossRef}
                type="number"
                style={{...S.input, borderColor:grossLocked?"#27ae6066":"#e67e2266", background:grossLocked?"#0a1a0a":undefined, color:grossLocked?"#4caf50":undefined, paddingLeft:36}}
                placeholder="مثال: 18500"
                value={p1.grossWeight}
                readOnly={grossLocked}
                onChange={e=>{ if(grossLocked)return; setP1(f=>({...f,grossWeight:e.target.value,isManual:true})); setGrossIsManual(true); }}
                onKeyDown={handleGrossKey}
              />
              {grossLocked && <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14}}>🔒</span>}
            </div>
            <div style={{display:"flex",gap:6,marginTop:6}}>
              {!grossLocked && (
                <button type="button" disabled={simulating==="gross"}
                  onClick={()=>{ if(navigator.serial){setSimulating("gross");readFromScale(handleScaleGross,()=>setSimulating(""));}else{alert("لا يدعم COM — اكتب الوزن يدوياً ثم Enter");grossRef.current?.focus();} }}
                  style={{background:"linear-gradient(135deg,#4a90e2,#2980b9)",border:"none",borderRadius:6,padding:"7px 14px",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                  {simulating==="gross"?"⏳ قراءة...":"⚖️ قراءة COM"}
                </button>
              )}
              {!grossLocked && p1.grossWeight && (
                <button type="button" onClick={handleLockClick}
                  style={{background:"linear-gradient(135deg,#27ae60,#1a7a45)",border:"none",borderRadius:6,padding:"7px 14px",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                  🔒 قفل ← السعر
                </button>
              )}
              {grossLocked && (
                <button type="button"
                  onClick={async ()=>{ const pw=await askPin("كلمة مرور المالك:"); if(pw===(data.settings?.reportPassword||"owner1234")){setGrossLocked(false);setGrossIsManual(true);}else if(pw!==null)alert("خاطئة"); }}
                  style={{background:"none",border:"1px solid #e5544466",borderRadius:6,padding:"7px 12px",color:"#e55444",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                  🔓 فك القفل
                </button>
              )}
            </div>
          </div>
          {/* ── السعر ── */}
          <div style={S.formField}>
            <label style={S.label}>سعر الكغم (د.ع)</label>
            <input ref={priceRef} id="pur-price" type="number" style={S.input} placeholder="السعر"
              value={p1.price} onChange={e=>setP1(f=>({...f,price:e.target.value}))}
              onKeyDown={handlePriceKey} />
          </div>
          <div style={S.formField}>
            <label style={S.label}>طريقة الدفع</label>
            <select style={S.select} value={p1.payType} onChange={e=>setP1(f=>({...f,payType:e.target.value}))}>
              <option value="cash">نقدي</option><option value="deferred">آجل</option>
            </select>
          </div>
          {/* ── الرطوبة ── */}
          <div style={S.formField}>
            <label style={S.label}>💧 الرطوبة % (اختياري — Enter للحفظ)</label>
            <input ref={humidityRef} type="number" style={{...S.input,borderColor:"#9b59b666"}}
              placeholder="0 (فارغ = بدون رطوبة)"
              value={p1.humidityPct} onChange={e=>setP1(f=>({...f,humidityPct:e.target.value}))}
              onKeyDown={handleHumidityKey} min="0" max="30" />
          </div>
          <div style={S.formField}>
            <label style={S.label}>ملاحظات (اختياري)</label>
            <input style={S.input} placeholder="اختياري"
              value={p1.notes} onChange={e=>setP1(f=>({...f,notes:e.target.value}))}
              onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();doAddToQueue();} }} />
          </div>
        </div>
        <button style={{...S.btn("#e67e22"),width:"100%",opacity:(!p1.supplier||!p1.grossWeight||!p1.price)?0.4:1}}
          disabled={isReadOnly} onClick={doAddToQueue}>
          🚛 أضف للطابور ← ذهب للتفريغ
        </button>
        <div style={{fontSize:10,color:"#27ae60",marginTop:6,textAlign:"center"}}>
          ✨ بعد الحفظ يرجع المؤشر للمجهز تلقائياً
        </div>
      </div>

      {/* QUEUE */}
      {pending.length > 0 && (
        <div style={{...S.card,border:"2px solid #f0b42966",background:"#13120a"}}>
          <div style={{...S.cardTitle,justifyContent:"space-between"}}>
            <span>⏳ الطابور — بانتظار وزن العودة</span>
            <span style={{background:"#f0b42922",border:"1px solid #f0b42966",borderRadius:20,padding:"2px 12px",fontSize:13,color:"#f0b429"}}>{pending.length} 🚛</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {pending.map(ticket=>(
              <div key={ticket.id} style={{background:"#0d1117",border:"1px solid #2a3020",borderRadius:10,padding:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:24}}>🚛</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:16,color:"#f0e6c8"}}>{ticket.supplier}</div>
                      <div style={{fontSize:11,color:"#7a8a9a"}}>صعد الميزان: {ticket.time} • {ticket.date}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:14,color:"#e67e22",fontWeight:700}}>{fmtNum(ticket.grossWeight)} كغم</div>
                    <div style={{fontSize:10,color:"#7a8a9a"}}>سعر/كغم: {fmt(ticket.price)}</div>
                  </div>
                </div>
                {completing === ticket.id ? (
                  <div style={{background:"#0a1520",borderRadius:8,padding:12,border:"1px solid #1e4a60"}}>
                    <div style={{fontSize:12,color:"#4a90e2",fontWeight:700,marginBottom:8}}>⚖️ وزن الشاحنة فارغة (كغم)</div>
                    <div style={{display:"flex",gap:8}}>
                      <input autoFocus type="number"
                        style={{...S.input,flex:1,borderColor:tareVal?"#27ae6066":"#4a90e266",fontSize:tareVal?18:14,fontWeight:tareVal?700:400}}
                        placeholder="أدخل وزن الفارغ"
                        value={tareVal}
                        onChange={e=>setTareVal(e.target.value)}
                        onKeyDown={e=>{ if(e.key==="Enter"&&tareVal&&parseFloat(tareVal)>0&&parseFloat(tareVal)<ticket.grossWeight) completeTicket(ticket); }}
                      />
                      {!tareVal && (
                        <button type="button"
                          onClick={()=>{ if(navigator.serial){setSimulating("tare");readFromScale(v=>{setTareVal(String(v));setSimulating("");},()=>setSimulating(""));}else{setSimulating("");} }}
                          style={{background:"linear-gradient(135deg,#27ae60,#1a7a45)",border:"1px solid #27ae60",borderRadius:6,padding:"10px 14px",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                          ⚖️ أعد القراءة
                        </button>
                      )}
                    </div>
                    {tareVal && parseFloat(tareVal)<ticket.grossWeight && (
                      <div style={{marginTop:8,background:"#0d2010",border:"1px solid #4caf5044",borderRadius:8,padding:"8px 12px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{fontSize:12,color:"#7a8a9a"}}>{fmtNum(ticket.grossWeight)} − {fmtNum(parseFloat(tareVal))} =</span>
                          <span style={{color:"#4caf50",fontWeight:700,fontSize:18}}>{fmtNum(ticket.grossWeight-parseFloat(tareVal))} كغم</span>
                        </div>
                        {ticket.humidityPct>0 && (
                          <div style={{display:"flex",justifyContent:"space-between",background:"#1a0a25",borderRadius:6,padding:"6px 10px",marginTop:4}}>
                            <span style={{fontSize:11,color:"#9b59b6"}}>💧 رطوبة {ticket.humidityPct}% = −{fmtNum(Math.round((ticket.grossWeight-parseFloat(tareVal))*ticket.humidityPct/100))} كغم</span>
                            <span style={{color:"#f0b429",fontWeight:700,fontSize:16}}>{fmtNum(Math.round((ticket.grossWeight-parseFloat(tareVal))*(1-ticket.humidityPct/100)))} كغم صافي</span>
                          </div>
                        )}
                        <div style={{display:"flex",justifyContent:"space-between",marginTop:6,paddingTop:6,borderTop:"1px solid #1e3020"}}>
                          <span style={{fontSize:13,color:"#7a8a9a"}}>المبلغ:</span>
                          <span style={{color:"#f0b429",fontWeight:700,fontSize:18}}>{fmt(Math.round((ticket.grossWeight-parseFloat(tareVal))*(1-ticket.humidityPct/100||0))*ticket.price)}</span>
                        </div>
                      </div>
                    )}
                    <div style={{display:"flex",gap:8,marginTop:10}}>
                      <button style={{...S.btn("#27ae60"),flex:1,opacity:(!tareVal||parseFloat(tareVal)>=ticket.grossWeight)?0.4:1}} onClick={()=>completeTicket(ticket)}>✅ إتمام وحفظ الشحنة</button>
                      <button style={{background:"none",border:"1px solid #4a5a6a",borderRadius:8,padding:"10px 14px",color:"#7a8a9a",cursor:"pointer",fontFamily:"inherit"}} onClick={()=>{setCompleting(null);setTareVal("")}}>إلغاء</button>
                    </div>
                  </div>
                ) : (
                  <div style={{display:"flex",gap:8}}>
                    <button style={{...S.btn("#4a90e2"),flex:1}} onClick={()=>{setCompleting(ticket.id);setTareVal("");setSimulating("");}}>🔄 رجع — أدخل وزن الفارغ</button>
                    <button style={S.btnDanger} onClick={()=>{if(window.confirm("حذف من الطابور؟"))removeQueue(ticket.id)}}>🗑</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* COMPLETED TABLE */}
      <div style={S.card}>
        <div style={S.cardTitle}>✅ الشحنات المكتملة</div>
        {data.purchases.length === 0 ? (
          <div style={S.emptyState}>📦 لا توجد شحنات مكتملة بعد</div>
        ) : (
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>التاريخ</th><th style={S.th}>المجهز</th>
                <th style={S.th}>كلي(كغم)</th><th style={S.th}>فارغ(كغم)</th>
                <th style={{...S.th,color:"#9b59b6"}}>رطوبة%</th>
                <th style={{...S.th,color:"#4caf50"}}>صافي(كغم)</th>
                <th style={S.th}>سعر/كغم</th><th style={S.th}>الإجمالي</th>
                <th style={S.th}>الحالة</th>
                <th style={{...S.th,color:"#f0b429"}}>مصدر</th>
                <th style={{...S.th,color:"#7a8a9a"}}>ملاحظات</th>
                <th style={S.th}></th>
              </tr>
            </thead>
            <tbody>
              {[...data.purchases].reverse().map(p=>[
                <tr key={p.id}>
                  <td style={S.td}>{p.date}{p.grossTime?<div style={{fontSize:9,color:"#4a5a6a"}}>⬆{p.grossTime} ⬇{p.tareTime||""}</div>:null}</td>
                  <td style={S.td}>{p.supplier}</td>
                  <td style={{...S.td,color:"#e67e22"}}>{fmtNum(p.grossWeight||p.weight)}</td>
                  <td style={{...S.td,color:"#7a8a9a"}}>{fmtNum(p.tareWeight||0)}</td>
                  <td style={{...S.td,color:"#9b59b6"}}>{p.humidityPct>0?`${p.humidityPct}%`:"—"}</td>
                  <td style={{...S.td,fontWeight:700,color:"#4caf50"}}>{fmtNum(p.weight||(p.grossWeight-p.tareWeight))}</td>
                  <td style={S.td}>{fmt(p.price)}</td>
                  <td style={{...S.td,fontWeight:700,color:"#f0b429"}}>{fmt(p.total)}</td>
                  <td style={S.td}><span style={S.badge(p.payType==="cash"?"#4caf50":"#e67e22")}>{p.payType==="cash"?"نقدي":"آجل"}</span></td>
                  <td style={S.td}>{p.grossIsManual?"🖊️ يدوي":"⚖️ ميزان"}</td>
                  {p.notes?<td style={{...S.td,color:"#9b59b6",fontSize:11}}>{p.notes}</td>:<td style={S.td}></td>}
                  <td style={S.td}>
                    <button style={S.btnDanger} onClick={()=>{if(window.confirm("حذف هذا السجل؟"))del(p.id)}}>🗑</button>
                    <button style={{...S.btnDanger,color:"#4a90e2",border:"1px solid #4a90e244"}} onClick={()=>startEdit(p)}>✏️</button>
                  </td>
                </tr>,
                editId===p.id?(
                  <tr key={p.id+"_edit"}><td colSpan="12" style={{...S.td,padding:12,background:"#0a1520",border:"1px solid #1e4a60"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",gap:8,marginBottom:8}}>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>المجهز</label><input style={{...S.input,padding:"6px",fontSize:12}} value={editForm.supplier} onChange={e=>setEditForm(f=>({...f,supplier:e.target.value}))} /></div>
                      <div><label style={{fontSize:10,color:"#e67e22"}}>كلي (كغم)</label><input type="number" style={{...S.input,padding:"6px",fontSize:12}} value={editForm.grossWeight} onChange={e=>setEditForm(f=>({...f,grossWeight:e.target.value}))} /></div>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>فارغ (كغم)</label><input type="number" style={{...S.input,padding:"6px",fontSize:12}} value={editForm.tareWeight} onChange={e=>setEditForm(f=>({...f,tareWeight:e.target.value}))} /></div>
                      <div><label style={{fontSize:10,color:"#9b59b6"}}>رطوبة %</label><input type="number" style={{...S.input,padding:"6px",fontSize:12}} value={editForm.humidityPct} onChange={e=>setEditForm(f=>({...f,humidityPct:e.target.value}))} /></div>
                      <div><label style={{fontSize:10,color:"#f0b429"}}>سعر/كغم</label><input type="number" style={{...S.input,padding:"6px",fontSize:12}} value={editForm.price} onChange={e=>setEditForm(f=>({...f,price:e.target.value}))} /></div>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button style={{...S.btn("#27ae60"),padding:"6px 12px",fontSize:12}} onClick={()=>saveEdit(p.id)}>💾 حفظ</button>
                      <button style={{...S.btn("#4a5a6a"),padding:"6px 12px",fontSize:12}} onClick={()=>setEditId(null)}>إلغاء</button>
                    </div>
                  </td></tr>
                ):null
              ])}
            </tbody>
          </table>
        )}
    {PinModal}
      </div>
    </>
  );
}


// ==================== SALES (QUEUE SYSTEM) ====================
function Sales({ data, save, isReadOnly, logAction = ()=>{} }) {
  const { ask: askPin, Modal2: PinModal } = useOwnerPin();
  const customerRef = useRef(null);  // للرجوع التلقائي
  const actualWeightRef = useRef(null);

  // تركيز تلقائي على حقل الزبون عند فتح الصفحة
  useEffect(() => {
    setTimeout(() => {
      if (customerRef.current) customerRef.current.focus();
    }, 100);
  }, []);

  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({});

  // ── حساب المخزون الحالي ──
  const currentInventory = Math.max(0,
    (data.balesInventory||0) - data.sales.reduce((s,x) => s+(x.weight||0), 0)
  );
  // مخزون تقديري يشمل الطابور المعلق
  const pendingOutWeight = (data.pendingSales||[]).reduce((s,t) => s+(t.estWeight||0), 0);
  const availableInventory = Math.max(0, currentInventory - pendingOutWeight);

  // ── تحقق المخزون قبل البيع ──
  const checkInventory = (requestedTons) => {
    if (currentInventory <= 0) {
      alert("🚫 لا يوجد مخزون بالات!\n\nيجب تسجيل إنتاج أولاً قبل البيع.\n(راجع تبويب الإنتاج)");
      return false;
    }
    if (requestedTons > 0 && requestedTons > availableInventory) {
      const msg = `⚠️ الكمية المطلوبة (${requestedTons} طن) أكبر من المتاح (${availableInventory.toFixed(2)} طن)\n\nهل تريد المتابعة على أي حال؟`;
      return window.confirm(msg);
    }
    return true;
  };

  const canEdit = async (recordDate) => {
    if (recordDate === today()) return true;
    const pw = await askPin("سجل من يوم سابق — أدخل كلمة مرور المالك:");
    return pw === (data.settings?.reportPassword || "owner1234");
  };

  const startEdit = async (rec) => {
    if (!(await canEdit(rec.date))) return;
    setEditId(rec.id);
    setEditForm({ customer: rec.customer, weight: rec.weight, price: rec.price, payType: rec.payType, notes: rec.notes||"" });
  };

  const saveEdit = (id) => {
    const orig = data.sales.find(s => s.id === id);
    const w = parseFloat(editForm.weight)||0;
    const pr = parseFloat(editForm.price)||0;
    const total = w * pr;
    const editedData = { ...data, sales: data.sales.map(s => s.id === id ? {
      ...s, customer: editForm.customer, weight: w, price: pr, payType: editForm.payType, notes: editForm.notes, total
    } : s) };
    save(orig ? logAction("تعديل", "مبيعات", "تعديل بيعة: " + orig.customer + " — " + orig.date, editedData) : editedData);
    setEditId(null);
  };

  const [form, setForm] = useState({ customer: "", estWeight: "", price: "", payType: "cash", date: today(), notes: "" });
  const [completing, setCompleting] = useState(null);
  const [actualWeight, setActualWeight] = useState("");

  const pending = data.pendingSales || [];

  // إضافة شحنة للطابور — مع فحص المخزون
  const addToQueue = () => {
    if (!form.customer || !form.price) return;
    // ٢. منع البيع بدون مخزون
    if (currentInventory <= 0) {
      alert("🚫 لا يوجد مخزون بالات!\n\nيجب تسجيل إنتاج أولاً قبل البيع.\n(راجع تبويب 🏭 الإنتاج)");
      return;
    }
    // ٣. تحذير لو الكمية أكبر من المتاح
    const est = parseFloat(form.estWeight)||0;
    if (est > 0 && est > availableInventory) {
      const ok = window.confirm(`⚠️ الكمية التقديرية (${est} طن) أكبر من المتاح للبيع (${availableInventory.toFixed(2)} طن)\n\nهل تريد المتابعة؟`);
      if (!ok) return;
    }
    const ticket = {
      id: uid(), customer: form.customer,
      estWeight: est, price: parseFloat(form.price),
      payType: form.payType, date: form.date, notes: form.notes,
      time: new Date().toLocaleTimeString("ar-IQ", { hour: "2-digit", minute: "2-digit" }),
    };
    save({ ...data, pendingSales: [...pending, ticket] });
    setForm(f => ({ ...f, customer: "", estWeight: "", notes: "" }));
    // رجوع المؤشر لحقل الزبون تلقائياً
    setTimeout(() => { if (customerRef.current) customerRef.current.focus(); }, 50);
  };

  // إتمام البيع بعد تأكيد الوزن من العميل
  const completeTicket = (ticket) => {
    const w = parseFloat(actualWeight);
    if (isNaN(w) || w <= 0) return;
    // ٣. فحص الوزن الفعلي مقابل المخزون
    if (w > currentInventory) {
      const ok = window.confirm(`⚠️ الوزن الفعلي (${w} طن) يتجاوز المخزون المتاح (${currentInventory.toFixed(2)} طن)\n\nهل تريد المتابعة؟`);
      if (!ok) return;
    }
    const total = w * ticket.price;
    const rec = {
      id: uid(), customer: ticket.customer, estWeight: ticket.estWeight,
      weight: w, price: ticket.price, payType: ticket.payType,
      date: ticket.date, notes: ticket.notes, total,
    };
    const newPending = pending.filter(p => p.id !== ticket.id);
    const newData = { ...data, sales: [...data.sales, rec], pendingSales: newPending };
    // إنشاء دين تلقائي إذا آجل
    if (ticket.payType === "deferred") {
      newData.debts = [...(data.debts || []), {
        id: uid(), type: "customer", name: ticket.customer,
        amount: total, date: ticket.date,
        notes: `بيع ${w} طن`, status: "pending", payments: [],
      }];
    }
    save(newData);
    setCompleting(null);
    setActualWeight("");
    // رجوع المؤشر لحقل الزبون بعد إتمام البيع
    setTimeout(() => { if (customerRef.current) customerRef.current.focus(); }, 50);
  };

  // حذف من الطابور
  const removeQueue = (id) => {
    save({ ...data, pendingSales: pending.filter(p => p.id !== id) });
  };

  // حذف من المكتملات
  const del = (id) => {
    const rec = data.sales.find(s => s.id === id);
    const newData = { ...data, sales: data.sales.filter(s => s.id !== id) };
    save(rec ? logAction("حذف", "مبيعات", "حذف بيعة: " + rec.customer + " — " + rec.weight + " طن — " + rec.date, newData) : newData);
  };

  return (
    <>
      <h2 style={{ color: "#f0b429", fontSize: 18, marginBottom: 16 }}>💰 المبيعات</h2>

      {/* شريط حالة المخزون */}
      <div style={{
        background: currentInventory <= 0 ? "#1a0808" : currentInventory <= 5 ? "#150a00" : "#0a1520",
        border: `1px solid ${currentInventory <= 0 ? "#e55444" : currentInventory <= 5 ? "#e67e22" : "#4a90e244"}`,
        borderRadius: 10, padding: "8px 14px", marginBottom: 12,
        display: "flex", justifyContent: "space-between", alignItems: "center",
      }}>
        <span style={{fontSize:12, color: currentInventory <= 0 ? "#e55444" : currentInventory <= 5 ? "#e67e22" : "#4a90e2"}}>
          {currentInventory <= 0 ? "🚫 المخزون فارغ — البيع غير متاح" : currentInventory <= 5 ? "⚠️ مخزون منخفض" : "📦 المخزون المتاح للبيع"}
        </span>
        <span style={{fontSize:16, fontWeight:700, color: currentInventory <= 0 ? "#e55444" : currentInventory <= 5 ? "#e67e22" : "#27ae60"}}>
          {currentInventory.toFixed(2)} طن
        </span>
      </div>
      <div style={{ ...S.kpiGrid, gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 16 }}>
        <div style={S.kpi("#27ae60")}>
          <div style={S.kpiVal}>{data.sales.length}</div>
          <div style={S.kpiLabel}>صفقات مكتملة</div>
        </div>
        <div style={S.kpi("#e67e22")}>
          <div style={S.kpiVal}>{pending.length}</div>
          <div style={S.kpiLabel}>بانتظار التأكيد</div>
        </div>
        <div style={S.kpi("#1abc9c")}>
          <div style={S.kpiVal}>{fmtNum(data.sales.reduce((s, p) => s + p.weight, 0))} طن</div>
          <div style={S.kpiLabel}>إجمالي الوزن</div>
        </div>
        <div style={S.kpi("#27ae60")}>
          <div style={S.kpiVal}>{fmt(data.sales.reduce((s, p) => s + p.total, 0))}</div>
          <div style={S.kpiLabel}>إجمالي الإيرادات</div>
        </div>
      </div>

      {/* FORM — تسجيل شحنة خارجة */}
      <div style={{ ...S.card, border: "2px solid #27ae6044" }}>
        <div style={S.cardTitle}>🚛 تسجيل شحنة خارجة (حمولة للعميل)</div>
        <div style={S.formGrid}>
          <div style={S.formField}>
            <label style={S.label}>التاريخ</label>
            <input type="date" style={S.input} value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
          </div>
          <div style={S.formField}>
            <label style={S.label}>اسم العميل (الزبون)</label>
            <AutocompleteInput
              id="sal-customer"
              inputRef={customerRef}
              style={{ ...S.input, borderColor: form.customer ? "#27ae60" : "#2a3545" }}
              placeholder="مثال: شركة النور، مصنع الحديد..."
              value={form.customer}
              onChange={v => setForm(f => ({ ...f, customer: v }))}
              suggestions={[...new Set(data.sales.map(s => s.customer).filter(Boolean))]}
              onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); document.getElementById("sal-est")?.focus(); } }}
            />
          </div>
          <div style={S.formField}>
            <label style={S.label}>الوزن التقديري (طن) — اختياري</label>
            <input id="sal-est" type="number" style={{ ...S.input, borderColor: "#2a3545" }}
              placeholder="مثال: 20 (تقريبي)"
              value={form.estWeight}
              onChange={e => setForm(f => ({ ...f, estWeight: e.target.value }))}
              onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); document.getElementById("sal-price")?.focus(); } }}
            />
            <div style={{ fontSize: 10, color: "#4a5a6a", marginTop: 2 }}>الوزن الفعلي يُدخل لمّا العميل يأكد</div>
          </div>
          <div style={S.formField}>
            <label style={S.label}>سعر الطن (د.ع)</label>
            <input id="sal-price" type="number" style={S.input} placeholder="السعر المتفق"
              value={form.price}
              onChange={e => setForm(f => ({ ...f, price: e.target.value }))}
              onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); addToQueue(); } }}
            />
          </div>
          <div style={S.formField}>
            <label style={S.label}>طريقة الدفع</label>
            <select style={S.select} value={form.payType} onChange={e => setForm(f => ({ ...f, payType: e.target.value }))}>
              <option value="cash">نقدي</option><option value="deferred">آجل</option>
            </select>
          </div>
          <div style={S.formField}>
            <label style={S.label}>ملاحظات</label>
            <input style={S.input} placeholder="رقم التريلة، نوع الكارتون..."
              value={form.notes}
              onChange={e => setForm(f => ({ ...f, notes: e.target.value }))}
              onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); addToQueue(); } }}
            />
          </div>
        </div>
        <button style={{ ...S.btn("#27ae60"), width: "100%", opacity: (!form.customer || !form.price) ? 0.4 : 1 }} disabled={isReadOnly} onClick={addToQueue}>
          🚛 تسجيل الشحنة ← بانتظار تأكيد الوزن من العميل
        </button>
      </div>

      {/* QUEUE — بانتظار تأكيد الوزن */}
      {pending.length > 0 && (
        <div style={{ ...S.card, border: "2px solid #f0b42966", background: "#13120a" }}>
          <div style={{ ...S.cardTitle, justifyContent: "space-between" }}>
            <span>⏳ بانتظار تأكيد الوزن من العميل</span>
            <span style={{ background: "#f0b42922", border: "1px solid #f0b42966", borderRadius: 20, padding: "2px 12px", fontSize: 13, color: "#f0b429" }}>{pending.length} 📦</span>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {pending.map(ticket => (
              <div key={ticket.id} style={{ background: "#0d1117", border: "1px solid #1e3020", borderRadius: 10, padding: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 24 }}>📦</span>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 16, color: "#f0e6c8" }}>{ticket.customer}</div>
                      <div style={{ fontSize: 11, color: "#7a8a9a" }}>خرجت: {ticket.time} • {ticket.date}</div>
                    </div>
                  </div>
                  <div style={{ textAlign: "left" }}>
                    {ticket.estWeight > 0 && <div style={{ fontSize: 14, color: "#e67e22", fontWeight: 700 }}>~{fmtNum(ticket.estWeight)} طن</div>}
                    <div style={{ fontSize: 10, color: "#7a8a9a" }}>سعر/طن: {fmt(ticket.price)}</div>
                    <div style={{ fontSize: 10, color: ticket.payType === "cash" ? "#4caf50" : "#e67e22" }}>{ticket.payType === "cash" ? "نقدي" : "آجل"}</div>
                  </div>
                </div>

                {ticket.notes && <div style={{ fontSize: 11, color: "#5a6a7a", marginBottom: 8, padding: "4px 8px", background: "#0a0e15", borderRadius: 6 }}>📝 {ticket.notes}</div>}

                {completing === ticket.id ? (
                  <div style={{ background: "#0a1520", borderRadius: 8, padding: 12, border: "1px solid #1e4a60" }}>
                    <div style={{ fontSize: 12, color: "#27ae60", fontWeight: 700, marginBottom: 8 }}>⚖️ الوزن الفعلي من العميل (طن)</div>
                    <div style={{ display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>
                      <input
                        ref={actualWeightRef}
                        autoFocus
                        type="number"
                        style={{ ...S.input, flex: 1, minWidth: 120, borderColor: "#27ae6066" }}
                        placeholder="الوزن الفعلي بالطن"
                        value={actualWeight}
                        onChange={e => setActualWeight(e.target.value)}
                        onKeyDown={e => { if(e.key==="Enter" && actualWeight && parseFloat(actualWeight)>0) completeTicket(ticket); }}
                      />
                    </div>
                    {actualWeight && parseFloat(actualWeight) > 0 && (
                      <div style={{ marginTop: 8, background: "#0d2010", border: "1px solid #4caf5044", borderRadius: 8, padding: "8px 12px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                          <span style={{ fontSize: 12, color: "#7a8a9a" }}>الوزن الفعلي:</span>
                          <span style={{ color: "#4caf50", fontWeight: 700, fontSize: 18 }}>{fmtNum(parseFloat(actualWeight))} طن</span>
                        </div>
                        {ticket.estWeight > 0 && (
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#7a8a9a" }}>
                            <span>الفرق عن التقديري:</span>
                            <span style={{ color: parseFloat(actualWeight) >= ticket.estWeight ? "#4caf50" : "#e55444" }}>
                              {parseFloat(actualWeight) >= ticket.estWeight ? "+" : ""}{fmtNum(parseFloat(actualWeight) - ticket.estWeight)} طن
                            </span>
                          </div>
                        )}
                        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, paddingTop: 6, borderTop: "1px solid #1e3020" }}>
                          <span style={{ fontSize: 13, color: "#7a8a9a" }}>المبلغ الإجمالي:</span>
                          <span style={{ color: "#f0b429", fontWeight: 700, fontSize: 20 }}>{fmt(parseFloat(actualWeight) * ticket.price)}</span>
                        </div>
                      </div>
                    )}
                    <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                      <button style={{ ...S.btn("#27ae60"), flex: 1, opacity: (!actualWeight || parseFloat(actualWeight) <= 0) ? 0.4 : 1 }} onClick={() => completeTicket(ticket)}>✅ تأكيد وإتمام البيع</button>
                      <button style={{ background: "none", border: "1px solid #4a5a6a", borderRadius: 8, padding: "10px 14px", color: "#7a8a9a", cursor: "pointer", fontFamily: "inherit" }} onClick={() => { setCompleting(null); setActualWeight(""); }}>إلغاء</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: "flex", gap: 8 }}>
                    <button style={{ ...S.btn("#4a90e2"), flex: 1 }} onClick={() => { setCompleting(ticket.id); setActualWeight(""); }}>📱 وصل تأكيد الوزن — أدخل الوزن الفعلي</button>
                    <button style={S.btnDanger} onClick={() => {if(window.confirm("حذف من الطابور؟"))removeQueue(ticket.id)}}>🗑</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* COMPLETED TABLE */}
      <div style={S.card}>
        <div style={S.cardTitle}>✅ المبيعات المكتملة</div>
        {data.sales.length === 0 ? (
          <div style={S.emptyState}>💰 لا توجد مبيعات مكتملة بعد</div>
        ) : (
          <table style={S.table}>
            <thead><tr>
              <th style={S.th}>التاريخ</th>
              <th style={S.th}>الزبون</th>
              <th style={{ ...S.th, color: "#7a8a9a" }}>تقديري</th>
              <th style={{ ...S.th, color: "#4caf50" }}>فعلي(طن)</th>
              <th style={S.th}>سعر/طن</th>
              <th style={S.th}>الإجمالي</th>
              <th style={S.th}>الدفع</th>
              <th style={{...S.th,color:"#7a8a9a"}}>ملاحظات</th>
              <th style={S.th}></th>
            </tr></thead>
            <tbody>
              {[...data.sales].reverse().map(s => [
                <tr key={s.id}>
                  <td style={S.td}>{s.date}</td>
                  <td style={S.td}>{s.customer}</td>
                  <td style={{ ...S.td, color: "#5a6a7a", fontSize: 11 }}>{s.estWeight ? fmtNum(s.estWeight) : "—"}</td>
                  <td style={{ ...S.td, fontWeight: 700, color: "#4caf50" }}>{fmtNum(s.weight)}</td>
                  <td style={S.td}>{fmt(s.price)}</td>
                  <td style={{ ...S.td, fontWeight: 700, color: "#f0b429" }}>{fmt(s.total)}</td>
                  <td style={S.td}><span style={S.badge(s.payType === "cash" ? "#4caf50" : "#e67e22")}>{s.payType === "cash" ? "نقدي" : "آجل"}</span></td>
                  {s.notes ? <td style={{...S.td,color:"#9b59b6",fontSize:11,maxWidth:100}}>{s.notes}</td> : <td style={S.td}></td>}
                  <td style={S.td}><button style={S.btnDanger} onClick={() => {if(window.confirm("هل أنت متأكد من حذف هذا السجل؟"))del(s.id)}}>🗑</button>
                    <button style={{...S.btnDanger, color: "#4a90e2", border: "1px solid #4a90e244"}} onClick={()=>startEdit(s)}>✏️</button>
                  </td>
                </tr>,
                editId === s.id ? (
                  <tr key={s.id+"_edit"}><td colSpan="8" style={{...S.td, padding: 12, background: "#0a1520", border: "1px solid #1e4a60"}}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>الزبون</label><input style={{...S.input,padding:"6px",fontSize:12}} value={editForm.customer} onChange={e=>setEditForm(f=>({...f,customer:e.target.value}))} /></div>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>الوزن (طن)</label><input type="number" style={{...S.input,padding:"6px",fontSize:12}} value={editForm.weight} onChange={e=>setEditForm(f=>({...f,weight:e.target.value}))} /></div>
                      <div><label style={{fontSize:10,color:"#7a8a9a"}}>سعر/طن</label><input type="number" style={{...S.input,padding:"6px",fontSize:12}} value={editForm.price} onChange={e=>setEditForm(f=>({...f,price:e.target.value}))} /></div>
                      <div style={{display:"flex",alignItems:"flex-end",gap:4}}>
                        <button style={{...S.btn("#27ae60"),padding:"6px 12px",fontSize:12}} onClick={()=>saveEdit(s.id)}>💾 حفظ</button>
                        <button style={{...S.btnDanger,padding:"6px 8px"}} onClick={()=>setEditId(null)}>✕</button>
                      </div>
                    </div>
                  </td></tr>
                ) : null
              ])}
            </tbody>
          </table>
        )}
      {PinModal}
      </div>
    </>
  );
}

// ==================== MACHINERY ====================
function Machinery({ data, save, isReadOnly, logAction = ()=>{} }) {
  const [showForm, setShowForm] = useState(false);
  const [filterMonth, setFilterMonth] = useState(""); // "" = كل الوقت
  const [form, setForm] = useState({ date: today(), expType: "fuel", machine: "", amount: "", notes: "", qty: "" });

  const add = () => {
    if (!form.amount || isReadOnly) return;
    save({ ...data, machinery: [...data.machinery, {
      id: uid(), ...form,
      amount: parseFloat(form.amount),
      qty: form.qty ? parseFloat(form.qty) : "",
    }]});
    setForm({ date: today(), expType: "fuel", machine: "", amount: "", notes: "", qty: "" });
    setShowForm(false);
  };
  const del = (id) => {
    const rec = data.machinery.find(m => m.id === id);
    const newData = { ...data, machinery: data.machinery.filter(m => m.id !== id) };
    save(rec ? logAction("حذف", "آليات", "حذف مصرف: " + rec.expType + " — " + rec.amount + " د.ع — " + rec.date, newData) : newData);
  };

  // فلتر الشهر
  const records = filterMonth
    ? data.machinery.filter(x => x.date && x.date.startsWith(filterMonth))
    : data.machinery;

  const MACHINES = ["شفل", "كابسة", "رافعة", "مولدة"];
  const MACHINE_ICONS = { "شفل": "🚜", "كابسة": "🏗️", "رافعة": "🏋️", "مولدة": "⚡" };

  const TYPES = {
    fuel:        { label: "⛽ وقود",    color: "#e67e22", unit: "لتر" },
    oil:         { label: "🛢️ زيت",     color: "#8e44ad", unit: "لتر" },
    wire:        { label: "🔩 سيم ربط", color: "#27ae60", unit: "كغم" },
    maintenance: { label: "🔧 صيانة",   color: "#4a90e2", unit: ""    },
  };

  const total = (type) => records.filter(x => x.expType === type).reduce((s, x) => s + x.amount, 0);
  const totalFuel  = total("fuel");
  const totalOil   = total("oil");
  const totalWire  = total("wire");
  const totalMaint = total("maintenance");

  // صيانة مفصلة بالآلية
  const maintByMachine = MACHINES.map(m => ({
    name: m,
    icon: MACHINE_ICONS[m],
    total: records.filter(x => x.expType === "maintenance" && x.machine === m).reduce((s, x) => s + x.amount, 0),
  })).filter(m => m.total > 0);

  // الشهور المتاحة
  const months = [...new Set(data.machinery.map(x => x.date?.slice(0,7)).filter(Boolean))].sort().reverse();

  return (
    <>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <h2 style={{ color: "#f0b429", margin: 0, fontSize: 18 }}>⚙️ مصاريف الآليات</h2>
        <button style={S.btn("#9b59b6")} onClick={() => setShowForm(true)} disabled={isReadOnly}>
          <Icon name="add" size={14} /> إضافة
        </button>
      </div>

      {/* فلتر الشهر */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14, alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, color: "#7a8a9a" }}>📅 عرض:</span>
        <button onClick={() => setFilterMonth("")} style={{
          background: !filterMonth ? "#c8860a" : "none",
          border: `1px solid ${!filterMonth ? "#c8860a" : "#2a3545"}`,
          borderRadius: 20, padding: "3px 12px", color: !filterMonth ? "#000" : "#7a8a9a",
          cursor: "pointer", fontFamily: "inherit", fontSize: 11, fontWeight: !filterMonth ? 700 : 400,
        }}>كل الوقت</button>
        {months.slice(0, 6).map(m => (
          <button key={m} onClick={() => setFilterMonth(m)} style={{
            background: filterMonth === m ? "#1a2a3a" : "none",
            border: `1px solid ${filterMonth === m ? "#4a90e2" : "#2a3545"}`,
            borderRadius: 20, padding: "3px 12px", color: filterMonth === m ? "#4a90e2" : "#7a8a9a",
            cursor: "pointer", fontFamily: "inherit", fontSize: 11,
          }}>{m}</button>
        ))}
        {filterMonth && (
          <span style={{ fontSize: 11, color: "#4a90e2", background: "#0a1a2a", borderRadius: 20, padding: "3px 10px" }}>
            📊 يعرض {filterMonth} فقط — الأرقام أدناه للشهر المختار
          </span>
        )}
      </div>

      {/* 3 بطاقات: وقود، زيت، سيم ربط */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 12 }}>
        {[
          { type: "fuel", total: totalFuel, icon: "⛽", label: "وقود", color: "#e67e22",
            sub: `${records.filter(x=>x.expType==="fuel").reduce((s,x)=>s+(parseFloat(x.qty)||0),0)} لتر` },
          { type: "oil",  total: totalOil,  icon: "🛢️", label: "زيت",  color: "#8e44ad",
            sub: `${records.filter(x=>x.expType==="oil").reduce((s,x)=>s+(parseFloat(x.qty)||0),0)} لتر` },
          { type: "wire", total: totalWire, icon: "🔩", label: "سيم ربط", color: "#27ae60",
            sub: `${records.filter(x=>x.expType==="wire").reduce((s,x)=>s+(parseFloat(x.qty)||0),0)} كغم` },
        ].map(k => (
          <div key={k.type} style={{ background: `linear-gradient(135deg,${k.color}11,#0d1117)`, border: `2px solid ${k.color}44`, borderRadius: 14, padding: "14px 8px", textAlign: "center" }}>
            <div style={{ fontSize: 26, marginBottom: 4 }}>{k.icon}</div>
            <div style={{ fontSize: 17, fontWeight: 700, color: k.color }}>{fmt(k.total)}</div>
            <div style={{ fontSize: 10, color: "#7a8a9a", marginTop: 2 }}>{k.label}</div>
            <div style={{ fontSize: 10, color: "#4a5a6a" }}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* صيانة مفصلة */}
      {totalMaint > 0 && (
        <div style={{ background: "#0a0f1a", border: "1px solid #4a90e233", borderRadius: 10, padding: "10px 14px", marginBottom: 12 }}>
          <div style={{ fontSize: 12, color: "#4a90e2", fontWeight: 700, marginBottom: 8 }}>🔧 الصيانة — {fmt(totalMaint)}</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 6 }}>
            {MACHINES.map(m => {
              const v = records.filter(x => x.expType === "maintenance" && x.machine === m).reduce((s,x)=>s+x.amount,0);
              return (
                <div key={m} style={{ display: "flex", justifyContent: "space-between", background: "#0d1420", borderRadius: 6, padding: "5px 10px", opacity: v > 0 ? 1 : 0.3 }}>
                  <span style={{ fontSize: 12 }}>{MACHINE_ICONS[m]} {m}</span>
                  <span style={{ fontSize: 12, color: "#4a90e2", fontWeight: v > 0 ? 700 : 400 }}>{v > 0 ? fmt(v) : "—"}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* السجل */}
      <div style={S.card}>
        <div style={S.cardTitle}>📋 السجل {filterMonth && <span style={{fontSize:11,color:"#4a90e2"}}>— {filterMonth}</span>}</div>
        {records.length === 0 ? (
          <div style={S.emptyState}>لا توجد مصاريف {filterMonth ? `في ${filterMonth}` : "بعد"}</div>
        ) : (
          <table style={S.table}>
            <thead><tr>
              <th style={S.th}>التاريخ</th>
              <th style={S.th}>النوع</th>
              <th style={S.th}>الآلية</th>
              <th style={S.th}>الكمية</th>
              <th style={S.th}>المبلغ</th>
              <th style={S.th}>ملاحظات</th>
              <th style={S.th}></th>
            </tr></thead>
            <tbody>
              {[...records].reverse().map(m => {
                const t = TYPES[m.expType] || TYPES.maintenance;
                return (
                  <tr key={m.id}>
                    <td style={S.td}>{m.date}</td>
                    <td style={S.td}><span style={S.badge(t.color)}>{t.label}</span></td>
                    <td style={{ ...S.td, color: "#9b59b6" }}>{m.machine ? `${MACHINE_ICONS[m.machine]||""} ${m.machine}` : "—"}</td>
                    <td style={{ ...S.td, color: "#7a8a9a" }}>{m.qty ? `${m.qty} ${t.unit}` : "—"}</td>
                    <td style={{ ...S.td, color: "#e55444", fontWeight: 700 }}>{fmt(m.amount)}</td>
                    <td style={{ ...S.td, color: "#7a8a9a" }}>{m.notes || "—"}</td>
                    <td style={S.td}>{!isReadOnly && <button style={S.btnDanger} onClick={() => del(m.id)}>🗑</button>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {showForm && (
        <Modal title="➕ إضافة مصرف" onClose={() => setShowForm(false)}>
          <div style={S.formGrid}>
            <div style={S.formField}>
              <label style={S.label}>التاريخ</label>
              <input type="date" style={S.input} value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
            </div>
            <div style={S.formField}>
              <label style={S.label}>النوع</label>
              <select style={S.select} value={form.expType} onChange={e => setForm({...form, expType: e.target.value, machine: ""})}>
                <option value="fuel">⛽ وقود</option>
                <option value="oil">🛢️ زيت</option>
                <option value="wire">🔩 سيم ربط</option>
                <option value="maintenance">🔧 صيانة</option>
              </select>
            </div>
            {form.expType === "maintenance" && (
              <div style={S.formField}>
                <label style={S.label}>الآلية</label>
                <select style={S.select} value={form.machine} onChange={e => setForm({...form, machine: e.target.value})}>
                  <option value="">— اختر الآلية —</option>
                  {MACHINES.map(m => <option key={m}>{m}</option>)}
                </select>
              </div>
            )}
            <div style={S.formField}>
              <label style={S.label}>الكمية {form.expType==="wire"?"(كغم)":form.expType==="maintenance"?"(اختياري)":"(لتر)"}</label>
              <input id="mac-qty" type="number" style={S.input} placeholder={form.expType==="wire"?"1500":"200"} value={form.qty} onChange={e => setForm({...form, qty: e.target.value})} onKeyDown={enterKey("mac-amount")} />
            </div>
            <div style={S.formField}>
              <label style={S.label}>المبلغ (د.ع)</label>
              <input id="mac-amount" type="number" style={S.input} placeholder="المبلغ" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} onKeyDown={enterKey("mac-notes")} />
            </div>
          </div>
          <div style={{ ...S.formField, marginBottom: 16 }}>
            <label style={S.label}>ملاحظات (اختياري)</label>
            <input id="mac-notes" style={S.input} placeholder="تفاصيل" value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} onKeyDown={enterKey(null, add)} />
          </div>
          <button style={{ ...S.btn("#9b59b6"), width: "100%" }} onClick={add} disabled={!form.amount}>💾 حفظ</button>
        </Modal>
      )}
    </>
  );
}


// ==================== WORKERS ====================
function Workers({ data, save, isReadOnly, logAction = ()=>{} }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ name: "", role: "", wageType: "daily", wage: "", extraPay: "", advance: "", notes: "" });
  const [editing, setEditing] = useState(null);

  const add = () => {
    if (!form.name || !form.wage) return;
    save({ ...data, workers: [...data.workers, {
      id: uid(), ...form, wage: parseFloat(form.wage)||0, extraPay: parseFloat(form.extraPay)||0, advance: parseFloat(form.advance)||0,
    }] });
    setForm({ name: "", role: "", wageType: "daily", wage: "", extraPay: "", advance: "", notes: "" });
    setShowForm(false);
  };

  const del = (id) => {
    const rec = data.workers.find(w => w.id === id);
    if (!window.confirm("هل أنت متأكد من حذف هذا الموظف؟")) return;
    const newData = { ...data, workers: data.workers.filter(w => w.id !== id) };
    save(rec ? logAction("حذف", "موظفون", "حذف موظف: " + rec.name, newData) : newData);
  };

  const resetWorker = (id) => {
    if (!window.confirm("تصفير سلف وأجور إضافية؟ (بعد دفع الراتب)")) return;
    save({ ...data, workers: data.workers.map(w => w.id === id ? { ...w, extraPay: 0, advance: 0 } : w) });
  };

  const quickUpdate = (id, field, value) => {
    save({ ...data, workers: data.workers.map(w => w.id === id ? { ...w, [field]: parseFloat(value)||0 } : w) });
  };

  const calcNet = (w) => (w.wage||0) + (w.extraPay||0) - (w.advance||0);
  const totalPayroll = data.workers.reduce((s, w) => s + calcNet(w), 0);

  return (
    <>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h2 style={{ color: "#f0b429", margin: 0, fontSize: 18 }}>👷 الموظفون والرواتب</h2>
        <button onClick={() => !isReadOnly && setShowForm(true)} disabled={isReadOnly} style={{...S.btn("#4a90e2"), opacity: isReadOnly?0.3:1}}>
          <Icon name="add" size={14} /> إضافة موظف
        </button>
      </div>

      <div style={{ ...S.kpiGrid, gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: 16 }}>
        <div style={S.kpi("#1abc9c")}><div style={S.kpiVal}>{data.workers.length}</div><div style={S.kpiLabel}>عدد العمال</div></div>
